name: Football AI Predict

on:
  schedule:
    # 北京时间 11:30 = UTC 03:30
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-ai-predict-single-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore runtime data cache into scripts
        run: |
          mkdir -p scripts/data
          if [ -d "data" ]; then
            echo "♻️ Restoring root data/ into scripts/data/"
            rsync -a data/ scripts/data/ || true
          else
            echo "ℹ️ No root data/ directory found, start clean."
          fi

          echo "🧹 Clearing old AI cache to avoid stale prediction pollution"
          rm -rf scripts/data/ai_cache || true
          rm -rf data/ai_cache || true

      - name: Run Predictions
        env:
          PYTHONUNBUFFERED: "1"

          # ============================================================
          # 主数据源
          # ============================================================
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          # ============================================================
          # 四模型 API
          # 保持旧版四模型变量，不传 API_KEY / API_URL
          # 如果四家走同一中转，四组 secrets 可填同一套 key/url
          # ============================================================
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}

          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}

          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}

          FORCE_COMMON_GATEWAY_URL: "true"

          # ============================================================
          # 只跑今日竞彩业务日
          # 北京时间凌晨 00:00-10:59 仍归入前一个竞彩业务日
          # ============================================================
          VMAX_RUN_DAYS: today
          AI_RUN_DAYS: today
          VMAX_DATE_SHIFT_HOURS: "11"

          # ============================================================
          # AI 超长等待
          # 不分批，一次性全场大包，等待模型完整返回
          # ============================================================
          AI_CONNECT_TIMEOUT: "120"
          AI_READ_TIMEOUT: "5400"
          AI_CLAUDE_CONNECT_TIMEOUT: "120"
          AI_CLAUDE_READ_TIMEOUT: "7200"
          AI_HTTP_TOTAL_TIMEOUT: "0"

          # ============================================================
          # 严格每模型一次请求，避免重复扣费
          # ============================================================
          STRICT_ONE_CALL_PER_MODEL: "true"
          AI_MAX_REQUESTS_PER_AI: "1"
          AI_CLAUDE_MAX_REQUESTS: "1"
          AI_ALLOW_SECOND_CALL_REPAIR: "false"
          AI_ENABLE_CLAUDE_JSON_REPAIR: "false"
          AI_ENABLE_ANY_MODEL_JSON_REPAIR: "false"
          AI_CLAUDE_RETRY_BACKOFF_SECONDS: "20"

          # ============================================================
          # Claude 必须终审
          # 不再因为 Phase1 有效不足跳过 Claude
          # ============================================================
          AI_RUN_CLAUDE_ONLY_IF_PHASE1_VALID: "false"
          AI_RUN_CLAUDE_ALWAYS: "true"
          AI_MIN_PHASE1_VALID_FOR_CLAUDE: "0"

          AI_USE_COMPACT_CLAUDE_AUDIT: "true"
          AI_MAX_PHASE1_REASON_CHARS_FOR_CLAUDE: "350"
          CLAUDE_RAW_PACKET_CHAR_LIMIT: "4500"
          CLAUDE_MATCH_SUMMARY_CHAR_LIMIT: "2200"

          # ============================================================
          # 禁止文本兜底
          # 防止 Grok / Claude 自然语言残片误抓成 1/56 假完成
          # ============================================================
          AI_ALLOW_TEXT_FALLBACK: "false"
          AI_ALLOW_CLAUDE_TEXT_FALLBACK: "false"
          AI_SAFE_TEXT_FALLBACK_ONLY: "false"

          # ============================================================
          # 全批次覆盖要求
          # partial 结果不得当成完整成功
          # ============================================================
          AI_REQUIRE_FULL_BATCH_COVERAGE: "true"
          AI_ACCEPT_PARTIAL_PHASE1: "false"
          AI_ACCEPT_PARTIAL_CLAUDE: "false"
          AI_PARTIAL_AS_FAILED: "true"

          # ============================================================
          # 关闭 AI 缓存
          # 防止手动重跑、赔率变化、临场变动被旧缓存污染
          # ============================================================
          AI_DISABLE_CACHE: "true"
          AI_PERSISTENT_CACHE_ENABLED: "false"
          AI_SINGLEFLIGHT_ENABLED: "false"
          AI_DECISION_CACHE_TTL: "0"
          AI_CACHE_DIR: "data/ai_cache"
          AI_CACHE_STRIP_VOLATILE_KEYS: "true"
          AI_WRITE_BATCH_RESULT_IMMEDIATELY: "false"

          # 缓存关闭后磁盘锁不参与 AI 判断，仅保留极短安全值
          AI_DISK_LOCK_WAIT_SECONDS: "30"
          AI_DISK_LOCK_POLL_SECONDS: "3"

          # ============================================================
          # main.py 运行锁
          # job timeout 240分钟，所以 stale 给 4小时
          # ============================================================
          VMAX_MAIN_LOCK_STALE_SECONDS: "14400"

          # workflow 已经 pip install，这里让 main.py 跳过二次自动安装
          SKIP_AUTO_INSTALL: "true"

        run: |
          cd scripts
          python main.py

      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/

          if [ -d "scripts/data" ]; then
            echo "📤 Syncing scripts/data/ -> root data/"
            rsync -a --delete \
              --exclude "debug/" \
              --exclude "ai_cache/" \
              scripts/data/ data/
          fi

          echo "🧹 Ensure AI cache is not committed"
          rm -rf data/ai_cache || true

          git add data/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update prediction data (today-only strict-ai-no-cache)"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi