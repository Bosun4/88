name: Football AI Predict

on:
  schedule:
    # 北京时间 11:30 = UTC 03:30
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-ai-predict-single-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore runtime data cache into scripts
        run: |
          mkdir -p scripts/data
          if [ -d "data" ]; then
            echo "♻️ Restoring root data/ into scripts/data/"
            rsync -a data/ scripts/data/ || true
          else
            echo "ℹ️ No root data/ directory found, start clean."
          fi

      - name: Run Predictions
        env:
          # ============================================================
          # 主数据源
          # ============================================================
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          # ============================================================
          # 通用中转变量：如果 predict.py 支持 API_KEY / API_URL，会优先读取
          # ============================================================
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}

          # ============================================================
          # 四模型变量：兼容旧代码
          # 如果你已经统一为 API_KEY / API_URL，也可以把下面四组都改成 secrets.API_KEY / secrets.API_URL
          # ============================================================
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}

          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}

          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}

          # ============================================================
          # 只跑今日竞彩业务日
          # ============================================================
          VMAX_RUN_DAYS: today
          AI_RUN_DAYS: today
          VMAX_DATE_SHIFT_HOURS: "11"

          # ============================================================
          # 4场一批，小批次串行
          # ============================================================
          AI_BATCH_SIZE: "4"
          AI_BATCH_CONCURRENCY: "1"

          # ============================================================
          # 按量 key：先不并发模型，避免重复扣费和排查困难
          # 后续稳定后可改 AI_MODEL_CONCURRENCY=2、AI_PHASE1_PARALLEL=true
          # ============================================================
          AI_MODEL_CONCURRENCY: "1"
          AI_PHASE1_PARALLEL: "false"

          # ============================================================
          # Claude 条件触发与压缩终审
          # ============================================================
          AI_RUN_CLAUDE_ONLY_IF_PHASE1_VALID: "true"
          AI_MIN_PHASE1_VALID_FOR_CLAUDE: "2"
          AI_MAX_REQUESTS_PER_AI: "1"
          AI_USE_COMPACT_CLAUDE_AUDIT: "true"
          AI_MAX_PHASE1_REASON_CHARS_FOR_CLAUDE: "350"

          # ============================================================
          # 持久化缓存：必须配合 Restore runtime data cache into scripts 使用
          # ============================================================
          AI_PERSISTENT_CACHE_ENABLED: "true"
          AI_CACHE_DIR: "data/ai_cache"
          AI_CACHE_STRIP_VOLATILE_KEYS: "true"
          AI_DISK_LOCK_WAIT_SECONDS: "900"
          AI_DISK_LOCK_POLL_SECONDS: "3"
          AI_DECISION_CACHE_TTL: "1800"
          AI_WRITE_BATCH_RESULT_IMMEDIATELY: "true"

          # ============================================================
          # main.py 运行锁
          # ============================================================
          VMAX_MAIN_LOCK_STALE_SECONDS: "7200"

        run: |
          cd scripts
          python main.py

      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/

          if [ -d "scripts/data" ]; then
            echo "📤 Syncing scripts/data/ -> root data/"
            rsync -a --delete --exclude "debug/" scripts/data/ data/
          fi

          git add data/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update prediction data (today-only 4-batch AI)"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi