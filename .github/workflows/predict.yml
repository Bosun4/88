name: Football AI Predict

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-ai-predict-single-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests (regression gate)
        run: |
          python -m pytest -q

      - name: Prepare runtime data directories
        run: |
          mkdir -p data
          mkdir -p data/ai_phase_results

          echo "🧹 Clearing old AI cache to avoid stale prediction pollution"
          rm -rf data/ai_cache || true

          echo "📁 Ensure AI phase result directory exists"
          mkdir -p data/ai_phase_results

      - name: Run Predictions
        env:
          PYTHONUNBUFFERED: "1"

          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}

          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}

          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}

          AI_RUN_MODE: "fast_batch"
          AI_CHUNK_SIZE: "12"
          AI_CHUNK_CONCURRENCY: "3"
          AI_MODEL_CONCURRENCY: "4"
          AI_PHASE1_PARALLEL: "true"

          VMAX_RUN_DAYS: "today"
          AI_RUN_DAYS: "today"
          VMAX_DATE_SHIFT_HOURS: "11"

          AI_CONNECT_TIMEOUT: "120"
          AI_READ_TIMEOUT: "3600"
          AI_CLAUDE_CONNECT_TIMEOUT: "120"
          AI_CLAUDE_READ_TIMEOUT: "7200"
          AI_HTTP_TOTAL_TIMEOUT: "0"

          STRICT_ONE_CALL_PER_MODEL: "true"
          AI_MAX_REQUESTS_PER_AI: "3"
          AI_CLAUDE_MAX_REQUESTS: "1"
          AI_ALLOW_SECOND_CALL_REPAIR: "false"
          AI_ENABLE_CLAUDE_JSON_REPAIR: "false"
          AI_ENABLE_ANY_MODEL_JSON_REPAIR: "false"
          AI_CLAUDE_RETRY_BACKOFF_SECONDS: "20"

          AI_RUN_CLAUDE_ONLY_IF_PHASE1_VALID: "false"
          AI_RUN_CLAUDE_ALWAYS: "true"
          AI_MIN_PHASE1_VALID_FOR_CLAUDE: "0"

          AI_USE_COMPACT_CLAUDE_AUDIT: "true"
          AI_MAX_PHASE1_REASON_CHARS_FOR_CLAUDE: "350"
          CLAUDE_RAW_PACKET_CHAR_LIMIT: "4500"
          CLAUDE_MATCH_SUMMARY_CHAR_LIMIT: "2200"
          CLAUDE_COMPACT_FIELD_LIMIT: "2500"

          AI_ALLOW_TEXT_FALLBACK: "false"
          AI_ALLOW_CLAUDE_TEXT_FALLBACK: "false"
          AI_SAFE_TEXT_FALLBACK_ONLY: "false"

          AI_REQUIRE_FULL_BATCH_COVERAGE: "true"
          AI_ACCEPT_PARTIAL_PHASE1: "false"
          AI_ACCEPT_PARTIAL_CLAUDE: "false"
          AI_PARTIAL_AS_FAILED: "true"

          AI_ENABLE_CACHE: "false"
          AI_DISABLE_CACHE: "true"
          AI_PERSISTENT_CACHE_ENABLED: "false"
          AI_SINGLEFLIGHT_ENABLED: "false"
          AI_DECISION_CACHE_TTL: "0"
          AI_CACHE_DIR: "data/ai_cache"
          AI_CACHE_STRIP_VOLATILE_KEYS: "true"

          AI_PHASE_SNAPSHOT_ENABLED: "true"
          AI_PHASE_RESULT_DIR: "data/ai_phase_results"
          AI_SAVE_PARTIAL_REJECTED_RESULTS: "true"
          AI_WRITE_BATCH_RESULT_IMMEDIATELY: "true"
          AI_SAVE_RAW_RESPONSE: "false"
          AI_PARSE_DEBUG: "false"

          AI_DISK_LOCK_WAIT_SECONDS: "30"
          AI_DISK_LOCK_POLL_SECONDS: "3"

          VMAX_MAIN_LOCK_STALE_SECONDS: "21600"

          SKIP_AUTO_INSTALL: "true"

        run: |
          python scripts/main.py

      - name: Upload AI phase/debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-phase-debug-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            data/ai_phase_results/
            data/debug/
            data/debug_v20/
            data/predictions.json

      - name: Push data updates
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/

          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "❌ origin/main 已在本次预测运行期间前进，拒绝把旧基底产物强行合并发布。请重新触发一次预测。"
            exit 1
          fi

          echo "🧹 Ensure runtime debug/cache artifacts are not committed"
          rm -rf data/ai_cache data/debug data/debug_v20 || true

          latest_history="$(find data -maxdepth 1 -type f -name 'history_*_today_*.json' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          latest_snapshot="$(find data/snapshots -maxdepth 1 -type f -name '*_today_*.json' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2-)"

          echo "🔒 JSON 硬闸: 产物必须能被浏览器 JSON.parse 解析"
          node -e 'const fs=require("fs"); for (const p of process.argv.slice(1)) { JSON.parse(fs.readFileSync(p,"utf8")); console.log("JSON OK", p); }' data/predictions.json ${latest_history:+"$latest_history"} ${latest_snapshot:+"$latest_snapshot"}

          echo "🔒 冲突标记硬闸: 绝不推送带 git 冲突标记的损坏产物"
          if grep -nE '^(<<<<<<<|=======|>>>>>>>)' data/predictions.json ${latest_history:+"$latest_history"} ${latest_snapshot:+"$latest_snapshot"}; then
            echo "❌ 检测到未解决的 git 冲突标记，中止本次推送，保护线上产物。"
            exit 1
          fi

          git add data/predictions.json
          if [ -n "$latest_history" ]; then
            git add "$latest_history"
          fi
          if [ -n "$latest_snapshot" ]; then
            git add "$latest_snapshot"
          fi
          echo "✅ JSON 与冲突标记硬闸通过，继续。"

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-update prediction data (manual event-driven strict-ai-no-cache)"
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi
