name: Football AI
on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4 lxml numpy scipy scikit-learn
      - name: Run
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
        run: cd scripts && python main.py
      - name: Push
        run: |
          cp -r scripts/data/* data/ 2>/dev/null || true
          git config user.name "Bot"
          git config user.email "bot@predict.ai"
          git add data/
          git diff --cached --quiet || git commit -m "🔮 $(TZ='Asia/Shanghai' date '+%m-%d %H:%M')"
          git push
