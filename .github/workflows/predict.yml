name: Football AI Predict

on:
  schedule:
    # 北京时间 11:30 = UTC 03:30
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run Predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          # 🔥 4大引擎环境变量全链路打通
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}

          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}

          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}

          # ============================================================
          # 只跑今日竞彩业务日
          # ============================================================
          VMAX_RUN_DAYS: today
          AI_RUN_DAYS: today

          # 北京时间凌晨 00:00-10:59 仍归入前一个竞彩业务日
          VMAX_DATE_SHIFT_HOURS: "11"

          # ============================================================
          # AI 等待时间拉长：重点解决 Claude 首字慢、输出长导致断开
          # ============================================================
          AI_CONNECT_TIMEOUT: "60"
          AI_READ_TIMEOUT: "1200"
          CLAUDE_READ_TIMEOUT: "2400"

          # 每个模型只请求一次，不重复扣费
          AI_MAX_REQUESTS_PER_AI: "1"

          # Claude 慢输出时，锁等待也要同步拉长
          AI_DISK_LOCK_WAIT_SECONDS: "3000"
          AI_DISK_LOCK_POLL_SECONDS: "3"

          # 缓存时间拉长，避免短时间内重复跑
          AI_PERSISTENT_CACHE_ENABLED: "true"
          AI_CACHE_DIR: "data/ai_cache"
          AI_CACHE_STRIP_VOLATILE_KEYS: "true"
          AI_DECISION_CACHE_TTL: "3600"

          # main.py 运行锁
          VMAX_MAIN_LOCK_STALE_SECONDS: "10800"

        run: |
          cd scripts
          python main.py

      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/
          if [ -d "scripts/data" ]; then
            cp -r scripts/data/* data/
          fi

          git add data/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update prediction data (4引擎满血交叉验证版)"
            git pull --rebase origin main || true
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi