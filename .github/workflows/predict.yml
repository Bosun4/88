name: Football AI Predict

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - run: pip install -r requirements.txt
      
      - name: Run Predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # 🔥 4大引擎环境变量全链路打通
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}
        run: |
          cd scripts
          python main.py
          
      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir -p data/
          if [ -d "scripts/data" ]; then
            cp -r scripts/data/* data/
          fi
          
          git add data/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update prediction data (4引擎满血交叉验证版)"
            git pull --rebase origin main || true
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi
