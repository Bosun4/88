name: Football AI Predict

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - run: pip install -r requirements.txt
      
      - name: Run Predictions
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cd scripts
          python main.py
          
      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          mkdir -p data/
          cp -r scripts/data/* data/ || echo "No data generated"
          
          git add data/
          
          # 🔥 极客级防御：检测是否有文件变动。无变动则直接成功退出，不强行commit引发报错！
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git commit -m "🤖 自动更新比赛预测数据 (智能拦截空提交版)"
            git pull --rebase origin main || git pull origin main
            git push
            echo "✅ 新数据已成功推送到云端！"
          else
            echo "✅ 本次测算数据与云端完全一致，无新增改动，安全跳过提交。"
          fi
