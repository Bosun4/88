name: Football AI Predict

on:
  schedule:
    # 北京时间 11:30 = UTC 03:30
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: football-ai-predict-single-run
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore runtime data cache into scripts
        run: |
          mkdir -p scripts/data
          if [ -d "data" ]; then
            echo "♻️ Restoring root data/ into scripts/data/"
            rsync -a data/ scripts/data/ || true
          else
            echo "ℹ️ No root data/ directory found, start clean."
          fi

      - name: Run Predictions
        env:
          # ============================================================
          # 主数据源
          # ============================================================
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          # ============================================================
          # 旧版四模型变量
          # 不传 API_KEY / API_URL，避免抢占 GPT_API_URL
          # 如果四家都走同一个中转，就在 GitHub Secrets 里把这四组填成同一个 key/url
          # ============================================================
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          GPT_API_URL: ${{ secrets.GPT_API_URL }}

          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_API_URL: ${{ secrets.GROK_API_URL }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}

          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: ${{ secrets.CLAUDE_API_URL }}

          # ============================================================
          # 只跑今日竞彩业务日
          # 北京时间凌晨 00:00-10:59 仍归入前一个竞彩业务日
          # ============================================================
          VMAX_RUN_DAYS: today
          AI_RUN_DAYS: today
          VMAX_DATE_SHIFT_HOURS: "11"

          # ============================================================
          # AI 等待时间
          # GPT / Grok / Gemini：300秒
          # Claude：600秒
          # ============================================================
          AI_CONNECT_TIMEOUT: "45"
          AI_READ_TIMEOUT: "600"

          AI_CLAUDE_CONNECT_TIMEOUT: "60"
          AI_CLAUDE_READ_TIMEOUT: "900"

          # 不增加请求轮数，避免重复扣费
          AI_MAX_REQUESTS_PER_AI: "1"
          AI_CLAUDE_MAX_REQUESTS: "1"
          AI_CLAUDE_RETRY_BACKOFF_SECONDS: "20"

          # ============================================================
          # Claude 条件触发与压缩终审
          # Phase1 有效不足时跳过 Claude
          # ============================================================
          AI_RUN_CLAUDE_ONLY_IF_PHASE1_VALID: "true"
          AI_MIN_PHASE1_VALID_FOR_CLAUDE: "2"

          AI_USE_COMPACT_CLAUDE_AUDIT: "true"
          AI_MAX_PHASE1_REASON_CHARS_FOR_CLAUDE: "350"
          CLAUDE_RAW_PACKET_CHAR_LIMIT: "4500"
          CLAUDE_MATCH_SUMMARY_CHAR_LIMIT: "2200"

          # ============================================================
          # 持久化缓存
          # ============================================================
          AI_PERSISTENT_CACHE_ENABLED: "true"
          AI_CACHE_DIR: "data/ai_cache"
          AI_CACHE_STRIP_VOLATILE_KEYS: "true"

          # Claude 600秒，所以磁盘锁等待必须大于 Claude 等待时间
          AI_DISK_LOCK_WAIT_SECONDS: "900"
          AI_DISK_LOCK_POLL_SECONDS: "3"

          AI_DECISION_CACHE_TTL: "1800"
          AI_WRITE_BATCH_RESULT_IMMEDIATELY: "true"

          # ============================================================
          # main.py 运行锁
          # ============================================================
          VMAX_MAIN_LOCK_STALE_SECONDS: "7200"

          # workflow 已经 pip install，这里让 main.py 跳过二次自动安装
          SKIP_AUTO_INSTALL: "true"

        run: |
          cd scripts
          python main.py

      - name: Push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p data/

          if [ -d "scripts/data" ]; then
            echo "📤 Syncing scripts/data/ -> root data/"
            rsync -a --delete --exclude "debug/" scripts/data/ data/
          fi

          git add data/

          if ! git diff-index --quiet HEAD; then
            git commit -m "🤖 Auto-update prediction data (today-only old-ai-env)"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "✅ 本次测算数据无变动，安全退出。"
          fi