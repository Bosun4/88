<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鱼儿足球量化终端 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        /* 剔除廉价渐变，采用专业数据终端的冷峻色调 */
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #050505; color: #e2e8f0; }
        .font-num { font-family: 'JetBrains Mono', monospace; } /* 专用的数据等宽字体 */
        
        /* 严谨的卡片面板 */
        .quant-panel { background: #0f1115; border: 1px solid #1e2430; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        .quant-panel:hover { border-color: #2d3748; }
        
        /* 顶部推荐卡片特制样式 */
        .top4-card { background: linear-gradient(180deg, #161b22 0%, #0d1117 100%); border-top: 3px solid #d97706; }
        
        /* 专业概率动能条 */
        .prob-bar-container { background: #1a202c; border: 1px solid #2d3748; overflow: hidden; }
        .prob-bar-h { background: #2563eb; } /* 主胜-沉稳蓝 */
        .prob-bar-d { background: #475569; } /* 平局-中性灰 */
        .prob-bar-a { background: #dc2626; } /* 客胜-警戒红 */
        
        /* 报告样式边框 */
        .report-border-gpt { border-left: 3px solid #3b82f6; }
        .report-border-claude { border-left: 3px solid #0d9488; }
        .report-border-gemini { border-top: 3px solid #6366f1; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #334155; }
        
        /* 专业级选项卡 */
        .tab-btn { flex: 1; text-align: center; padding: 0.5rem 0; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #e2e8f0; border-bottom-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        
        details summary::-webkit-details-marker { display: none; }
        .badge-extreme { animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { border-color: rgba(220,38,38,1); } 50% { border-color: rgba(220,38,38,0.3); } 100% { border-color: rgba(220,38,38,1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-[#0a0c10] border-b border-[#1e2430] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="w-2 h-6 bg-blue-600 rounded-sm"></div>
                <h1 class="text-xl font-bold tracking-wider text-slate-100 uppercase">Quant <span class="text-blue-500 font-black">Pro</span> Terminal</h1>
            </div>
            <div class="flex items-center gap-3 font-num text-xs">
                <span class="flex items-center gap-1.5 bg-green-900/20 text-green-500 border border-green-800/50 px-2.5 py-1 rounded">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    SYS_ONLINE
                </span>
                <span class="bg-[#161b22] border border-[#30363d] px-2.5 py-1 rounded text-slate-400" id="update-time">SYNC: --:--</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-6 space-y-6">
        
        <section class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashboard"></section>
        
        <section>
            <div class="flex items-center gap-2 mb-3 border-b border-[#1e2430] pb-2">
                <span class="text-sm font-bold text-slate-300 uppercase tracking-widest">S-Tier Consensus / 顶级共识池</span>
                <span class="bg-amber-500/20 text-amber-500 text-[10px] px-1.5 py-0.5 rounded border border-amber-500/30">TOP 4</span>
            </div>
            <div id="top4-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section class="pt-2">
            <div class="flex mb-5 border-b border-[#1e2430] max-w-sm">
                <button onclick="switchTab('yesterday')" id="tab-yesterday" class="tab-btn">T-1 历史完场</button>
                <button onclick="switchTab('today')" id="tab-today" class="tab-btn active">T-0 今日盘口</button>
                <button onclick="switchTab('tomorrow')" id="tab-tomorrow" class="tab-btn">T+1 明日远期</button>
            </div>
            <div id="matches-container" class="grid grid-cols-1 lg:grid-cols-2 gap-5"></div>
        </section>
    </main>

    <script>
        let allData = null;
        let currentTab = 'today';

        fetch('data/predictions.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                document.getElementById('update-time').textContent = "SYNC: " + data.update_time.split(' ')[1];
                renderDashboard();
                renderTop4(data.top4);
                renderMatches(currentTab);
            })
            .catch(err => {
                document.getElementById('matches-container').innerHTML = `<div class="col-span-full text-rose-500 text-sm font-num text-center py-10 quant-panel rounded">ERR_CONNECTION_REFUSED: 获取数据流失败</div>`;
            });

        function switchTab(tab) {
            currentTab = tab;
            ['yesterday', 'today', 'tomorrow'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(t === tab) { el.classList.add('active'); } 
                else { el.classList.remove('active'); }
            });
            renderMatches(tab);
        }

        function renderDashboard() {
            let total = 0; let consensusCount = 0; let confSum = 0;
            ['yesterday', 'today', 'tomorrow'].forEach(day => {
                const ms = allData.matches[day] || [];
                total += ms.length;
                ms.forEach(m => {
                    confSum += m.prediction.confidence;
                    if(m.prediction.model_consensus >= 3) consensusCount++;
                });
            });
            const avgConf = total > 0 ? Math.round(confSum / total) : 0;
            const top4Count = allData.top4 ? allData.top4.length : 0;

            document.getElementById('dashboard').innerHTML = `
                <div class="quant-panel p-3 flex flex-col justify-center items-start border-l-2 border-l-slate-500"><span class="text-xs text-slate-500 uppercase tracking-wider mb-1">Total Matches</span><span class="text-2xl font-num font-bold text-slate-200">${total}</span></div>
                <div class="quant-panel p-3 flex flex-col justify-center items-start border-l-2 border-l-amber-500"><span class="text-xs text-slate-500 uppercase tracking-wider mb-1">S-Tier Picks</span><span class="text-2xl font-num font-bold text-amber-500">${top4Count}</span></div>
                <div class="quant-panel p-3 flex flex-col justify-center items-start border-l-2 border-l-emerald-500"><span class="text-xs text-slate-500 uppercase tracking-wider mb-1">High Consensus</span><span class="text-2xl font-num font-bold text-emerald-500">${consensusCount}</span></div>
                <div class="quant-panel p-3 flex flex-col justify-center items-start border-l-2 border-l-blue-500"><span class="text-xs text-slate-500 uppercase tracking-wider mb-1">Avg Confidence</span><span class="text-2xl font-num font-bold text-blue-400">${avgConf}%</span></div>
            `;
        }

        function renderTop4(top4List) {
            const container = document.getElementById('top4-container');
            if (!top4List || top4List.length === 0) return container.innerHTML = `<div class="col-span-full text-slate-600 text-xs font-num py-4 text-center">NO_DATA_AVAILABLE</div>`;
            container.innerHTML = top4List.map(match => {
                const p = match.prediction;
                return `
                <div class="top4-card p-4 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="bg-[#161b22] border border-[#30363d] text-slate-300 text-[10px] px-2 py-0.5 font-bold">${match.league}</span>
                            <span class="text-slate-500 text-[10px] font-num">${match.match_num}</span>
                        </div>
                        <span class="text-amber-500 font-num font-bold text-xs bg-amber-500/10 px-2 py-0.5 rounded">RANK ${match.rank}</span>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <div class="w-5/12 text-left font-bold text-slate-200 truncate">${match.home_team}</div>
                        <div class="w-2/12 text-center text-xs text-slate-600 font-black">VS</div>
                        <div class="w-5/12 text-right font-bold text-slate-200 truncate">${match.away_team}</div>
                    </div>
                    <div class="grid grid-cols-3 gap-px bg-[#1e2430] border border-[#1e2430] p-[1px]">
                        <div class="bg-[#0f1115] p-2 text-center"><div class="text-[9px] text-slate-500 mb-0.5 uppercase">Math Score</div><div class="font-num font-bold text-emerald-400 text-sm">${p.predicted_score}</div></div>
                        <div class="bg-[#0f1115] p-2 text-center"><div class="text-[9px] text-slate-500 mb-0.5 uppercase">Direction</div><div class="font-bold text-slate-200 text-sm">${p.result}</div></div>
                        <div class="bg-[#0f1115] p-2 text-center"><div class="text-[9px] text-slate-500 mb-0.5 uppercase">Confidence</div><div class="font-num font-bold text-blue-400 text-sm">${p.confidence}%</div></div>
                    </div>
                </div>`;
            }).join('');
        }

        function cleanMarkdown(text) {
            if (!text) return "N/A";
            return text.replace(/```json/g, '').replace(/```/g, '').trim();
        }

        function renderMatches(tab) {
            const container = document.getElementById('matches-container');
            const matches = allData.matches[tab] || [];
            if (matches.length === 0) return container.innerHTML = `<div class="col-span-full text-center py-10 font-num text-slate-600 text-sm border border-dashed border-slate-800">NO_RECORDS_FOUND</div>`;

            container.innerHTML = matches.map(match => {
                const p = match.prediction;
                const hp = p.home_win_pct; const dp = p.draw_pct; const ap = p.away_win_pct;
                
                let signalHtml = '';
                if(p.smart_money_signal && p.smart_money_signal !== "正常" && p.smart_money_signal !== "盘口与情绪正常") {
                    signalHtml = `<div class="bg-rose-950/30 border border-rose-900/50 text-rose-400 text-[10px] px-2 py-1 mb-3 font-medium tracking-wide flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-rose-500 rounded-full animate-pulse"></span>SYS_ALERT: ${p.smart_money_signal}</div>`;
                }
                
                let extremeHtml = '';
                if (p.extreme_warning && p.extreme_warning !== "无") {
                    extremeHtml = `<div class="absolute -top-px -right-px bg-rose-600 text-white text-[9px] font-bold tracking-widest px-2 py-0.5 uppercase badge-extreme border border-rose-400 z-10">${p.extreme_warning}</div>`;
                }

                const evTags = p.value_bets_summary.map(tag => `<span class="bg-emerald-950/40 text-emerald-400 text-[9px] font-num px-1.5 py-0.5 border border-emerald-800/50">${tag}</span>`).join('');

                let v2Html = '';
                if (p.refined_poisson && p.refined_poisson.v2_details) {
                    const dts = p.refined_poisson.v2_details;
                    v2Html = `
                    <div class="mt-3 bg-[#0a0c10] border border-[#1e2430] p-2">
                        <div class="text-[9px] text-slate-500 mb-1.5 uppercase tracking-wider flex justify-between"><span>V2 Sub-Model Matrix</span> <span class="text-amber-600">🎯 P-GRID</span></div>
                        <div class="grid grid-cols-4 gap-1">
                            <div class="text-center bg-[#161b22] border border-[#30363d] py-1"><div class="text-[8px] text-slate-500">2-2</div><div class="font-num text-xs text-slate-300">${dts.p22||'-'}</div></div>
                            <div class="text-center bg-[#161b22] border border-[#30363d] py-1"><div class="text-[8px] text-slate-500">1-1</div><div class="font-num text-xs text-slate-300">${dts.p11||'-'}</div></div>
                            <div class="text-center bg-[#161b22] border border-[#30363d] py-1"><div class="text-[8px] text-slate-500">2-1</div><div class="font-num text-xs text-slate-300">${dts.p21||'-'}</div></div>
                            <div class="text-center bg-[#161b22] border border-[#30363d] py-1"><div class="text-[8px] text-slate-500">1-2</div><div class="font-num text-xs text-slate-300">${dts.p12||'-'}</div></div>
                        </div>
                    </div>
                    `;
                }

                return `
                <div class="quant-panel flex flex-col relative overflow-hidden">
                    ${extremeHtml}
                    <div class="bg-[#161b22] border-b border-[#30363d] px-3 py-2 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-300 bg-[#30363d] px-1.5 py-0.5">${match.league}</span>
                            <span class="text-[10px] font-num text-slate-400">${match.match_num}</span>
                            ${match.is_recommended ? `<span class="bg-amber-500 text-black text-[9px] px-1 font-bold uppercase tracking-wider">Target</span>` : ''}
                        </div>
                        <div class="text-[10px] font-num text-slate-500 tracking-wider">${match.match_time || '00:00'}</div>
                    </div>
                    
                    <div class="p-4 flex-grow">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-5/12 text-right"><div class="font-bold text-base md:text-lg text-slate-100 truncate">${match.home_team}</div></div>
                            <div class="w-2/12 flex flex-col items-center">
                                <div class="text-2xl font-num font-black text-emerald-400 tracking-tighter">${p.predicted_score}</div>
                                <div class="text-[8px] mt-0.5 text-slate-500 uppercase tracking-widest">Base Score</div>
                            </div>
                            <div class="w-5/12 text-left"><div class="font-bold text-base md:text-lg text-slate-100 truncate">${match.away_team}</div></div>
                        </div>

                        <div class="mb-4">
                            <div class="flex justify-between text-[9px] font-num mb-1 uppercase tracking-widest">
                                <span class="text-blue-500">H ${hp}%</span>
                                <span class="text-slate-500">D ${dp}%</span>
                                <span class="text-rose-500">A ${ap}%</span>
                            </div>
                            <div class="w-full prob-bar-container h-1.5 flex">
                                <div class="prob-bar-h h-full" style="width: ${hp}%"></div>
                                <div class="prob-bar-d h-full" style="width: ${dp}%"></div>
                                <div class="prob-bar-a h-full" style="width: ${ap}%"></div>
                            </div>
                            <div class="text-[8px] text-slate-600 text-right mt-1 uppercase">Underlying Math Engine</div>
                        </div>

                        ${signalHtml}
                        ${evTags ? `<div class="flex flex-wrap gap-1.5 mb-3">${evTags}</div>` : ''}
                        ${v2Html}

                        <div class="mt-4 bg-[#0a0c10] border border-[#1e2430]">
                            <div class="p-3 bg-[#161b22]/50 report-border-gemini">
                                <div class="flex justify-between items-center mb-1.5">
                                    <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider flex items-center gap-1"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1z" clip-rule="evenodd"></path></svg> CIO 终裁</span>
                                    <span class="text-xs font-num font-bold text-slate-100 border border-slate-700 px-1.5 bg-[#0f1115]">${p.gemini_score}</span>
                                </div>
                                <div class="text-[11px] text-slate-300 leading-relaxed text-justify">
                                    ${cleanMarkdown(p.gemini_analysis)}
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 border-t border-[#1e2430]">
                                <div class="p-3 report-border-gpt bg-[#0f1115] border-b md:border-b-0 md:border-r border-[#1e2430]">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-[9px] font-bold text-blue-500 uppercase">Analyst 1 [GPT-5]</span>
                                        <span class="text-[10px] font-num text-slate-300">${p.gpt_score}</span>
                                    </div>
                                    <p class="text-[10px] text-slate-400 leading-snug">${cleanMarkdown(p.gpt_analysis)}</p>
                                </div>
                                <div class="p-3 report-border-claude bg-[#0f1115]">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-[9px] font-bold text-teal-500 uppercase">Analyst 2 [Claude]</span>
                                        <span class="text-[10px] font-num text-slate-300">${p.claude_score}</span>
                                    </div>
                                    <p class="text-[10px] text-slate-400 leading-snug">${cleanMarkdown(p.claude_analysis)}</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
