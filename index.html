<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.0 | 足球量化精算系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e7eb; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .recommend-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); }
        .gradient-text { background: linear-gradient(45deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .match-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .match-card:hover { transform: translateY(-2px); background: rgba(31, 41, 55, 0.5); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="sticky top-0 z-50 glass border-b border-white/5 px-4 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-robot text-white text-sm"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Gemini <span class="text-blue-500">Flash</span> <span class="text-xs font-light text-gray-500">v3.2</span></h1>
            </div>
            <div id="last-update" class="text-[10px] text-gray-500 text-right">
                初始化中...
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 rounded-2xl">
                <p class="text-gray-500 text-xs mb-1">今日监控赛事</p>
                <h3 id="stat-total" class="text-2xl font-bold">-</h3>
            </div>
            <div class="glass p-4 rounded-2xl border-l-4 border-emerald-500">
                <p class="text-gray-500 text-xs mb-1">AI 强信心推荐</p>
                <h3 id="stat-rec" class="text-2xl font-bold text-emerald-400">-</h3>
            </div>
            <div id="market-sentiment" class="col-span-2 glass p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p class="text-gray-500 text-xs mb-1">机构资金情绪</p>
                    <div class="flex items-center space-x-2">
                        <span id="sentiment-label" class="text-sm font-semibold text-purple-400">正在扫描盘口...</span>
                    </div>
                </div>
                <i class="fas fa-chart-line text-purple-500/50 text-2xl"></i>
            </div>
        </div>

        <div class="flex space-x-4 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="filterMatches('all')" class="px-4 py-1.5 rounded-full text-xs font-medium glass hover:bg-white/10 transition">全部</button>
            <button onclick="filterMatches('recommended')" class="px-4 py-1.5 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">精选</button>
            <button onclick="filterMatches('high_ev')" class="px-4 py-1.5 rounded-full text-xs font-medium bg-purple-500/10 text-purple-400 border border-purple-500/20">高期望值</button>
        </div>

        <div id="match-container" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 opacity-20">
                <i class="fas fa-circle-notch animate-spin text-4xl mb-4"></i>
                <p>正在同步全球盘口数据...</p>
            </div>
        </div>
    </main>

    <script>
        let allMatches = [];

        async function init() {
            try {
                const r = await fetch('data/latest.json?t=' + Date.now());
                const data = await r.json();
                allMatches = data.matches;
                document.getElementById('last-update').innerHTML = `数据源: Wencai API<br>更新于: ${data.fetch_time}`;
                render(allMatches);
            } catch (e) {
                document.getElementById('match-container').innerHTML = `<p class="text-center text-red-500">数据加载失败，请检查脚本运行状态。</p>`;
            }
        }

        function render(matches) {
            const container = document.getElementById('match-container');
            container.innerHTML = '';
            
            document.getElementById('stat-total').innerText = matches.length;
            document.getElementById('stat-rec').innerText = matches.filter(m => m.is_recommended).length;

            matches.forEach(m => {
                container.appendChild(createMatchCard(m));
            });
        }

        function createMatchCard(m) {
            const div = document.createElement('div');
            const pred = m.prediction;
            const mId = m.match_id;
            const isRec = m.is_recommended;
            
            div.className = `match-card glass rounded-2xl overflow-hidden ${isRec ? 'recommend-glow' : ''}`;
            
            // 核心概率计算
            const homeW = pred.home_win_pct;
            const drawW = pred.draw_pct;
            const awayW = pred.away_win_pct;

            div.innerHTML = `
                <div class="p-4">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] px-2 py-0.5 rounded bg-white/5 text-gray-400 font-mono">${m.match_num || ''} ${m.league}</span>
                        <div class="flex space-x-2">
                            ${isRec ? '<span class="text-[10px] bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold italic">AI STRONG PICK</span>' : ''}
                            <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/20">信心 ${pred.confidence}%</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 items-center gap-2 mb-6">
                        <div class="text-center">
                            <div class="text-lg font-bold truncate">${m.home_team}</div>
                            <div class="text-[10px] text-gray-500">排名 ${m.home_stats.rank || 'N/A'}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-black text-blue-500">${pred.predicted_score}</div>
                            <div class="text-[10px] text-gray-500 uppercase tracking-widest">${pred.result}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-lg font-bold truncate">${m.away_team}</div>
                            <div class="text-[10px] text-gray-500">排名 ${m.away_stats.rank || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="w-full h-1.5 flex rounded-full overflow-hidden bg-gray-800 mb-2">
                        <div style="width: ${homeW}%" class="bg-blue-500"></div>
                        <div style="width: ${drawW}%" class="bg-gray-600"></div>
                        <div style="width: ${awayW}%" class="bg-red-500"></div>
                    </div>
                    <div class="flex justify-between text-[10px] font-mono text-gray-400 mb-4">
                        <span>主胜 ${homeW}%</span>
                        <span>平局 ${drawW}%</span>
                        <span>客胜 ${awayW}%</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-white/5 rounded-lg p-2 text-center">
                            <div class="text-gray-500 text-[10px]">大小球 (2.5)</div>
                            <div class="text-sm font-bold">${pred.over_under_2_5}</div>
                        </div>
                        <div class="bg-white/5 rounded-lg p-2 text-center">
                            <div class="text-gray-500 text-[10px]">双边进球</div>
                            <div class="text-sm font-bold">${pred.both_score}</div>
                        </div>
                    </div>

                    <button onclick="toggleDetails('${mId}')" class="w-full py-2 bg-white/5 hover:bg-white/10 rounded-xl text-xs text-gray-400 transition flex items-center justify-center">
                        <i class="fas fa-chevron-down mr-2" id="icon-${mId}"></i> 展开深度量化研报
                    </button>

                    <div id="details-${mId}" class="hidden mt-4 space-y-3 pt-4 border-t border-white/5">
                        
                        ${m.intelligence ? `
                        <div class="border border-red-900/30 bg-red-900/10 p-2 rounded-lg">
                            <div class="text-red-400 text-[11px] font-bold mb-1 flex items-center">
                                <i class="fas fa-user-injured mr-1 text-[10px]"></i> 伤停利空情报
                            </div>
                            <div class="text-[10px] text-gray-300 leading-relaxed">
                                ${m.intelligence.home_injury ? `<p><span class="text-red-500/70">主:</span> ${m.intelligence.home_injury}</p>` : ''}
                                ${m.intelligence.guest_injury ? `<p><span class="text-red-500/70">客:</span> ${m.intelligence.guest_injury}</p>` : ''}
                                ${m.intelligence.home_bad_news ? `<p class="mt-1 text-gray-400 italic">${m.intelligence.home_bad_news}</p>` : ''}
                            </div>
                        </div>` : ''}

                        ${m.handicap_info || m.odds_movement ? `
                        <div class="border border-purple-900/50 bg-purple-900/10 p-2 rounded-lg">
                            <div class="text-purple-400 text-[11px] font-bold mb-1 flex items-center">
                                <i class="fas fa-hand-holding-usd mr-1 text-[10px]"></i> 资金盘口追踪
                            </div>
                            <div class="text-[10px] space-y-1">
                                <div class="flex justify-between"><span class="text-gray-500">让球盘口:</span> <span class="text-white font-mono">${m.handicap_info}</span></div>
                                <div class="flex justify-between"><span class="text-gray-500">资金水位异动:</span> <span class="${m.odds_movement.includes('降水') ? 'text-emerald-400 font-bold' : 'text-gray-300'}">${m.odds_movement}</span></div>
                            </div>
                        </div>` : ''}

                        <div class="bg-blue-500/5 p-2 rounded-lg">
                            <div class="text-blue-400 text-[11px] font-bold mb-1 flex items-center">
                                <i class="fas fa-calculator mr-1"></i> 期望值(EV)与对冲建议
                            </div>
                            <div class="text-[10px] font-mono text-gray-400">
                                ${pred.value_bets_summary && pred.value_bets_summary.length > 0 ? 
                                    pred.value_bets_summary.map(v => `<div class="text-emerald-400">★ ${v}</div>`).join('') : 
                                    '<div>无明显套利空间，建议观望。</div>'}
                            </div>
                        </div>

                        <div class="text-[11px] leading-relaxed text-gray-400 bg-black/30 p-3 rounded-xl border border-white/5 italic">
                            <span class="text-gray-500 font-bold not-italic block mb-1">精算师复盘:</span>
                            "${pred.gemini_analysis || pred.gpt_analysis}"
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        function toggleDetails(id) {
            const el = document.getElementById(`details-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            el.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-up');
            icon.classList.toggle('fa-chevron-down');
        }

        function filterMatches(type) {
            if (type === 'all') render(allMatches);
            else if (type === 'recommended') render(allMatches.filter(m => m.is_recommended));
            else if (type === 'high_ev') render(allMatches.filter(m => m.prediction.value_bets_summary.length > 0));
        }

        init();
        setInterval(init, 300000); // 5分钟自动刷新
    </script>
</body>
</html>
