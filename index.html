<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小鱼儿足球分析 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #0B1120; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .top4-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); border-top: 3px solid #f59e0b; }
        .prob-bar-h { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .prob-bar-d { background: #64748b; }
        .prob-bar-a { background: linear-gradient(90deg, #f43f5e, #e11d48); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-btn { flex: 1; text-align: center; padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; transition: all 0.3s ease; color: #94a3b8; }
        .tab-btn.active { background-color: #3b82f6; color: #ffffff; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5); }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.3s ease-in-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="glass-panel sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-2">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-emerald-400 flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-500/20">Pro</div>
                <h1 class="text-2xl font-black tracking-tight text-white">AI竞彩预测 <span class="text-orange-400">Pro</span></h1>
            </div>
            <div class="flex items-center gap-2 text-xs font-medium bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span id="update-time" class="text-slate-300">最后更新: 加载中...</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-6 space-y-8">
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4" id="dashboard"></section>
        
        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-xl font-bold text-white flex items-center gap-2">🎯 精选推荐 <span class="bg-orange-500 text-white text-xs px-2 py-0.5 rounded font-black shadow-lg shadow-orange-500/30">TOP 4</span></span>
            </div>
            <div id="top4-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section class="pt-4">
            <div class="bg-slate-800/60 p-1.5 rounded-full flex mb-6 border border-slate-700/50 shadow-inner max-w-md mx-auto">
                <button onclick="switchTab('yesterday')" id="tab-yesterday" class="tab-btn">昨日赛事</button>
                <button onclick="switchTab('today')" id="tab-today" class="tab-btn active">今日赛事</button>
                <button onclick="switchTab('tomorrow')" id="tab-tomorrow" class="tab-btn">明日赛事</button>
            </div>
            <div id="matches-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <script>
        let allData = null;
        let currentTab = 'today';

        fetch('data/predictions.json')
            .then(res => res.json())
            .then(data => {
                allData = data;
                document.getElementById('update-time').textContent = data.update_time;
                renderDashboard();
                renderTop4(data.top4);
                renderMatches(currentTab);
            })
            .catch(err => {
                document.getElementById('matches-container').innerHTML = `<div class="col-span-full text-red-400 text-center py-10 glass-panel rounded-2xl">获取数据失败，请检查后端。</div>`;
            });

        function switchTab(tab) {
            currentTab = tab;
            ['yesterday', 'today', 'tomorrow'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(t === tab) { el.classList.add('active'); } 
                else { el.classList.remove('active'); }
            });
            renderMatches(tab);
        }

        function renderDashboard() {
            let total = 0; let highConf = 0; let consensusCount = 0; let confSum = 0;
            ['yesterday', 'today', 'tomorrow'].forEach(day => {
                const ms = allData.matches[day] || [];
                total += ms.length;
                ms.forEach(m => {
                    confSum += m.prediction.confidence;
                    if(m.prediction.model_consensus >= 3) consensusCount++;
                });
            });
            const avgConf = total > 0 ? Math.round(confSum / total) : 0;
            const top4Count = allData.top4 ? allData.top4.length : 0;

            document.getElementById('dashboard').innerHTML = `
                <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center items-center"><span class="text-3xl font-black text-orange-400">${total}</span><span class="text-xs text-slate-400 mt-1">竞彩总场次</span></div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center items-center"><span class="text-3xl font-black text-emerald-400">${top4Count}</span><span class="text-xs text-slate-400 mt-1">精选推荐</span></div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center items-center"><span class="text-3xl font-black text-purple-400">${consensusCount}</span><span class="text-xs text-slate-400 mt-1">高共识场次</span></div>
                <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center items-center"><span class="text-3xl font-black text-pink-400">${avgConf}%</span><span class="text-xs text-slate-400 mt-1">本地平均置信</span></div>
            `;
        }

        function renderTop4(top4List) {
            const container = document.getElementById('top4-container');
            if (!top4List || top4List.length === 0) return container.innerHTML = `<div class="col-span-full text-slate-500 text-sm text-center py-4 glass-panel rounded-xl">今日暂无精选推荐</div>`;
            container.innerHTML = top4List.map(match => {
                const p = match.prediction;
                const poiScore = p.refined_poisson?.predicted_score || "?-?";
                return `
                <div class="top4-card rounded-2xl p-5 shadow-lg relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4 relative z-10"><div class="flex items-center gap-2"><span class="text-xs font-bold text-slate-300">${match.league}</span><span class="text-xs text-slate-500">${match.match_num}</span></div><div class="w-6 h-6 rounded-full bg-orange-500 flex items-center justify-center text-white font-black text-xs shadow-md shadow-orange-500/50">${match.rank}</div></div>
                    <div class="flex justify-between items-center mb-5 relative z-10"><div class="w-2/5 text-left font-bold text-lg truncate">${match.home_team}</div><div class="text-xs text-slate-600 font-black italic">VS</div><div class="w-2/5 text-right font-bold text-lg truncate">${match.away_team}</div></div>
                    <div class="grid grid-cols-3 gap-2 mb-4 relative z-10">
                        <div class="bg-slate-800/80 rounded-lg p-2 text-center border border-slate-700/50"><div class="text-[10px] text-slate-500 mb-1">本地系统比分</div><div class="font-black text-emerald-400 text-lg">${p.predicted_score}</div></div>
                        <div class="bg-slate-800/80 rounded-lg p-2 text-center border border-slate-700/50"><div class="text-[10px] text-slate-500 mb-1">系统主观倾向</div><div class="font-bold text-white text-base">${p.result}</div></div>
                        <div class="bg-slate-800/80 rounded-lg p-2 text-center border border-slate-700/50"><div class="text-[10px] text-slate-500 mb-1">本地置信度</div><div class="font-bold text-blue-400 text-base">${p.confidence}%</div></div>
                    </div>
                    <div class="flex items-center gap-2 relative z-10">
                        <span class="text-[10px] bg-indigo-900/40 text-indigo-300 px-2 py-1 rounded border border-indigo-800/50">Gemini终极推演: ${p.gemini_score}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderMatches(tab) {
            const container = document.getElementById('matches-container');
            const matches = allData.matches[tab] || [];
            if (matches.length === 0) return container.innerHTML = `<div class="col-span-full text-center py-16 glass-panel rounded-2xl text-slate-500 text-lg">该日期无赛事数据</div>`;

            container.innerHTML = matches.map(match => {
                const p = match.prediction;
                const hs = match.home_stats || {}; const as = match.away_stats || {};
                
                const hp = p.home_win_pct; const dp = p.draw_pct; const ap = p.away_win_pct;
                
                let signalHtml = '';
                if(p.smart_money_signal && p.smart_money_signal !== "正常" && p.smart_money_signal !== "盘口与情绪正常") {
                    signalHtml = `<div class="bg-red-950/60 border border-red-800/50 text-red-400 text-xs px-3 py-2.5 rounded-lg mb-4 flex items-center gap-2 font-medium shadow-inner"><span>🚨</span><span>${p.smart_money_signal}</span></div>`;
                }
                const evTags = p.value_bets_summary.map(tag => `<span class="bg-emerald-900/40 text-emerald-400 text-[11px] px-2.5 py-1 rounded border border-emerald-700/50 flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>${tag}</span>`).join('');

                let extremeHtml = '';
                if (p.extreme_warning && p.extreme_warning !== "无" && p.extreme_warning !== "") {
                    extremeHtml = `<div class="absolute -top-3 -right-2 bg-gradient-to-r from-red-600 to-purple-600 text-white text-[10px] font-black px-3 py-1.5 rounded-bl-xl rounded-tr-xl shadow-[0_0_15px_rgba(220,38,38,0.8)] border border-red-400 animate-pulse z-20">${p.extreme_warning}</div>`;
                }

                let v2Html = '';
                if (p.refined_poisson && p.refined_poisson.v2_details) {
                    const dts = p.refined_poisson.v2_details;
                    v2Html = `
                    <details class="group bg-slate-800/40 rounded-xl border border-slate-700/50 mt-3 overflow-hidden">
                        <summary class="text-xs font-bold text-slate-300 p-3 cursor-pointer flex justify-between items-center hover:bg-slate-800/60 transition-colors">
                            <span class="flex items-center gap-2"><span class="text-orange-400 text-base">🎯</span>V2 赔率共振精细化模型</span>
                            <span class="transition group-open:rotate-180 text-slate-500">▼</span>
                        </summary>
                        <div class="p-3 pt-0 border-t border-slate-700/50 mt-1 bg-slate-900/30">
                            <div class="grid grid-cols-4 gap-2 mt-3">
                                <div class="bg-slate-800 rounded-lg p-2 text-center border border-slate-700 shadow-inner"><div class="text-[10px] text-slate-400 mb-1">平 2-2</div><div class="text-sm font-bold text-emerald-400">${dts.p22||'-'}</div></div>
                                <div class="bg-slate-800 rounded-lg p-2 text-center border border-slate-700 shadow-inner"><div class="text-[10px] text-slate-400 mb-1">平 1-1</div><div class="text-sm font-bold text-emerald-400">${dts.p11||'-'}</div></div>
                                <div class="bg-slate-800 rounded-lg p-2 text-center border border-slate-700 shadow-inner"><div class="text-[10px] text-slate-400 mb-1">胜 2-1</div><div class="text-sm font-bold text-blue-400">${dts.p21||'-'}</div></div>
                                <div class="bg-slate-800 rounded-lg p-2 text-center border border-slate-700 shadow-inner"><div class="text-[10px] text-slate-400 mb-1">负 1-2</div><div class="text-sm font-bold text-rose-400">${dts.p12||'-'}</div></div>
                            </div>
                        </div>
                    </details>
                    `;
                }

                return `
                <div class="glass-panel rounded-2xl overflow-hidden flex flex-col shadow-lg border-t border-slate-700 relative">
                    ${extremeHtml}
                    <div class="bg-slate-800/80 px-5 py-3 border-b border-slate-700/50 flex justify-between items-center">
                        <div class="flex items-center gap-2"><span class="text-xs font-bold text-yellow-500">${match.league} ${match.match_num}</span>${match.is_recommended ? `<span class="bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold shadow-md shadow-orange-500/30">推荐</span>` : ''}</div>
                        <div class="text-xs text-slate-400 font-mono mr-4">${match.match_time || '00:00'}</div>
                    </div>
                    <div class="p-5 flex-grow">
                        <div class="flex items-center justify-between mb-5">
                            <div class="w-2/5 text-right"><div class="font-bold text-lg md:text-xl text-white truncate">${match.home_team}</div></div>
                            <div class="w-1/5 flex flex-col items-center">
                                <div class="text-3xl font-black text-white bg-slate-800 px-3 py-1 rounded-lg border border-slate-600 shadow-inner">${p.predicted_score}</div>
                                <div class="text-[9px] font-bold mt-2 px-2 py-0.5 rounded-full bg-slate-700 text-slate-300 border border-slate-600">本地纯量化</div>
                            </div>
                            <div class="w-2/5 text-left"><div class="font-bold text-lg md:text-xl text-white truncate">${match.away_team}</div></div>
                        </div>

                        <div class="mb-5 bg-slate-900 p-3 rounded-xl border border-slate-800 relative">
                            <div class="absolute -top-2 left-3 bg-slate-800 text-[9px] text-slate-400 px-1.5 rounded">底层数学期望概率</div>
                            <div class="flex justify-between text-xs font-medium mb-2 px-1 mt-1">
                                <span class="text-blue-400">主 ${hp}%</span>
                                <span class="text-slate-400">平 ${dp}%</span>
                                <span class="text-rose-400">客 ${ap}%</span>
                            </div>
                            <div class="w-full bg-slate-800 rounded-full h-2.5 flex overflow-hidden shadow-inner">
                                <div class="prob-bar-h h-full" style="width: ${hp}%"></div>
                                <div class="prob-bar-d h-full" style="width: ${dp}%"></div>
                                <div class="prob-bar-a h-full" style="width: ${ap}%"></div>
                            </div>
                        </div>

                        ${signalHtml}
                        ${evTags ? `<div class="flex flex-wrap gap-2 mb-4">${evTags}</div>` : ''}
                        ${v2Html}

                        <div class="mt-6 border border-slate-700 rounded-xl overflow-hidden bg-slate-900/50 shadow-lg">
                            <div class="bg-gradient-to-r from-indigo-900/60 to-purple-900/60 p-4 border-b border-slate-700">
                                <div class="flex justify-between items-center mb-3">
                                    <div class="flex items-center gap-2">
                                        <span class="text-xl">👑</span>
                                        <span class="text-sm font-black text-indigo-300">首席决策官 (Gemini) 终极裁决</span>
                                    </div>
                                    <div class="text-lg font-black text-white bg-slate-900/80 px-3 py-1 rounded-lg border border-indigo-500/50 shadow-[0_0_10px_rgba(99,102,241,0.3)]">${p.gemini_score}</div>
                                </div>
                                <div class="text-xs text-slate-300 leading-relaxed italic bg-slate-950/40 p-3 rounded-lg">
                                    ${p.gemini_analysis}
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-700">
                                <div class="p-4 bg-blue-950/20">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-xs font-bold text-blue-400">🤖 逻辑顾问 (GPT-5)</span>
                                        <span class="text-xs font-bold text-white bg-slate-800 px-2 py-0.5 rounded border border-slate-700">${p.gpt_score}</span>
                                    </div>
                                    <p class="text-[11px] text-slate-400 leading-relaxed">${p.gpt_analysis}</p>
                                </div>
                                <div class="p-4 bg-teal-950/20">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-xs font-bold text-teal-400">👽 风控顾问 (Grok)</span>
                                        <span class="text-xs font-bold text-white bg-slate-800 px-2 py-0.5 rounded border border-slate-700">${p.grok_score}</span>
                                    </div>
                                    <p class="text-[11px] text-slate-400 leading-relaxed">${p.grok_analysis}</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
