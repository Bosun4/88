<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAN Quant | 体育量化分析中枢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .value-bet-glow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); border: 1px solid rgba(234, 179, 8, 0.8); }
        .ai-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-2"><span class="text-blue-500">NAN</span> Quant Dashboard</h1>
            <p class="text-slate-400 text-sm md:text-base">11重融合模型 | XGBoost & 泊松引擎 | AI 基金经理级分析</p>
        </div>
        <div class="mt-4 md:mt-0 text-right glass-panel px-6 py-3 rounded-xl">
            <div class="text-xs text-slate-400">最后更新时间</div>
            <div id="update-time" class="text-lg font-bold text-green-400">加载中...</div>
            <div class="text-xs text-slate-400 mt-1">今日共监控 <span id="total-matches" class="text-white font-bold">0</span> 场赛事</div>
        </div>
    </header>

    <main id="matches-container" class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="text-center w-full col-span-1 lg:col-span-2 py-20">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-500 rounded-full" role="status" aria-label="loading"></div>
            <p class="mt-2 text-slate-400">正在接入量化模型数据...</p>
        </div>
    </main>

    <script>
        // 核心渲染逻辑
        document.addEventListener('DOMContentLoaded', () => {
            // 这里替换为你的数据文件路径，通常是 data/predictions.json 
            fetch('data/predictions.json?t=' + new Date().getTime())
                .then(response => response.json())
                .then(data => {
                    document.getElementById('update-time').innerText = data.update_time || '未知';
                    document.getElementById('total-matches').innerText = data.total_matches || 0;
                    renderMatches(data.results || data.matches || []);
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                    document.getElementById('matches-container').innerHTML = `<div class="col-span-2 text-center text-red-400 py-10">数据加载失败，请检查 GitHub Actions 是否成功运行生成了 predictions.json。</div>`;
                });
        });

        function renderMatches(matches) {
            const container = document.getElementById('matches-container');
            container.innerHTML = ''; // 清空加载状态

            // 提取高价值比赛排在前面
            matches.sort((a, b) => {
                let valA = (a.prediction.value_bets_summary && a.prediction.value_bets_summary.length > 0) ? 1 : 0;
                let valB = (b.prediction.value_bets_summary && b.prediction.value_bets_summary.length > 0) ? 1 : 0;
                return valB - valA; 
            });

            matches.forEach((match, index) => {
                const p = match.prediction;
                
                // 检查是否有价值下注 (EV > 0)
                const hasValue = p.value_bets_summary && p.value_bets_summary.length > 0;
                const cardClass = hasValue ? 'glass-panel rounded-2xl p-5 value-bet-glow relative' : 'glass-panel rounded-2xl p-5 relative';
                const badgeHtml = hasValue ? `<div class="absolute -top-3 -right-3 bg-yellow-500 text-black text-xs font-bold px-3 py-1 rounded-full shadow-lg shadow-yellow-500/50">🔥 超高期望值 (Value Bet)</div>` : '';
                const recBadge = match.is_recommended ? `<span class="bg-blue-600 text-white text-xs px-2 py-1 rounded ml-2">主推</span>` : '';

                // 构造凯利与EV标签
                const getEvTag = (evData) => {
                    if (!evData || !evData.is_value) return '';
                    return `<span class="block text-[10px] text-yellow-400 mt-1">EV: +${evData.ev}% | 建议仓位: ${evData.kelly}%</span>`;
                };

                const cardHTML = `
                    <div class="${cardClass}">
                        ${badgeHtml}
                        <div class="flex justify-between items-center mb-4 text-xs text-slate-400 border-b border-slate-700 pb-2">
                            <span class="font-bold text-slate-300">${match.league || '竞彩赛事'} ${match.match_num || ''} ${recBadge}</span>
                            <span>模型共识度: <span class="text-white">${p.model_consensus}/10</span></span>
                        </div>

                        <div class="flex justify-between items-center mb-6">
                            <div class="text-center w-1/3">
                                <div class="font-bold text-lg text-white mb-1 truncate">${match.home_team}</div>
                                <div class="text-xs text-slate-500">xG: ${p.poisson.home_expected_goals || '-'}</div>
                            </div>
                            <div class="text-center w-1/3">
                                <div class="text-3xl font-black text-blue-400 drop-shadow-md mb-1">${p.predicted_score}</div>
                                <div class="text-xs font-bold ${p.confidence >= 70 ? 'text-green-400' : 'text-orange-400'}">置信度: ${p.confidence}%</div>
                            </div>
                            <div class="text-center w-1/3">
                                <div class="font-bold text-lg text-white mb-1 truncate">${match.away_team}</div>
                                <div class="text-xs text-slate-500">xG: ${p.poisson.away_expected_goals || '-'}</div>
                            </div>
                        </div>

                        <div class="flex gap-2 mb-4 text-center">
                            <div class="flex-1 bg-slate-800 rounded-lg p-2 border ${p.home_ev?.is_value ? 'border-yellow-500/50' : 'border-slate-700'}">
                                <div class="text-xs text-slate-400">主胜</div>
                                <div class="font-bold text-white text-lg">${p.home_win_pct}%</div>
                                ${getEvTag(p.home_ev)}
                            </div>
                            <div class="flex-1 bg-slate-800 rounded-lg p-2 border ${p.draw_ev?.is_value ? 'border-yellow-500/50' : 'border-slate-700'}">
                                <div class="text-xs text-slate-400">平局</div>
                                <div class="font-bold text-white text-lg">${p.draw_pct}%</div>
                                ${getEvTag(p.draw_ev)}
                            </div>
                            <div class="flex-1 bg-slate-800 rounded-lg p-2 border ${p.away_ev?.is_value ? 'border-yellow-500/50' : 'border-slate-700'}">
                                <div class="text-xs text-slate-400">客胜</div>
                                <div class="font-bold text-white text-lg">${p.away_win_pct}%</div>
                                ${getEvTag(p.away_ev)}
                            </div>
                        </div>

                        <div class="flex justify-around text-xs text-slate-300 bg-slate-900/50 rounded-lg p-3 mb-4">
                            <div><span class="text-slate-500">大2.5球:</span> <span class="${p.over_under_2_5 === '大' ? 'text-red-400' : 'text-green-400'} font-bold">${p.over_under_2_5}</span></div>
                            <div><span class="text-slate-500">双方进球:</span> <span class="font-bold">${p.both_score}</span></div>
                            <div><span class="text-slate-500">风控评级:</span> <span class="font-bold">${p.risk_level}</span></div>
                        </div>

                        <div id="chart-${index}" style="width: 100%; height: 220px;" class="mb-4"></div>

                        <div class="border-t border-slate-700 pt-3 mt-2">
                            <h4 class="text-sm font-bold ai-text mb-2 flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zM9 9V5a1 1 0 112 0v4a1 1 0 11-2 0zm0 4a1 1 0 112 0v1a1 1 0 11-2 0v-1z"></path></svg>
                                基金经理 AI 投研摘要
                            </h4>
                            <p class="text-xs text-slate-400 leading-relaxed">${p.gpt_analysis !== "未响应" ? p.gpt_analysis : (p.gemini_analysis !== "未响应" ? p.gemini_analysis : 'AI 正在分析核心赔率异动...')}</p>
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${p.key_factors ? p.key_factors.map(f => `<span class="bg-slate-800 text-[10px] text-slate-300 px-2 py-0.5 rounded">${f}</span>`).join('') : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);

                // 准备 ECharts 雷达图数据
                setTimeout(() => {
                    initRadarChart(`chart-${index}`, match);
                }, 100);
            });
        }

        // 初始化 ECharts 雷达图
        function initRadarChart(elementId, match) {
            const chartDom = document.getElementById(elementId);
            if (!chartDom) return;
            const myChart = echarts.init(chartDom, 'dark');
            const p = match.prediction;

            // 动态映射数据到 0-100 的雷达图范围
            const homeScore = [
                p.home_win_pct, // 胜率倾向
                Math.min(100, (p.poisson.home_expected_goals / 2.5) * 100), // xG转化
                p.home_ev?.is_value ? 90 : 40, // 资金/EV倾向
                (p.model_consensus / 10) * 100, // 模型共识度
                p.elo.home_win // ELO底蕴
            ];

            const awayScore = [
                p.away_win_pct,
                Math.min(100, (p.poisson.away_expected_goals / 2.5) * 100),
                p.away_ev?.is_value ? 90 : 40,
                ((10 - p.model_consensus) / 10) * 100,
                p.elo.away_win
            ];

            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item' },
                legend: {
                    data: ['主队能力', '客队能力'],
                    bottom: 0,
                    textStyle: { color: '#94a3b8', fontSize: 10 },
                    itemWidth: 10, itemHeight: 10
                },
                radar: {
                    indicator: [
                        { name: '胜率倾向', max: 100 },
                        { name: '期望进球(xG)', max: 100 },
                        { name: '资金价值(EV)', max: 100 },
                        { name: '模型共识', max: 100 },
                        { name: 'ELO底蕴', max: 100 }
                    ],
                    radius: '60%',
                    center: ['50%', '45%'],
                    shape: 'polygon',
                    splitNumber: 4,
                    axisName: { color: '#64748b', fontSize: 10 },
                    splitLine: { lineStyle: { color: ['rgba(255, 255, 255, 0.05)', 'rgba(255, 255, 255, 0.1)'] } },
                    splitArea: { show: false },
                    axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
                },
                series: [{
                    name: '主客队战力雷达',
                    type: 'radar',
                    data: [
                        {
                            value: homeScore,
                            name: '主队能力',
                            itemStyle: { color: '#3b82f6' },
                            areaStyle: { color: 'rgba(59, 130, 246, 0.3)' }
                        },
                        {
                            value: awayScore,
                            name: '客队能力',
                            itemStyle: { color: '#f43f5e' },
                            areaStyle: { color: 'rgba(244, 63, 94, 0.3)' }
                        }
                    ]
                }]
            };
            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());
        }
    </script>
</body>
</html>
