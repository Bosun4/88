<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI量化足球投研终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #60a5fa; }
        .tab-inactive { color: #94a3b8; }
        .tab-inactive:hover { color: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                ⚽ 小鱼儿足球 AI 分析系统
            </h1>
            <div class="text-sm text-slate-400" id="update-time">最后更新: 加载中...</div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-6 space-y-8">
        
        <section>
            <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl">🔥</span>
                <h2 class="text-xl font-bold text-slate-100">今日核心推荐 (TOP 4)</h2>
            </div>
            <div id="top4-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </section>

        <section>
            <div class="flex border-b border-slate-700 mb-6">
                <button onclick="switchTab('yesterday')" id="tab-yesterday" class="tab-inactive px-6 py-3 font-medium transition-colors">昨日赛事</button>
                <button onclick="switchTab('today')" id="tab-today" class="tab-active px-6 py-3 font-medium transition-colors">今日赛事</button>
                <button onclick="switchTab('tomorrow')" id="tab-tomorrow" class="tab-inactive px-6 py-3 font-medium transition-colors">明日赛事</button>
            </div>

            <div id="matches-container" class="space-y-4">
                <div class="text-center py-10 text-slate-500">正在加载 AI 分析数据...</div>
            </div>
        </section>
    </main>

    <script>
        let allData = null;
        let currentTab = 'today';

        // 获取数据
        fetch('data/predictions.json')
            .then(response => response.json())
            .then(data => {
                allData = data;
                document.getElementById('update-time').textContent = `最后更新: ${data.update_time}`;
                renderTop4(data.top4);
                renderMatches(currentTab);
            })
            .catch(error => {
                document.getElementById('matches-container').innerHTML = `<div class="text-red-400 text-center py-10">获取数据失败，请检查后端运行状态。</div>`;
                console.error(error);
            });

        // 切换 Tab
        function switchTab(tab) {
            currentTab = tab;
            ['yesterday', 'today', 'tomorrow'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(t === tab) {
                    el.classList.remove('tab-inactive');
                    el.classList.add('tab-active');
                } else {
                    el.classList.add('tab-inactive');
                    el.classList.remove('tab-active');
                }
            });
            renderMatches(tab);
        }

        // 渲染顶部推荐卡片
        function renderTop4(top4List) {
            const container = document.getElementById('top4-container');
            if (!top4List || top4List.length === 0) {
                container.innerHTML = `<div class="col-span-full text-slate-500 text-sm">今日暂无高期望值赛事推荐。</div>`;
                return;
            }
            
            container.innerHTML = top4List.map(match => {
                const pred = match.prediction;
                // EV 标签提取
                const evTags = pred.value_bets_summary.map(tag => `<span class="bg-emerald-900/50 text-emerald-400 text-xs px-2 py-1 rounded border border-emerald-700/50">${tag}</span>`).join('');
                
                return `
                <div class="bg-slate-800 rounded-xl p-4 border border-yellow-600/30 card-hover transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold text-yellow-500 bg-yellow-900/30 px-2 py-1 rounded">推荐 #${match.rank}</span>
                        <span class="text-xs text-slate-400">${match.league} | ${match.match_num}</span>
                    </div>
                    <div class="text-center my-3">
                        <div class="font-bold text-base truncate">${match.home_team}</div>
                        <div class="text-slate-500 text-xs my-1">VS</div>
                        <div class="font-bold text-base truncate">${match.away_team}</div>
                    </div>
                    <div class="bg-slate-900 rounded p-2 text-center border border-slate-700">
                        <div class="text-sm font-semibold text-blue-400">AI 预测: ${pred.result} (${pred.predicted_score})</div>
                        <div class="text-xs text-slate-400 mt-1">信心度: ${pred.confidence}% | 风险: ${pred.risk_level}</div>
                    </div>
                    <div class="mt-3 flex flex-wrap gap-1 justify-center">
                        ${evTags}
                    </div>
                </div>
                `;
            }).join('');
        }

        // 渲染赛事列表
        function renderMatches(tab) {
            const container = document.getElementById('matches-container');
            const matches = allData.matches[tab];

            if (!matches || matches.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-500 bg-slate-800 rounded-xl border border-slate-700">该日期暂无赛事数据</div>`;
                return;
            }

            container.innerHTML = matches.map(match => {
                const p = match.prediction;
                // 胜平负进度条
                const hp = p.home_win_pct;
                const dp = p.draw_pct;
                const ap = p.away_win_pct;
                
                // 高阶风控信号处理
                let signalHtml = '';
                if(p.smart_money_signal && p.smart_money_signal !== "正常" && p.smart_money_signal !== "盘口与情绪正常") {
                    signalHtml = `<div class="bg-red-900/30 border border-red-700/50 text-red-400 text-xs px-3 py-2 rounded mb-3">🚨 <b>风控预警：</b>${p.smart_money_signal}</div>`;
                }

                const evTags = p.value_bets_summary.map(tag => `<span class="bg-emerald-900/50 text-emerald-400 text-xs px-2 py-1 rounded border border-emerald-700/50">${tag}</span>`).join('');

                return `
                <div class="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-sm">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                        <div class="flex items-center gap-3">
                            <span class="bg-slate-700 text-slate-300 text-xs px-2 py-1 rounded">${match.league}</span>
                            <span class="text-sm text-slate-400">${match.match_num} | ${match.match_time || '00:00'}</span>
                        </div>
                        <div class="flex gap-2">
                            <span class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-300">双边进球: ${p.both_score}</span>
                            <span class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-300">大小球: ${p.over_under_2_5}</span>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-4">
                        <div class="flex-1 text-right text-lg font-bold">${match.home_team}</div>
                        <div class="flex flex-col items-center px-4">
                            <div class="text-2xl font-black text-blue-400 mb-1">${p.predicted_score}</div>
                            <div class="text-xs text-slate-400 bg-slate-900 px-2 py-1 rounded border border-slate-700">预测: ${p.result}</div>
                        </div>
                        <div class="flex-1 text-left text-lg font-bold">${match.away_team}</div>
                    </div>

                    ${signalHtml}

                    <div class="mb-4">
                        <div class="flex justify-between text-xs text-slate-400 mb-1">
                            <span>主胜 ${hp}%</span>
                            <span>平局 ${dp}%</span>
                            <span>客胜 ${ap}%</span>
                        </div>
                        <div class="w-full bg-slate-700 rounded-full h-2.5 flex overflow-hidden">
                            <div class="bg-blue-500 h-2.5" style="width: ${hp}%"></div>
                            <div class="bg-slate-400 h-2.5" style="width: ${dp}%"></div>
                            <div class="bg-rose-500 h-2.5" style="width: ${ap}%"></div>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-4">
                        ${evTags}
                    </div>

                    <details class="group bg-slate-900 border border-slate-700 rounded-lg">
                        <summary class="flex items-center justify-between cursor-pointer p-3 text-sm font-medium text-slate-300 hover:text-white">
                            查看 AI 深度解读 (含伤停与资金动向)
                            <span class="transition group-open:rotate-180">▼</span>
                        </summary>
                        <div class="p-4 border-t border-slate-700 text-sm text-slate-400 leading-relaxed bg-slate-800/50">
                            <p class="mb-2"><strong class="text-blue-400">GPT 分析：</strong>${p.gpt_analysis}</p>
                            <p><strong class="text-purple-400">Gemini 分析：</strong>${p.gemini_analysis}</p>
                        </div>
                    </details>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
