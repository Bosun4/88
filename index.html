<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 竞彩量化预测 (11核心模型 + 情报网络)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .card-bg { background-color: #161b22; border: 1px solid #30363d; }
        .card-header-bg { background-color: #0d1117; border-bottom: 1px solid #30363d; }
        .prob-bar-h { background-color: #238636; } 
        .prob-bar-d { background-color: #b08800; } 
        .prob-bar-a { background-color: #1f6feb; } 
        .badge-ev { background: linear-gradient(90deg, #d29922, #e3b341); color: #000; }
        .badge-rlm-red { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.4); color: #f87171; }
        .badge-rlm-yellow { background: rgba(202, 138, 4, 0.15); border: 1px solid rgba(202, 138, 4, 0.4); color: #facc15; }
        .day-header { background: linear-gradient(90deg, #1f6feb, transparent); border-left: 4px solid #38bdf8; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="max-w-3xl mx-auto px-3 sm:px-4 pt-6">
        <div class="flex justify-between items-end mb-6 border-b border-gray-700 pb-3">
            <div>
                <h1 class="text-2xl font-bold text-white">⚽ 量化投研中心</h1>
                <p class="text-xs text-gray-400 mt-1" id="update-time">数据更新中...</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] bg-purple-900 text-purple-200 px-2 py-0.5 rounded border border-purple-700">11大核心模型</span>
                <div class="text-xs text-gray-400 mt-1">监控场次</div>
                <div class="text-lg font-bold text-blue-400" id="total-matches">0</div>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-lg font-bold text-white mb-3 flex items-center">
                🎯 价值精选 <span class="ml-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full">TOP4</span>
            </h2>
            <div id="top4-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <div>
            <h2 class="text-lg font-bold text-white mb-3 flex items-center">📋 赛事大盘</h2>
            <div id="matches-container" class="space-y-4"><div class="text-center py-10 text-gray-500">正在接入量化数据...</div></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('data/predictions.json?t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    document.getElementById('update-time').innerText = '最后更新: ' + (data.update_time || '未知');
                    document.getElementById('total-matches').innerText = data.total_matches || data.results?.length || 0;
                    
                    let matches = data.results || data.matches || [];
                    const top4 = data.top4 || matches.filter(m => m.is_recommended).slice(0, 4);
                    
                    renderTop4(top4);
                    renderGroupedMatches(matches);
                })
                .catch(err => {
                    document.getElementById('matches-container').innerHTML = '<div class="text-center text-red-500 py-5">数据加载失败，请检查数据源。</div>';
                });
        });

        function toggleDetails(id) {
            const detailDiv = document.getElementById(`details-${id}`);
            const btnText = document.getElementById(`btn-text-${id}`);
            if (detailDiv.classList.contains('hidden')) {
                detailDiv.classList.remove('hidden');
                btnText.innerHTML = '📊 收起 ▲';
            } else {
                detailDiv.classList.add('hidden');
                btnText.innerHTML = '📊 展开深度数据 ▼';
            }
        }

        function renderTop4(top4Matches) {
            const container = document.getElementById('top4-container'); container.innerHTML = '';
            if (top4Matches.length === 0) return container.innerHTML = '<div class="text-gray-500 text-sm">暂无推荐</div>';
            
            top4Matches.forEach((match, index) => {
                const p = match.prediction || match;
                const html = `
                    <div class="card-bg rounded-lg p-3 relative overflow-hidden border ${p.home_ev?.is_value ? 'border-yellow-600/50' : 'border-gray-800'}">
                        <div class="absolute top-0 right-0 bg-orange-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-bl-lg">${index + 1}</div>
                        <div class="text-xs text-gray-400 mb-2">${match.league || ''} | ${match.match_num || ''}</div>
                        <div class="flex justify-between items-center mb-2">
                            <div class="text-sm font-bold text-white w-2/5 truncate">${match.home_team || '主队'}</div>
                            <div class="text-xs text-gray-500">VS</div>
                            <div class="text-sm font-bold text-white w-2/5 text-right truncate">${match.away_team || '客队'}</div>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center mb-1">
                            <div class="bg-gray-800 rounded p-1"><div class="text-[10px] text-gray-400">算力比分</div><div class="text-sm font-bold text-green-400">${p.predicted_score}</div></div>
                            <div class="bg-gray-800 rounded p-1"><div class="text-[10px] text-gray-400">结果</div><div class="text-sm font-bold text-white">${p.result}</div></div>
                            <div class="bg-gray-800 rounded p-1"><div class="text-[10px] text-gray-400">置信</div><div class="text-sm font-bold text-orange-400">${p.confidence}%</div></div>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderGroupedMatches(matches) {
            const container = document.getElementById('matches-container'); container.innerHTML = '';
            const groups = {};
            matches.forEach(m => {
                const num = m.match_num || "";
                const dayKey = (num.length >= 2 && num.startsWith("周")) ? num.substring(0, 2) : "其他赛事";
                if (!groups[dayKey]) groups[dayKey] = [];
                groups[dayKey].push(m);
            });

            for (const [day, dayMatches] of Object.entries(groups)) {
                dayMatches.sort((a, b) => (a.match_num || "").localeCompare(b.match_num || ""));
                container.insertAdjacentHTML('beforeend', `<div class="day-header text-white font-bold text-sm px-3 py-1.5 rounded mt-6 mb-3 shadow-md">${day} 赛事 (${dayMatches.length}场)</div>`);
                
                dayMatches.forEach((match, index) => {
                    const p = match.prediction || match; 
                    const intel = match.intelligence || {};
                    const mId = match.match_id || index + Math.random().toString(36).substr(2, 5);
                    const recBadge = match.is_recommended ? `<span class="bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded ml-2">★ 推荐</span>` : '';
                    
                    let evTags = '';
                    if (p.home_ev?.is_value) evTags += `<span class="badge-ev text-[10px] px-1.5 py-0.5 rounded mr-1 mb-1">主 EV+${p.home_ev.ev}%</span>`;
                    if (p.draw_ev?.is_value) evTags += `<span class="badge-ev text-[10px] px-1.5 py-0.5 rounded mr-1 mb-1">平 EV+${p.draw_ev.ev}%</span>`;
                    if (p.away_ev?.is_value) evTags += `<span class="badge-ev text-[10px] px-1.5 py-0.5 rounded mr-1 mb-1">客 EV+${p.away_ev.ev}%</span>`;

                    let rlmBanner = '';
                    if (p.smart_money_signal && p.smart_money_signal !== "正常" && p.smart_money_signal !== "无赔率数据") {
                        const isDanger = p.smart_money_signal.includes("🚨");
                        rlmBanner = `<div class="mt-2 mb-1 text-[11px] font-bold text-center px-2 py-1 rounded ${isDanger ? 'badge-rlm-red' : 'badge-rlm-yellow'}">${p.smart_money_signal}</div>`;
                    }

                    const html = `
                        <div class="card-bg rounded-lg mb-4 shadow-lg border-gray-800">
                            <div class="card-header-bg px-3 py-2 flex justify-between items-center rounded-t-lg">
                                <div class="text-xs font-bold text-blue-400">${match.league || ''} ${match.match_num || ''} ${recBadge}</div>
                                <div class="text-[10px] text-gray-500">共识: ${p.model_consensus}/11</div>
                            </div>

                            <div class="p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <div class="text-center w-2/5"><div class="text-sm font-bold text-white truncate">${match.home_team}</div></div>
                                    <div class="text-center w-1/5"><div class="text-xl font-bold text-blue-400 drop-shadow">${p.predicted_score}</div></div>
                                    <div class="text-center w-2/5"><div class="text-sm font-bold text-white truncate">${match.away_team}</div></div>
                                </div>
                                
                                <div class="flex justify-between text-[9px] text-gray-500 mb-3 px-2">
                                    <span>GPT比分: <span class="text-white">${p.gpt_score || '?'}</span></span>
                                    <span>Gemini比分: <span class="text-white">${p.gemini_score || '?'}</span></span>
                                </div>

                                <div class="flex w-full h-6 rounded overflow-hidden text-[10px] font-bold text-white text-center leading-6 mb-1 shadow-inner">
                                    <div class="prob-bar-h" style="width: ${p.home_win_pct}%">主 ${p.home_win_pct}%</div>
                                    <div class="prob-bar-d" style="width: ${p.draw_pct}%">平 ${p.draw_pct}%</div>
                                    <div class="prob-bar-a" style="width: ${p.away_win_pct}%">客 ${p.away_win_pct}%</div>
                                </div>
                                
                                ${evTags ? `<div class="mt-1.5 flex flex-wrap">${evTags}</div>` : ''}
                                ${rlmBanner}

                                <div class="text-center text-xs text-gray-400 py-1 mt-2 cursor-pointer hover:text-white transition border-t border-gray-800" onclick="toggleDetails('${mId}')">
                                    <span id="btn-text-${mId}">📊 展开深度研报 ▼</span>
                                </div>
                            </div>

                            <div id="details-${mId}" class="hidden border-t border-gray-700 bg-[#0d1117] p-3 text-xs text-gray-300 rounded-b-lg space-y-3">
                                
                                ${intel.home_injury || intel.guest_injury ? `
                                <div class="border border-red-900 bg-red-900/10 p-2 rounded">
                                    <div class="text-red-400 font-bold mb-1">🏥 伤停与绝密情报</div>
                                    <div class="text-gray-400 text-[10px] space-y-1">
                                        <div><span class="text-gray-500">主队伤停:</span> ${intel.home_injury || '无'}</div>
                                        <div><span class="text-gray-500">客队伤停:</span> ${intel.guest_injury || '无'}</div>
                                    </div>
                                </div>` : ''}

                                <div class="border border-blue-900 bg-blue-900/10 p-2 rounded">
                                    <div class="text-blue-400 font-bold mb-1">🤖 基金经理 AI 投研</div>
                                    <div class="text-gray-400 leading-relaxed text-[11px]">${p.gpt_analysis !== "未响应" ? p.gpt_analysis : p.gemini_analysis}</div>
                                </div>

                                <div class="grid grid-cols-2 gap-2">
                                    <div class="border border-gray-700 p-2 rounded bg-gray-900/50"><div class="text-green-400 font-bold mb-1">📐 泊松分布</div><div>主胜/平/客: ${p.poisson?.home_win || '-'}/${p.poisson?.draw || '-'}/${p.poisson?.away_win || '-'}%</div><div>xG: 主${p.poisson?.home_expected_goals || '-'} 客${p.poisson?.away_expected_goals || '-'}</div></div>
                                    <div class="border border-gray-700 p-2 rounded bg-gray-900/50"><div class="text-blue-400 font-bold mb-1">🌲 随机森林 (ML)</div><div>主胜/平/客: ${p.random_forest?.home_win || '-'}/${p.random_forest?.draw || '-'}/${p.random_forest?.away_win || '-'}%</div></div>
                                </div>

                                <div class="border border-gray-700 p-2 rounded bg-gray-900/50">
                                    <div class="text-gray-300 font-bold mb-2">📉 基础战绩比拼</div>
                                    <table class="w-full text-center text-[10px]">
                                        <thead>
                                            <tr class="text-gray-500 border-b border-gray-700"><th class="py-1">球队</th><th>战绩</th><th>进/失</th><th>均进</th><th>零封</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr class="border-b border-gray-800"><td class="py-1.5 text-white truncate max-w-[60px]">${match.home_team}</td><td>${match.home_stats?.wins||0}W${match.home_stats?.draws||0}D${match.home_stats?.losses||0}L</td><td>${match.home_stats?.goals_for||0}/${match.home_stats?.goals_against||0}</td><td class="text-green-400">${match.home_stats?.avg_goals_for||0}</td><td>${match.home_stats?.clean_sheets||0}</td></tr>
                                            <tr><td class="py-1.5 text-white truncate max-w-[60px]">${match.away_team}</td><td>${match.away_stats?.wins||0}W${match.away_stats?.draws||0}D${match.away_stats?.losses||0}L</td><td>${match.away_stats?.goals_for||0}/${match.away_stats?.goals_against||0}</td><td class="text-green-400">${match.away_stats?.avg_goals_for||0}</td><td>${match.away_stats?.clean_sheets||0}</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                });
            }
        }
    </script>
</body>
</html>
