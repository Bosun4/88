<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>⚽ AI竞彩预测Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a13;--sf:#0d1321;--cd:#131a2e;--cd2:#1a2340;--bd:#1e2d4a;--tx:#c8d6e5;--td:#5a6a85;--tb:#f0f4f8;--gn:#10b981;--gn2:#059669;--rd:#ef4444;--bl:#3b82f6;--bl2:#2563eb;--am:#f59e0b;--am2:#d97706;--pr:#8b5cf6;--cy:#06b6d4;--pk:#ec4899;--gg:linear-gradient(135deg,#f59e0b,#f97316,#ef4444);--gb:linear-gradient(135deg,#3b82f6,#6366f1);--gc:linear-gradient(135deg,#10b981,#06b6d4);--gp:linear-gradient(135deg,#8b5cf6,#ec4899)}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 5%,#1e3a6f15,transparent 50%),radial-gradient(ellipse at 85% 95%,#3b1f6e12,transparent 50%),radial-gradient(ellipse at 50% 50%,#0a1628,transparent);pointer-events:none}
.ct{max-width:1280px;margin:0 auto;padding:12px;position:relative;z-index:1}
.hd{text-align:center;padding:32px 16px 24px;position:relative}
.hd::after{content:'';display:block;width:80px;height:2px;background:var(--gg);margin:16px auto 0;border-radius:2px}
.logo{font-family:Outfit;font-size:clamp(24px,4.5vw,38px);font-weight:900;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.sub{color:var(--td);font-size:12px;margin-top:6px;letter-spacing:3px;text-transform:uppercase;font-family:Outfit}
.tags{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 8px;border-radius:100px;font-family:'JetBrains Mono';font-weight:700;letter-spacing:0.5px}
.tag-g{background:#10b98122;color:var(--gn);border:1px solid #10b98133}
.tag-b{background:#3b82f622;color:var(--bl);border:1px solid #3b82f633}
.tag-p{background:#8b5cf622;color:var(--pr);border:1px solid #8b5cf633}
.tag-a{background:#f59e0b22;color:var(--am);border:1px solid #f59e0b33}
.ui{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:var(--sf);border:1px solid var(--bd);border-radius:100px;padding:5px 14px;font-size:11px;color:var(--td)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--gn);animation:pu 2s infinite}
@keyframes pu{0%,100%{box-shadow:0 0 0 0 #10b98144}50%{box-shadow:0 0 0 6px transparent}}
.sb{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:16px 0}
.sc{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc:nth-child(1)::before{background:var(--gg)}.sc:nth-child(2)::before{background:var(--gb)}.sc:nth-child(3)::before{background:var(--gc)}.sc:nth-child(4)::before{background:var(--gp)}
.sv{font-family:Outfit;font-size:24px;font-weight:900;background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sc:nth-child(1) .sv{background:var(--gg);-webkit-background-clip:text}.sc:nth-child(3) .sv{background:var(--gc);-webkit-background-clip:text}.sc:nth-child(4) .sv{background:var(--gp);-webkit-background-clip:text}
.sl{font-size:10px;color:var(--td);margin-top:3px;font-family:Outfit}
.st{font-family:Outfit;font-size:17px;font-weight:700;color:var(--tb);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bh{background:var(--gg);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;font-family:Outfit}
.t4g{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-bottom:20px}
.t4c{background:var(--cd);border:1px solid var(--bd);border-radius:14px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:all .3s}
.t4c:hover{transform:translateY(-2px);border-color:var(--am);box-shadow:0 6px 24px #f59e0b18}
.t4c::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gg)}
.rb{position:absolute;top:12px;right:12px;width:28px;height:28px;background:var(--gg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:900;font-size:13px;color:#000}
.t4l{font-size:10px;color:var(--am);font-weight:700;letter-spacing:1px;margin-bottom:8px;font-family:Outfit}
.t4t{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tl{width:28px;height:28px;border-radius:6px;object-fit:contain;background:var(--sf);padding:2px}
.tn{font-size:12px;font-weight:700;color:var(--tb);flex:1}.tn.aw{text-align:right}
.vs{font-family:Outfit;font-size:10px;color:var(--td);font-weight:700}
.t4p{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:8px}
.pi{text-align:center;padding:6px 3px;background:var(--sf);border-radius:6px}
.pl{font-size:9px;color:var(--td)}.pv{font-family:Outfit;font-size:14px;font-weight:700;color:var(--tb)}.pv.hl{color:var(--gn)}
.cb{margin-top:8px;height:3px;background:var(--sf);border-radius:3px;overflow:hidden}.cf{height:100%;border-radius:3px}
.t4m{display:flex;gap:3px;margin-top:6px;font-size:9px;font-family:'JetBrains Mono'}
.t4m span{padding:2px 5px;border-radius:4px;background:var(--sf);color:var(--td)}
.fb{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fn{padding:5px 12px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Noto Sans SC'}
.fn:hover,.fn.ac{background:var(--bl);border-color:var(--bl);color:#fff}
.mc{background:var(--cd);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .3s}
.mc.rc{border-color:var(--am);box-shadow:0 0 12px #f59e0b15}
.mh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--sf);border-bottom:1px solid var(--bd)}
.ml{font-size:11px;color:var(--bl);font-weight:700;display:flex;align-items:center;gap:5px}
.ml img{width:16px;height:16px}
.mt{font-size:10px;color:var(--td);font-family:'JetBrains Mono'}
.tr{background:var(--gg);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;margin-left:6px}
.mb2{padding:14px}
.mts{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mi{display:flex;flex-direction:column;align-items:center;gap:4px;width:85px}
.mi img{width:38px;height:38px;border-radius:8px;background:var(--sf);padding:3px}
.mn{font-size:10px;font-weight:700;text-align:center;line-height:1.2}
.mv{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.ms{font-family:Outfit;font-size:24px;font-weight:900;background:var(--gb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mr2{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700}
.th{background:#10b98122;color:var(--gn)}.td2{background:#f59e0b22;color:var(--am)}.ta2{background:#3b82f622;color:var(--bl)}
.mp{display:flex;gap:3px;margin-bottom:10px}
.pb{flex:1;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:Outfit}
.ph{background:#10b98133;color:var(--gn)}.pd{background:#f59e0b33;color:var(--am)}.pa{background:#3b82f633;color:var(--bl)}
.md{display:none;padding:0 14px 14px}.md.op{display:block}
.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.model-box{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px;position:relative;overflow:hidden}
.model-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.model-box.poisson::before{background:var(--gc)}.model-box.elo::before{background:var(--gb)}.model-box.form-box::before{background:var(--gp)}.model-box.odds-box::before{background:var(--gg)}
.model-title{font-size:10px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:4px;font-family:Outfit}
.model-title.c-green{color:var(--gn)}.model-title.c-blue{color:var(--bl)}.model-title.c-purple{color:var(--pr)}.model-title.c-amber{color:var(--am)}
.model-row{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}.model-lbl{color:var(--td)}.model-val{font-family:'JetBrains Mono';font-weight:700;color:var(--tb);font-size:10px}
.score-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.score-chip{background:var(--cd);border:1px solid var(--bd);padding:2px 6px;border-radius:4px;font-size:9px;font-family:'JetBrains Mono';color:var(--td)}
.score-chip.top{border-color:var(--gn);color:var(--gn)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.db{background:var(--sf);border-radius:8px;padding:10px}
.dt{font-size:10px;color:var(--td);font-weight:700;margin-bottom:5px;font-family:Outfit}
.dr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid #1e2d4a55}.dr:last-child{border:none}
.dl{color:var(--td)}.dv{font-family:'JetBrains Mono';font-weight:700;color:var(--tb);font-size:10px}
.ab{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-top:6px}
.at{font-size:10px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:4px;font-family:Outfit}
.at.gp{color:var(--gn)}.at.gm{color:var(--bl)}
.ax{font-size:10px;line-height:1.6;color:var(--td)}
.fs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ft{background:var(--cd);border:1px solid var(--bd);padding:2px 7px;border-radius:100px;font-size:9px;color:var(--td)}
.hr{display:flex;justify-content:space-between;padding:4px 8px;font-size:9px;border-radius:4px;margin-bottom:2px;background:var(--cd);font-family:'JetBrains Mono'}
.eb{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:7px;background:0 0;border:1px solid var(--bd);border-radius:6px;color:var(--td);font-size:11px;cursor:pointer;margin-top:8px;transition:all .2s}
.eb:hover{background:var(--sf);color:var(--tb)}
.extra-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.extra-box{background:var(--sf);border-radius:8px;padding:8px;text-align:center}
.extra-label{font-size:9px;color:var(--td);font-family:Outfit}
.extra-val{font-size:16px;font-weight:700;font-family:Outfit;margin-top:2px}
.em{text-align:center;padding:50px 20px;color:var(--td)}
.ft2{text-align:center;padding:24px;color:var(--td);font-size:10px;border-top:1px solid var(--bd);margin-top:30px}
.ld{text-align:center;padding:50px}.sp{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.model-grid{grid-template-columns:1fr}.dg{grid-template-columns:1fr}.t4g{grid-template-columns:1fr}.mi{width:70px}.mi img{width:32px;height:32px}.ms{font-size:20px}}
</style></head>
<body><div class="ct">
<div class="hd"><div class="logo">⚽ AI竞彩预测 Pro</div><div class="sub">Multi-Model Ensemble Analysis</div>
<div class="tags"><span class="tag tag-g">Poisson</span><span class="tag tag-b">ELO</span><span class="tag tag-p">Form</span><span class="tag tag-a">GPT×Gemini</span></div>
<div class="ui" id="ui"><div class="pulse"></div><span>loading</span></div></div>
<div class="sb" id="sb"></div><div id="t4"></div><div class="fb" id="fb"></div>
<div id="ms2"><div class="ld"><div class="sp"></div><div style="color:var(--td)">加载中...</div></div></div>
<div class="ft2"><p>500彩票网 · API-Football · Odds-API</p><p style="margin-top:4px">Poisson · ELO · Form · Kelly · GPT-5.2 · Gemini 3.1</p><p style="margin-top:4px;color:var(--am)">⚠️ 仅供参考，理性购彩</p></div>
</div>
<script>
var R=[],CF="all";
function ld(){fetch("data/predictions.json?t="+Date.now()).then(function(r){return r.json()}).then(rn).catch(function(){document.getElementById("ms2").innerHTML='<div class="em"><div style="font-size:48px;margin-bottom:12px">📡</div><p>等待首次运行</p></div>'})}
function rn(d){R=d.results||[];document.getElementById("ui").innerHTML='<div class="pulse"></div><span>'+(d.update_time||"")+" · "+(d.total_matches||0)+"场竞彩</span>";var ag=R.filter(function(r){return r.prediction&&r.prediction.model_agreement}).length;var ac=R.length?Math.round(R.reduce(function(s,r){return s+(r.prediction?r.prediction.confidence||0:0)},0)/R.length):0;document.getElementById("sb").innerHTML='<div class="sc"><div class="sv">'+(d.total_matches||0)+'</div><div class="sl">竞彩场次</div></div><div class="sc"><div class="sv">'+(d.top4||[]).length+'</div><div class="sl">精选推荐</div></div><div class="sc"><div class="sv">'+ag+'</div><div class="sl">模型共识</div></div><div class="sc"><div class="sv">'+ac+'%</div><div class="sl">平均置信</div></div>';rt(d.top4||[]);var ls=[];R.forEach(function(r){if(r.league&&ls.indexOf(r.league)<0)ls.push(r.league)});var fh='<button class="fn ac" onclick="sf(\'all\')">全部</button><button class="fn" onclick="sf(\'rec\')">⭐推荐</button>';ls.forEach(function(l){fh+='<button class="fn" onclick="sf(\''+l+'\')">'+l+"</button>"});document.getElementById("fb").innerHTML=fh;rm(R)}
function rt(t4){if(!t4.length){document.getElementById("t4").innerHTML="";return}var h='<div class="st"><span>🎯</span>精选推荐<span class="bh">TOP4</span></div><div class="t4g">';t4.forEach(function(m,i){var p=m.prediction||{};var cc=p.confidence>=70?"var(--gn)":p.confidence>=50?"var(--am)":"var(--rd)";var poi=p.poisson||{};h+='<div class="t4c" onclick="go(\''+m.match_id+'\')"><div class="rb">'+(i+1)+'</div><div class="t4l">'+(m.league||m.match_num||"")+'</div><div class="t4t"><img class="tl" src="'+m.home_logo+'" onerror="this.style.display=\'none\'"><span class="tn">'+m.home_team+'</span><span class="vs">VS</span><span class="tn aw">'+m.away_team+'</span><img class="tl" src="'+m.away_logo+'" onerror="this.style.display=\'none\'"></div><div class="t4p"><div class="pi"><div class="pl">比分</div><div class="pv hl">'+(p.predicted_score||"?")+'</div></div><div class="pi"><div class="pl">结果</div><div class="pv">'+(p.result||"?")+'</div></div><div class="pi"><div class="pl">置信</div><div class="pv" style="color:'+cc+'">'+(p.confidence||0)+'%</div></div></div><div class="cb"><div class="cf" style="width:'+(p.confidence||0)+'%;background:'+cc+'"></div></div><div class="t4m"><span>泊松:'+(poi.predicted_score||"?")+'</span><span>O2.5:'+(p.over_2_5_pct?p.over_2_5_pct.toFixed(0)+"%":"?")+'</span><span>'+(p.model_agreement?"✅共识":"⚠️分歧")+'</span></div></div>'});h+="</div>";document.getElementById("t4").innerHTML=h}
function rm(res){if(!res.length){document.getElementById("ms2").innerHTML='<div class="em">暂无比赛</div>';return}var f=res;if(CF==="rec")f=res.filter(function(r){return r.is_recommended});else if(CF!=="all")f=res.filter(function(r){return r.league===CF});var h='<div class="st"><span>📋</span>全部分析('+f.length+')</div>';f.forEach(function(m){var p=m.prediction||{};var tm=m.match_time||"";var rc=p.result==="主胜"?"th":p.result==="平局"?"td2":"ta2";var hs=m.home_stats||{};var as2=m.away_stats||{};var hp=p.home_win_pct||33,dp=p.draw_pct||33,ap=p.away_win_pct||33;var poi=p.poisson||{};var elo=p.elo||{};var hf=p.home_form||{};var af=p.away_form||{};var oa=p.odds_analysis||{};var ts=p.top_scores||[];h+='<div class="mc '+(m.is_recommended?"rc":"")+'" id="m-'+m.match_id+'"><div class="mh"><div class="ml"><img src="'+m.league_logo+'" onerror="this.style.display=\'none\'"> '+(m.league||"")+(m.match_num?" "+m.match_num:"")+(m.is_recommended?' <span class="tr">⭐推荐</span>':"")+'</div><div class="mt">'+tm+'</div></div><div class="mb2"><div class="mts"><div class="mi"><img src="'+m.home_logo+'" onerror="this.style.display=\'none\'"><div class="mn">'+m.home_team+'</div></div><div class="mv"><div class="ms">'+(p.predicted_score||"?-?")+'</div><span class="mr2 '+rc+'">'+(p.result||"?")+'</span></div><div class="mi"><img src="'+m.away_logo+'" onerror="this.style.display=\'none\'"><div class="mn">'+m.away_team+'</div></div></div><div class="mp"><div class="pb ph" style="flex:'+hp+'">主'+hp+'%</div><div class="pb pd" style="flex:'+dp+'">平'+dp+'%</div><div class="pb pa" style="flex:'+ap+'">客'+ap+'%</div></div><div class="extra-row"><div class="extra-box"><div class="extra-label">大小2.5</div><div class="extra-val" style="color:'+(p.over_under_2_5==="大"?"var(--gn)":"var(--am)")+'">'+(p.over_under_2_5||"?")+'</div></div><div class="extra-box"><div class="extra-label">双方进球</div><div class="extra-val" style="color:'+(p.both_score==="是"?"var(--gn)":"var(--rd)")+'">'+(p.both_score||"?")+'</div></div><div cl
