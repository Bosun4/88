<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>小鱼儿量化足球 vMAX 20.2.1-FULL</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090e;--s1:#0e1118;--s2:#141822;--s3:#1a2030;--bd:#1e2536;--bd2:#2a3447;
  --tx:#b8c4d6;--t2:#6b7a90;--t3:#3d4a5e;--w:#eaf0f8;
  --red:#ff4d5a;--gn:#00e08e;--bl:#4d8aff;--am:#ffb020;--pr:#b366ff;--cy:#00d4e0;--pk:#ff5ca0;--or:#ff8030;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
body{
  font-family:'Noto Sans SC','IBM Plex Sans',sans-serif;
  background:var(--bg);color:var(--tx);
  -webkit-font-smoothing:antialiased;
  font-size:13px;
  padding-bottom:env(safe-area-inset-bottom);
}
.m{font-family:'IBM Plex Mono',monospace}

.hdr{
  position:sticky;top:0;z-index:99;
  background:rgba(8,9,14,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bd);
  min-height:58px;display:flex;align-items:center;
  padding:0 14px;padding-top:env(safe-area-inset-top);
}
.hdr-w{max-width:1280px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hdr-l{display:flex;align-items:center;gap:8px;min-width:0}
.hdr-logo{width:6px;height:28px;background:linear-gradient(180deg,var(--gn),var(--bl));border-radius:1px;flex:0 0 auto}
.hdr-t{font-family:'IBM Plex Sans';font-size:18px;font-weight:900;color:var(--w);letter-spacing:2px;white-space:nowrap}
.hdr-v{font-size:10px;color:var(--gn);background:#00e08e15;padding:4px 8px;border-radius:4px;font-family:'IBM Plex Mono';border:1px solid #00e08e30;font-weight:800;white-space:nowrap}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);white-space:nowrap}
.live-d{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}

.wrap{max-width:1280px;margin:0 auto;padding:12px 12px}

.dash{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.dc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gn)}
.dc.t::before{background:var(--am)}.dc.r::before{background:var(--red)}.dc.b::before{background:var(--bl)}.dc.p::before{background:var(--pr)}.dc.c::before{background:var(--cy)}
.dc-v{font-family:'IBM Plex Mono';font-size:22px;font-weight:800;line-height:1}
.dc-l{font-size:8px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}

.sec{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.sec-t{font-size:14px;font-weight:900;color:var(--w)}
.sec-b{background:var(--am);color:#000;font-size:8px;font-weight:900;padding:2px 6px;border-radius:3px}
.sec-i{font-size:10px;color:var(--t2);margin-left:auto}

.today-pill{
  display:flex;align-items:center;gap:6px;justify-content:center;
  margin:0 auto 14px;background:var(--s1);border:1px solid var(--bd);
  border-radius:7px;padding:8px 10px;max-width:520px
}
.today-pill strong{color:var(--gn);font-size:11px}
.today-pill span{font-size:9px;color:var(--t2)}

.t4g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:7px;margin-bottom:14px}
.t4{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:12px;position:relative;cursor:pointer;transition:.15s;overflow:hidden}
.t4:hover{border-color:var(--am);transform:translateY(-1px)}
.t4-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--am),var(--red))}
.t4-rank{position:absolute;top:8px;right:8px;font-family:'IBM Plex Mono';font-size:20px;font-weight:800;color:var(--am);opacity:.28}
.t4-lg{font-size:10px;color:var(--am);font-weight:800;margin-bottom:5px}
.t4-teams{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.t4-tn{font-size:13px;font-weight:800;color:var(--w);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t4-tn:last-child{text-align:right}
.t4-vs{font-size:8px;color:var(--t3);font-weight:900}
.t4-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.t4-c{text-align:center;background:var(--bg);border-radius:4px;padding:5px}
.t4-cl{font-size:7px;color:var(--t3)}
.t4-cv{font-family:'IBM Plex Mono';font-size:12px;font-weight:800;color:var(--w)}
.t4-ft{font-size:9px;color:var(--or);margin-top:7px;font-weight:700;display:flex;flex-wrap:wrap;gap:4px}
.t4-ftag{padding:2px 5px;border-radius:3px;font-size:8px}

.mc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:12px}
.mc.rec{border-color:var(--am);box-shadow:0 0 0 1px #ffb02025}
.mc.s{border-color:var(--gn);box-shadow:0 0 0 1px #00e08e22}
.mc.a{border-color:var(--am)}
.mc-h{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--bd);gap:8px;flex-wrap:wrap}
.mc-lg{font-size:11px;color:var(--bl);font-weight:900}
.mc-badge{background:var(--am);color:#000;font-size:8px;font-weight:900;padding:2px 5px;border-radius:3px;margin-left:5px}
.mc-eng{font-size:9px;color:var(--gn);background:#00e08e10;padding:3px 6px;border-radius:3px;font-family:'IBM Plex Mono';border:1px solid #00e08e25;font-weight:700}
.mc-b{padding:14px 12px}

.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tm{width:35%;text-align:center;min-width:0}
.tm-n{font-size:15px;font-weight:900;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-c{text-align:center}
.sc-big{font-family:'IBM Plex Mono';font-size:38px;font-weight:900;color:var(--gn);line-height:1}
.sc-sub{font-family:'IBM Plex Mono';font-size:10px;color:var(--t3);margin-top:2px}
.res-tag{display:inline-block;font-size:9px;padding:3px 7px;border-radius:3px;font-weight:900;margin-top:5px}
.res-tag.h{background:#ff4d5a18;color:var(--red)}
.res-tag.d{background:#ffb02018;color:var(--am)}
.res-tag.a{background:#4d8aff18;color:var(--bl)}

.sr{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.sb{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px 6px;text-align:center}
.sb-l{font-size:8px;color:var(--t3);text-transform:uppercase}
.sb-v{font-family:'IBM Plex Mono';font-size:15px;font-weight:900;margin-top:3px}

.prob{margin-bottom:12px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px 10px}
.prob-h{display:flex;justify-content:space-between;font-size:10px;font-weight:900;margin-bottom:5px}
.prob-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--s2)}
.prob-bar .h{background:var(--red)}.prob-bar .d{background:#64748b}.prob-bar .a{background:var(--bl)}

.block{margin-bottom:12px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#0e1118,#0a0d14);border:1px solid var(--bd2)}
.block-h{padding:8px 10px;background:linear-gradient(90deg,#00e08e15,#4d8aff10);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px}
.block-t{font-size:12px;font-weight:900;color:var(--gn);letter-spacing:.4px}
.block-meta{font-family:'IBM Plex Mono';font-size:9px;color:var(--t2)}
.block-b{padding:10px}

.sel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.sel{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px;text-align:center}
.sel-l{font-size:8px;color:var(--t3);text-transform:uppercase}
.sel-v{font-family:'IBM Plex Mono';font-size:15px;font-weight:900;margin-top:3px}
.tier-S{color:var(--gn)}.tier-A{color:var(--am)}.tier-B{color:var(--bl)}.tier-C{color:var(--cy)}.tier-D{color:var(--red)}

.mc-warn{font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px;border:1px solid;background:rgba(0,0,0,0.2)}

.sl{font-size:9px;color:var(--t3);font-weight:900;margin:8px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.5px}

.warn{padding:7px 9px;border-radius:5px;font-size:10px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:4px;background:#ff4d5a0a;border:1px solid #ff4d5a20;color:var(--red)}
.sig{padding:7px 9px;border-radius:5px;font-size:10px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:4px;line-height:1.45;word-break:break-word}
.sig-r{background:#ff4d5a0a;border:1px solid #ff4d5a20;color:var(--red)}
.sig-a{background:#ffb0200a;border:1px solid #ffb02020;color:var(--am)}
.sig-g{background:#00e08e0a;border:1px solid #00e08e20;color:var(--gn)}
.sig-b{background:#4d8aff0a;border:1px solid #4d8aff20;color:var(--bl)}
.sig-p{background:#b366ff0a;border:1px solid #b366ff20;color:var(--pr)}
.sig-c{background:#00d4e00a;border:1px solid #00d4e020;color:var(--cy)}

.ai-box{border:1px solid var(--am);border-radius:8px;overflow:hidden;margin-bottom:8px;background:linear-gradient(135deg,rgba(255,176,32,.04),rgba(255,80,48,.02))}
.ai-h{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,176,32,.15)}
.ai-t{font-size:13px;font-weight:900;color:var(--am)}
.ai-s{font-family:'IBM Plex Mono';font-size:17px;font-weight:900;color:var(--w);background:var(--s2);padding:2px 8px;border-radius:4px}
.ai-x{font-size:13px;color:var(--tx);line-height:1.65;padding:12px;letter-spacing:.2px;white-space:pre-wrap;word-break:break-word}

.ai2{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.ai2-c{padding:9px;background:var(--bg);border-right:1px solid var(--bd)}
.ai2-c:last-child{border:none}
.ai2-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ai2-t{font-size:10px;font-weight:900}
.ai2-t.gpt{color:var(--gn)}.ai2-t.grk{color:var(--cy)}
.ai2-s{font-family:'IBM Plex Mono';font-size:12px;font-weight:900;color:var(--w);background:var(--s2);padding:2px 5px;border-radius:3px}
.ai2-x{font-size:9px;color:var(--t2);line-height:1.5;white-space:pre-wrap;word-break:break-word}

.tbtn{width:100%;padding:8px;background:none;border:1px solid var(--bd);border-radius:6px;color:var(--t2);font-size:11px;cursor:pointer;font-weight:800;transition:.15s;font-family:'IBM Plex Sans','Noto Sans SC'}
.tbtn:hover{background:var(--s2);color:var(--w)}
.det{display:none;padding:0 12px 14px}
.det.open{display:block}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mb{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px;position:relative;overflow:hidden}
.mb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gn)}
.mb-t{font-size:10px;font-weight:900;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px;color:var(--gn)}
.mb-r{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;gap:10px}
.mb-l{color:var(--t3)}
.mb-v{font-family:'IBM Plex Mono';font-weight:800;color:var(--w);font-size:9px;text-align:right;word-break:break-word}
.chip{display:inline-block;background:var(--s2);border:1px solid var(--bd);padding:3px 6px;border-radius:4px;font-size:9px;font-family:'IBM Plex Mono';color:var(--t2);margin:2px}
.chip.top{border-color:var(--gn);color:var(--gn)}

.json-box{background:#0b101a;border:1px solid #20304a;color:#5792ff;border-radius:6px;padding:9px;margin-bottom:7px;font-family:'IBM Plex Mono';font-size:10px;line-height:1.45;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow:auto}
.foot{text-align:center;padding:16px;color:var(--t3);font-size:8px;border-top:1px solid var(--bd);margin-top:16px;line-height:1.7}
.empty{text-align:center;padding:42px 14px;color:var(--t3)}

@media(max-width:760px){
  .hdr{min-height:56px}
  .hdr-t{font-size:17px;letter-spacing:1px}
  .live{font-size:10px}
  .dash{grid-template-columns:repeat(3,1fr)}
  .sr{grid-template-columns:repeat(2,1fr)}
  .sel-grid{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:1fr}
  .ai2{grid-template-columns:1fr}
  .ai2-c{border-right:none;border-bottom:1px solid var(--bd)}
  .ai2-c:last-child{border-bottom:none}
  .t4g{grid-template-columns:1fr}
}
@media(max-width:480px){
  .wrap{padding:12px 10px}
  .dash{grid-template-columns:repeat(2,1fr)}
  .tm-n{font-size:14px}
  .sc-big{font-size:35px}
  .sel-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-w">
    <div class="hdr-l">
      <div class="hdr-logo"></div>
      <div class="hdr-t">小鱼儿量化足球 vMAX</div>
      <div class="hdr-v" id="ver">20.2.1-FULL</div>
    </div>
    <div class="live"><div class="live-d"></div><span class="m" id="ut">…</span></div>
  </div>
</div>

<div class="wrap">
  <div class="dash" id="db"></div>

  <div class="sec">
    <div class="sec-t">今日精选推荐</div>
    <div class="sec-b">GPT/GROK 初审 · GEMINI 终审</div>
    <div class="sec-i" id="t4ic"></div>
  </div>
  <div class="t4g" id="t4"></div>

  <div class="today-pill">
    <strong>今日竞彩业务日</strong>
    <span id="scopeInfo">today only</span>
  </div>

  <div id="ms"></div>

  <div class="foot">
    vMAX 20.2.1-FULL · AI-NATIVE 三AI架构 · GPT/Grok 初审 · Gemini 终审裁判<br>
    Claude 已移除 · 本地只做抓包 / 调用 / JSON解析 / 字段闭环 / 前端展示，不篡改最终比分<br>
    总进球锚点 · CRS正确比分 · 让球形态 · 联赛风格 · 资金流 / Sharp / Web Research 审计
  </div>
</div>

<script>
var D=null;

function esc(s){
  if(s===null||s===undefined)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function V(v, fallback='?'){
  return (v!==null&&v!==undefined&&v!==''&&v!=='None') ? v : fallback;
}

function num(v, d=0){
  var n=parseFloat(v);
  return isFinite(n)?n:d;
}

function fmt1(v){
  var n=num(v, NaN);
  return isFinite(n)?n.toFixed(1):'?';
}

function validScore(s){
  if(!s)return false;
  s=String(s).trim();
  return !(s===''||s==='-'||s==='?'||s==='弃权'||s==='N/A'||s==='None'||s==='移除');
}

function cl(t){
  if(!t)return '弃权或暂无解析';
  return esc(String(t).replace(/```json/g,'').replace(/```/g,'').trim());
}

function resultClass(r){
  var v=String(r||'');
  if(v==='home'||v==='主胜'||v==='胜')return 'h';
  if(v==='draw'||v==='平局'||v==='平')return 'd';
  if(v==='away'||v==='客胜'||v==='负')return 'a';
  return 'd';
}

function directionLabel(v){
  v=String(v||'').trim();
  if(v==='home'||v==='主胜'||v==='胜')return '主胜';
  if(v==='draw'||v==='平局'||v==='平')return '平局';
  if(v==='away'||v==='客胜'||v==='负')return '客胜';
  return v||'?';
}

function pick(){
  for(var i=0;i<arguments.length;i++){
    var v=arguments[i];
    if(v!==null&&v!==undefined&&v!==''&&v!=='None')return v;
  }
  return undefined;
}

function confidenceColor(c){
  c=num(c,0);
  return c>=75?'color:var(--gn)':c>=60?'color:var(--am)':'color:var(--red)';
}

function tierClass(t){
  t=String(t||'D').toUpperCase();
  if(['S','A','B','C','D'].indexOf(t)<0)t='D';
  return 'tier-'+t;
}

function tierScore(t){
  t=String(t||'D').toUpperCase();
  return {S:5,A:4,B:3,C:2,D:1}[t]||1;
}

function matchKey(m){
  var key = m.id || m.match_id || m.match_num || ((m.league||'')+'|'+(m.home_team||m.home||'')+'|'+(m.away_team||m.guest||''));
  return String(key).replace(/[^\w\u4e00-\u9fa5-]/g,'_');
}

function getTodayMatches(d){
  if(!d)return [];
  if(d.matches && Array.isArray(d.matches.today))return d.matches.today;
  if(Array.isArray(d.today))return d.today;
  if(Array.isArray(d.matches))return d.matches;
  return [];
}

function DS(p){
  if(validScore(p.predicted_score))return p.predicted_score;
  if(validScore(p.gemini_score))return p.gemini_score;
  if(validScore(p.predicted_label))return p.predicted_label;
  return '?';
}

function finalReason(p){
  return p.final_audit_reason || p.reason || p.gemini_analysis || '';
}

function getBttsLabel(p){
  var v = p.btts_ai || p.ai_btts || p.btts_label || p.btts_decision || p.btts;
  if(v!==undefined && v!==null && String(v).trim()!=='')return String(v);
  return '?';
}

function getProb(p){
  var hp=num(p.home_win_pct, 33);
  var dp=num(p.draw_pct, 33);
  var ap=num(p.away_win_pct, 34);
  var s=hp+dp+ap;
  if(s<=0){hp=33;dp=33;ap=34;s=100;}
  if(Math.abs(s-100)>2){
    hp=hp/s*100;dp=dp/s*100;ap=100-hp-dp;
  }
  return {h:Math.max(0,hp),d:Math.max(0,dp),a:Math.max(0,ap)};
}

function getWarnings(p){
  var arr=[];
  [
    'risk_flags','score_shape_warnings','selection_warnings','validation_warnings','postprocess_warnings',
    'tail_risk_flags','recommend_gate_reasons','recommendation_downgrade_reasons','smart_signals'
  ].forEach(function(k){
    if(Array.isArray(p[k]))arr=arr.concat(p[k]);
    else if(p[k])arr.push(p[k]);
  });
  var rec=getRecommendation(p);
  if(Array.isArray(rec.risk_tags))arr=arr.concat(rec.risk_tags);
  return arr.filter(function(x,i,a){return x && a.indexOf(x)===i;});
}

function aiOk(p){
  return validScore(p.gpt_score)||validScore(p.grok_score)||validScore(p.gemini_score)||validScore(p.predicted_score);
}

function objText(o){
  if(o===null||o===undefined||o==='')return '';
  if(typeof o==='string')return o;
  try{return JSON.stringify(o,null,2);}catch(e){return String(o);}
}

function getRecommendation(p){
  var r=p.recommendation||{};
  if(!r || typeof r!=='object')r={};
  return r;
}

function isTopPickMatch(m,p){
  p=p||{};
  var action=String(p.final_action||p.selection_layer||'').trim();
  if(action==='放弃'||action==='观察'||action==='防平')return false;
  // v20.6: Top4 只是候选展示，不再覆盖 Gemini/AI 的最终行动层。
  return (m.is_recommended===true || m.is_strict_recommended===true || m.is_top4_candidate===true) && isGatePass(p);
}

function isGatePass(p){
  p=p||{};
  var rec=getRecommendation(p);
  var action=String(p.final_action||p.selection_layer||rec.bet_action||'').trim().toLowerCase();
  if(action==='放弃'||action==='观察'||action==='防平'||action==='no_bet'||action==='observe')return false;
  return rec.is_recommended===true || p.recommend_gate_pass===true;
}

function effectiveTier(p){
  var rec=getRecommendation(p||{});
  return String(p.recommendation_tier || rec.tier || p.direction_tier || 'D').toUpperCase();
}

function stableText(v){
  v=String(v||'').toLowerCase();
  if(v==='strong')return '强';
  if(v==='medium')return '中';
  if(v==='weak')return '弱';
  return v||'?';
}

function riskLabel(v){
  v=String(v||'').toLowerCase();
  if(v==='low')return '低';
  if(v==='medium')return '中';
  if(v==='high')return '高';
  return v||'?';
}

fetch('data/predictions.json?t='+Date.now())
  .then(function(r){
    if(!r.ok)throw new Error('网络请求失败 HTTP '+r.status);
    return r.json();
  })
  .then(function(d){
    D=d;
    document.getElementById('ut').textContent=d.update_time||'数据已最新';
    document.getElementById('ver').textContent=d.version||'20.2.1-FULL';
    var rt=d.runtime||{};
    document.getElementById('scopeInfo').textContent=
      'batch='+V(rt.ai_batch_size,'?')+
      ' · model_concurrency='+V(rt.ai_model_concurrency,'?')+
      ' · final=Gemini';
    renderDashboard();
    renderTop4(d.top4||[]);
    renderMatches();
  })
  .catch(function(e){
    console.error('加载失败:',e);
    document.getElementById('ms').innerHTML='<div class="empty">等待数据同步或解析失败<br><span style="font-size:10px;opacity:.55">'+esc(e.message)+'</span></div>';
  });

function renderDashboard(){
  var ms=getTodayMatches(D);
  var total=ms.length;
  var cf=0, ds=0, ss=0, aiCount=0, sTier=0, abTier=0;

  ms.forEach(function(m){
    var p=m.prediction||{};
    cf+=num(p.ai_avg_confidence||p.confidence,0);
    ds+=num(p.direction_selection_score||p.ai_avg_confidence,0);
    ss+=num(p.score_shape_score||p.ai_avg_confidence,0);
    if(aiOk(p))aiCount++;
    var tier=effectiveTier(p);
    if(tier==='S')sTier++;
    if(tier==='A'||tier==='B')abTier++;
  });

  var avgCf=total?Math.round(cf/total):0;
  var avgDs=total?Math.round(ds/total):0;
  var avgSs=total?Math.round(ss/total):0;

  document.getElementById('db').innerHTML=
    '<div class="dc"><div class="dc-v" style="color:var(--am)">'+total+'</div><div class="dc-l">今日赛事</div></div>'+
    '<div class="dc t"><div class="dc-v" style="color:var(--gn)">'+(D.top4?D.top4.length:0)+'</div><div class="dc-l">精选</div></div>'+
    '<div class="dc r"><div class="dc-v" style="color:var(--gn)">'+sTier+'</div><div class="dc-l">S级</div></div>'+
    '<div class="dc p"><div class="dc-v" style="color:var(--am)">'+abTier+'</div><div class="dc-l">A/B级</div></div>'+
    '<div class="dc c"><div class="dc-v" style="color:var(--cy)">'+avgDs+'</div><div class="dc-l">方向分</div></div>'+
    '<div class="dc b"><div class="dc-v" style="color:var(--bl)">'+avgSs+'</div><div class="dc-l">比分形态</div></div>';
}

function renderTop4(t4){
  var el=document.getElementById('t4');
  if(!t4||!t4.length){
    el.innerHTML='<div class="empty">暂无今日精选推荐</div>';
    document.getElementById('t4ic').textContent='';
    return;
  }

  document.getElementById('t4ic').textContent=t4.length+'场';

  el.innerHTML=t4.map(function(m,i){
    var p=m.prediction||{};
    var key=matchKey(m);
    var tier=effectiveTier(p);
    var rec=getRecommendation(p);
    var ft='';

    if(tier)ft+='<span class="t4-ftag" style="background:#00e08e15;color:var(--gn)">评级 '+esc(tier)+'</span>';
    if(p.ai_avg_confidence!==undefined)ft+='<span class="t4-ftag" style="background:#4d8aff15;color:var(--bl)">AI '+fmt1(p.ai_avg_confidence)+'</span>';
    if(p.direction_stability||rec.direction_stability)ft+='<span class="t4-ftag" style="background:#b366ff15;color:var(--pr)">方向 '+esc(stableText(p.direction_stability||rec.direction_stability))+'</span>';
    if(p.score_stability||rec.score_stability)ft+='<span class="t4-ftag" style="background:#00d4e015;color:var(--cy)">比分 '+esc(stableText(p.score_stability||rec.score_stability))+'</span>';
    if(getWarnings(p).length)ft+='<span class="t4-ftag" style="background:#ff4d5a15;color:var(--red)">风险 '+getWarnings(p).length+'</span>';

    return '<div class="t4" onclick="go(\'m-'+key+'\')">'+
      '<div class="t4-bar"></div>'+
      '<div class="t4-rank">#'+(i+1)+'</div>'+
      '<div class="t4-lg">'+esc(m.league||'')+' '+esc(m.match_num||'')+'</div>'+
      '<div class="t4-teams"><span class="t4-tn">'+esc(m.home_team||m.home||'')+'</span><span class="t4-vs">VS</span><span class="t4-tn">'+esc(m.away_team||m.guest||'')+'</span></div>'+
      '<div class="t4-grid">'+
        '<div class="t4-c"><div class="t4-cl">比分</div><div class="t4-cv" style="color:var(--gn)">'+esc(DS(p))+'</div></div>'+
        '<div class="t4-c"><div class="t4-cl">结果</div><div class="t4-cv">'+esc(directionLabel(p.display_direction||p.result||p.final_direction))+'</div></div>'+
        '<div class="t4-c"><div class="t4-cl">推荐层</div><div class="t4-cv '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
      '</div>'+
      (rec.why_recommended?'<div class="t4-ft"><span class="t4-ftag" style="background:#4d8aff15;color:var(--bl)">'+esc(rec.why_recommended).slice(0,80)+'</span></div>':'')+
      (ft?'<div class="t4-ft">'+ft+'</div>':'')+
    '</div>';
  }).join('');
}

function renderSelectionBlock(p){
  var rec=getRecommendation(p);
  var tier=effectiveTier(p);
  var dt=String(p.direction_stability||rec.direction_stability||p.direction_tier||'medium');
  var st=String(p.score_stability||rec.score_stability||p.score_tier||'medium');

  var warnHtml='';
  if(warnings.length){
    warnHtml='<div class="sl">⚠️ 风险标签 / 降级原因</div>'+
      warnings.slice(0,12).map(function(w){return '<div class="warn">'+esc(w)+'</div>';}).join('');
  }

  var displayConf=(rec.display_bet_confidence!==undefined?rec.display_bet_confidence:(p.display_confidence!==undefined?p.display_confidence:(p.ai_avg_confidence||rec.bet_confidence||p.confidence)));
  return '<div class="block">'+
    '<div class="block-h">'+
      '<div class="block-t">🎯 AI-NATIVE 推荐结论</div>'+
      '<div class="block-meta">Gemini终审输出 · 本地只做展示</div>'+
    '</div>'+
    '<div class="block-b">'+
      '<div class="sel-grid">'+
        '<div class="sel"><div class="sel-l">综合推荐</div><div class="sel-v '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
        '<div class="sel"><div class="sel-l">AI推荐分</div><div class="sel-v '+tierClass(tier)+'">'+fmt1(displayConf)+'</div></div>'+
        '<div class="sel"><div class="sel-l">方向稳定</div><div class="sel-v '+tierClass(tier)+'">'+esc(stableText(dt))+'</div></div>'+
        '<div class="sel"><div class="sel-l">比分稳定</div><div class="sel-v '+tierClass(tier)+'">'+esc(stableText(st))+'</div></div>'+
        '<div class="sel"><div class="sel-l">形态</div><div class="sel-v">'+esc(V(p.goal_band,'?'))+' · '+esc(getBttsLabel(p))+'</div></div>'+
        '<div class="sel"><div class="sel-l">行动层</div><div class="sel-v">'+esc(V(p.final_action||p.selection_layer||rec.bet_action,'观察'))+'</div></div>'+
      '</div>'+
      (rec.why_recommended?'<div class="sig sig-b">推荐理由：'+esc(rec.why_recommended)+'</div>':'')+
      (rec.stake_style?'<div class="sig sig-a">仓位风格：'+esc(rec.stake_style)+'</div>':'')+
      (p.why_recommended?'<div class="sig sig-b">推荐说明：'+esc(p.why_recommended)+'</div>':'')+
      warnHtml+
    '</div>'+
  '</div>';
}

function renderAiBlock(p){
  return '<div class="ai-box">'+
    '<div class="ai-h"><div class="ai-t">👑 GEMINI 终审裁判</div><div class="ai-s">'+esc(p.gemini_score||p.predicted_score||'弃权')+'</div></div>'+

  '<div class="ai2">'+

    '<div class="ai2-c"><div class="ai2-h"><span class="ai2-t grk">GROK 初审</span><span class="ai2-s">'+esc(p.grok_score||'弃权')+'</span></div><div class="ai2-x">'+cl(p.grok_analysis)+'</div></div>'+

function renderSignals(p){
  var html='';
  var mi=p.market_interpretation||{};
  var aa=p.anchor_audit||{};
  var web=p.web_research||{};
  var sigs=p.smart_signals||[];

  if(mi.sharp_money_direction)html+='<div class="sig sig-g">Sharp方向：'+esc(mi.sharp_money_direction)+' '+esc(mi.external_market||'')+'</div>';
  if(mi.public_money_direction)html+='<div class="sig sig-a">散户方向：'+esc(mi.public_money_direction)+'</div>';
  if(mi.heat_risk)html+='<div class="sig sig-a">热度风险：'+esc(mi.heat_risk)+'</div>';

  if(aa.one_x_two)html+='<div class="sig sig-b">1X2结构：'+esc(aa.one_x_two)+'</div>';
  if(aa.handicap)html+='<div class="sig sig-b">让球结构：'+esc(aa.handicap)+'</div>';
  if(aa.total_goals)html+='<div class="sig sig-b">总进球结构：'+esc(aa.total_goals)+'</div>';
  if(aa.correct_score)html+='<div class="sig sig-b">比分赔率结构：'+esc(aa.correct_score)+'</div>';
  if(aa.league_style)html+='<div class="sig sig-c">联赛/球队风格：'+esc(aa.league_style)+'</div>';
  if(aa.exclusion)html+='<div class="sig sig-p">排除法：'+esc(aa.exclusion)+'</div>';

  if(web.used===false){
    html+='<div class="sig sig-a">联网状态：'+esc(web.failure_reason||'no_live_web_access')+'</div>';
  }else if(web.used===true){
    html+='<div class="sig sig-g">联网核验：'+esc((web.key_findings||[]).join('；')||'已使用')+'</div>';
  }

  var seen={};
  sigs.forEach(function(s){
    if(!s||seen[s])return;
    seen[s]=1;
    var cls='sig-a';
    var txt=String(s);
    if(txt.indexOf('FINAL_SOURCE')>=0)cls='sig-p';
    if(txt.indexOf('Sharp')>=0||txt.indexOf('Steam')>=0||txt.indexOf('聪明钱')>=0)cls='sig-g';
    if(txt.indexOf('价值')>=0||txt.indexOf('EV')>=0)cls='sig-p';
    if(txt.indexOf('警')>=0||txt.indexOf('🚨')>=0||txt.indexOf('冲突')>=0||txt.indexOf('风险')>=0)cls='sig-r';
    html+='<div class="sig '+cls+'">'+esc(txt)+'</div>';
  });

  return html;
}

function renderDetails(m,p){
  var top=p.top_score_candidates||p.unified_matrix_top_scores||[];
  var aa=p.anchor_audit||{};
  var mi=p.market_interpretation||{};
  var web=p.web_research||{};
  var rec=p.recommendation||{};
  var odds=[
    ['体彩主胜',pick(m.sp_home,m.win)],
    ['体彩平局',pick(m.sp_draw,m.same)],
    ['体彩客胜',pick(m.sp_away,m.lose)],
    ['让球',pick(m.give_ball,m.handicap,m.rq)],
    ['总进球0',m.a0],
    ['总进球1',m.a1],
    ['总进球2',m.a2],
    ['总进球3',m.a3],
    ['总进球4',m.a4],
    ['总进球5',m.a5],
    ['总进球6',m.a6],
    ['总进球7+',m.a7]
  ];

  var html='<div class="sl">抓包赔率 / 结构字段</div><div class="mg">';
  html+='<div class="mb"><div class="mb-t">体彩竞彩抓包</div>';
  odds.forEach(function(o){html+='<div class="mb-r"><span class="mb-l">'+esc(o[0])+'</span><span class="mb-v">'+esc(V(o[1]))+'</span></div>';});
  html+='</div>';

  html+='<div class="mb"><div class="mb-t">AI结构输出</div>'+
    '<div class="mb-r"><span class="mb-l">goal_band</span><span class="mb-v">'+esc(V(p.goal_band))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">btts_ai</span><span class="mb-v">'+esc(getBttsLabel(p))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">AI置信</span><span class="mb-v">'+esc(V(p.ai_avg_confidence||rec.bet_confidence||p.confidence))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">方向稳定</span><span class="mb-v">'+esc(stableText(V(p.direction_stability||rec.direction_stability)))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">比分稳定</span><span class="mb-v">'+esc(stableText(V(p.score_stability||rec.score_stability)))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">expected_total_goals</span><span class="mb-v">'+esc(V(p.expected_total_goals))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">engine</span><span class="mb-v">'+esc(V(p.engine_version))+'</span></div>'+
  '</div>';
  html+='</div>';

  if(top&&top.length){
    html+='<div class="sl">候选比分</div><div>';
    top.slice(0,12).forEach(function(c,i){
      var sc=Array.isArray(c)?c[0]:(c.score||'?');
      var pr=Array.isArray(c)?c[1]:(c.prob||c.p||'');
      var why=Array.isArray(c)?'':(c.why||'');
      html+='<span class="chip '+(i===0?'top':'')+'">'+esc(sc)+' '+esc(pr)+(why?' · '+esc(why).slice(0,30):'')+'</span>';
    });
    html+='</div>';
  }

  html+='<div class="sl">Anchor Audit</div>';
  html+='<div class="json-box">'+esc(objText(aa)||'无 anchor_audit')+'</div>';

  html+='<div class="sl">Market Interpretation</div>';
  html+='<div class="json-box">'+esc(objText(mi)||'无 market_interpretation')+'</div>';

  html+='<div class="sl">Web Research</div>';
  html+='<div class="json-box">'+esc(objText(web)||'无 web_research')+'</div>';

  html+='<div class="sl">Recommendation</div>';
  html+='<div class="json-box">'+esc(objText(rec)||'无 recommendation')+'</div>';

  return html;
}

function renderMatches(){
  var el=document.getElementById('ms');
  var ms=getTodayMatches(D);

  if(!ms||!ms.length){
    el.innerHTML='<div class="empty">今日暂无比赛数据</div>';
    return;
  }

  el.innerHTML=ms.map(function(m,idx){
    var p=m.prediction||{};
    var key=matchKey(m);
    var prob=getProb(p);
    var score=DS(p);
    var displayDir=directionLabel(p.display_direction||p.result||p.final_direction);
    var rc=resultClass(displayDir);
    var tier=effectiveTier(p);
    var rec=getRecommendation(p);
    var isTopPick=isTopPickMatch(m,p);
    var gatePass=isGatePass(p);
    var cls=(isTopPick?'rec ':'')+(gatePass?'a ':'')+(tier==='S'?'s ':tier==='A'?'a ':'');
    var aiConf=V(p.ai_avg_confidence||p.ai_confidence||rec.bet_confidence||p.confidence,0);

    return '<div class="mc '+cls+'" id="m-'+key+'">'+
      '<div class="mc-h">'+
        '<div class="mc-lg">'+esc(m.league||'')+' <span class="m">'+esc(m.match_num||'')+'</span>'+(isTopPick?'<span class="mc-badge">精选</span>':(gatePass?'<span class="mc-badge">可关注</span>':''))+'</div>'+
        '<div class="mc-eng">'+esc(p.engine_version||D.version||'vMAX 20.2.1-FULL')+'</div>'+
      '</div>'+
      (function(){
        var wHTML='';
        var rItem = p.raw_item || {};
        var pM = rItem.public_money_direction || p.public_money_direction;
        var sM = rItem.sharp_money_direction || p.sharp_money_direction;
        if(prob.h>65 && String(m.league).match(/瑞超|瑞典超|挪超/)){
           wHTML+='<span class="mc-warn" style="color:var(--red);border-color:var(--red)">🚨 北欧大热必死(>65%)</span>';
        }
        if(pM==='home' && sM==='unclear'){
           wHTML+='<span class="mc-warn" style="color:var(--am);border-color:var(--am)">⚠️ 聪明钱背离</span>';
        }
        var wStr = (p.validation_warnings||[]).join('');
        if(wStr.indexOf('weak_home_tail')>=0){
           wHTML+='<span class="mc-warn" style="color:var(--pr);border-color:var(--pr)">⛔ 防冷·深盘/客不败保护</span>';
        }
        return wHTML ? '<div style="padding:10px 16px 0;display:flex;gap:8px;flex-wrap:wrap;">'+wHTML+'</div>' : '';
      })()+
      '<div class="mc-b">'+
        '<div class="teams">'+
          '<div class="tm"><div class="tm-n">'+esc(m.home_team||m.home||'')+'</div></div>'+
          '<div class="sc-c"><div class="sc-big">'+esc(score)+'</div><div class="sc-sub">Gemini终审比分</div><span class="res-tag '+rc+'">'+esc(displayDir)+'</span></div>'+
          '<div class="tm"><div class="tm-n">'+esc(m.away_team||m.guest||'')+'</div></div>'+
        '</div>'+

        '<div class="sr">'+
          '<div class="sb"><div class="sb-l">推荐层</div><div class="sb-v '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
          '<div class="sb"><div class="sb-l">方向稳定</div><div class="sb-v" style="color:var(--cy)">'+esc(stableText(V(p.direction_stability||rec.direction_stability,'medium')))+'</div></div>'+
          '<div class="sb"><div class="sb-l">比分稳定</div><div class="sb-v" style="color:var(--pr)">'+esc(stableText(V(p.score_stability||rec.score_stability,'medium')))+'</div></div>'+
          '<div class="sb"><div class="sb-l">Goal Band</div><div class="sb-v" style="color:var(--am)">'+esc(V(p.goal_band))+'</div></div>'+
          '<div class="sb"><div class="sb-l">BTTS</div><div class="sb-v" style="color:var(--bl)">'+esc(getBttsLabel(p))+'</div></div>'+
          '<div class="sb"><div class="sb-l">AI信心</div><div class="sb-v" style="'+confidenceColor(aiConf)+'">'+esc(aiConf)+'</div></div>'+
        '</div>'+

        '<div class="prob">'+
          '<div class="prob-h"><span style="color:var(--red)">主 '+fmt1(prob.h)+'%</span><span style="color:var(--t2)">平 '+fmt1(prob.d)+'%</span><span style="color:var(--bl)">客 '+fmt1(prob.a)+'%</span></div>'+
          '<div class="prob-bar"><div class="h" style="width:'+prob.h+'%"></div><div class="d" style="width:'+prob.d+'%"></div><div class="a" style="width:'+prob.a+'%"></div></div>'+
        '</div>'+

        renderSelectionBlock(p)+
        renderAiBlock(p)+
        renderSignals(p)+

        '<button class="tbtn" onclick="tg(this,\'d-'+key+'\')">展开抓包与底层字段 ▼</button>'+
      '</div>'+
      '<div class="det" id="d-'+key+'">'+renderDetails(m,p)+'</div>'+
    '</div>';
  }).join('');
}

function tg(b,id){
  var e=document.getElementById(id);
  if(!e)return;
  if(e.classList.contains('open')){
    e.classList.remove('open');
    b.textContent='展开抓包与底层字段 ▼';
  }else{
    e.classList.add('open');
    b.textContent='收起 ▲';
  }
}

function go(id){
  var e=document.getElementById(id);
  if(e){
    e.scrollIntoView({behavior:'smooth',block:'center'});
    var det=document.getElementById('d-'+id.replace('m-',''));
    if(det&&!det.classList.contains('open'))det.classList.add('open');
  }
}
