<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小鱼儿量化足球V4.22</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090e;--s1:#0e1118;--s2:#141822;--bd:#1e2536;--tx:#b8c4d6;--t2:#6b7a90;--t3:#3d4a5e;--w:#eaf0f8;--red:#ff4d5a;--gn:#00e08e;--bl:#4d8aff;--am:#ffb020;--pr:#b366ff;--cy:#00d4e0;--pk:#ff5ca0;--or:#ff8030}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;font-size:13px}
.m{font-family:'IBM Plex Mono',monospace}
.hdr{position:sticky;top:0;z-index:99;background:rgba(8,9,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);height:44px;display:flex;align-items:center;padding:0 16px}
.hdr-w{max-width:1280px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-logo{width:6px;height:20px;background:var(--gn);border-radius:1px}
.hdr-t{font-family:'IBM Plex Sans';font-size:14px;font-weight:800;color:var(--w);letter-spacing:1px}
.hdr-v{font-size:9px;color:var(--t3);background:var(--s2);padding:2px 6px;border-radius:3px;font-family:'IBM Plex Mono';border:1px solid var(--bd)}
.live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
.live-d{width:5px;height:5px;border-radius:50%;background:var(--gn);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}
.wrap{max-width:1280px;margin:0 auto;padding:10px 12px}
.dash{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:14px}
.dc{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:8px 10px}
.dc-v{font-family:'IBM Plex Mono';font-size:20px;font-weight:700}.dc-l{font-size:8px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.sec{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sec-t{font-size:13px;font-weight:800;color:var(--w)}.sec-b{background:var(--am);color:#000;font-size:7px;font-weight:800;padding:2px 5px;border-radius:2px}
.t4g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:5px;margin-bottom:14px}
.t4{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px;position:relative;cursor:pointer;transition:.15s;overflow:hidden}
.t4:hover{border-color:var(--am)}
.t4-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--am),var(--red))}
.t4-rank{position:absolute;top:8px;right:8px;font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--am);opacity:.3}
.t4-lg{font-size:9px;color:var(--am);font-weight:700;margin-bottom:4px}
.t4-teams{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.t4-tn{font-size:12px;font-weight:700;color:var(--w);flex:1}.t4-tn:last-child{text-align:right}
.t4-vs{font-size:8px;color:var(--t3);font-weight:800}
.t4-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.t4-c{text-align:center;background:var(--bg);border-radius:3px;padding:4px}
.t4-cl{font-size:7px;color:var(--t3)}.t4-cv{font-family:'IBM Plex Mono';font-size:11px;font-weight:700;color:var(--w)}
.t4-ft{font-size:8px;color:var(--or);margin-top:4px}
.tabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:2px;max-width:320px;margin:0 auto 14px}
.tab{flex:1;text-align:center;padding:5px;border-radius:3px;font-size:10px;font-weight:700;color:var(--t3);cursor:pointer;border:none;background:none;transition:.15s}.tab.ac{background:var(--bl);color:#fff}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:5px}.mc.rec{border-color:var(--am)}
.mc-h{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--bg);border-bottom:1px solid var(--bd)}
.mc-lg{font-size:10px;color:var(--bl);font-weight:700}
.mc-badge{background:var(--am);color:#000;font-size:7px;font-weight:800;padding:1px 4px;border-radius:2px;margin-left:4px}
.mc-b{padding:12px}
.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tm{width:35%;text-align:center}.tm-n{font-size:13px;font-weight:700;color:var(--w)}
.sc-c{text-align:center}
.sc-big{font-family:'IBM Plex Mono';font-size:28px;font-weight:700;color:var(--gn)}
.sc-sub{font-family:'IBM Plex Mono';font-size:9px;color:var(--t3);margin-top:1px}
.res-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:2px;font-weight:700;margin-top:2px}
.res-tag.h{background:#ff4d5a18;color:var(--red)}.res-tag.d{background:#ffb02018;color:var(--am)}.res-tag.a{background:#4d8aff18;color:var(--bl)}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:8px}
.sb{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px;text-align:center}
.sb-l{font-size:7px;color:var(--t3);text-transform:uppercase}.sb-v{font-family:'IBM Plex Mono';font-size:12px;font-weight:700}
.prob{margin-bottom:8px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px 10px}
.prob-h{display:flex;justify-content:space-between;font-size:9px;font-weight:700;margin-bottom:3px}
.prob-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;background:var(--s2)}
.prob-bar .h{background:var(--red)}.prob-bar .d{background:#64748b}.prob-bar .a{background:var(--bl)}
.sig{padding:5px 8px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.sig-r{background:#ff4d5a0a;border:1px solid #ff4d5a20;color:var(--red)}
.sig-a{background:#ffb0200a;border:1px solid #ffb02020;color:var(--am)}
.sig-g{background:#00e08e0a;border:1px solid #00e08e20;color:var(--gn)}
.sig-b{background:#4d8aff0a;border:1px solid #4d8aff20;color:var(--bl)}
.sig-p{background:#b366ff0a;border:1px solid #b366ff20;color:var(--pr)}
.exp{border:1px solid var(--or);border-radius:6px;overflow:hidden;margin-bottom:5px;background:linear-gradient(135deg,rgba(255,128,48,.04),rgba(255,80,90,.02))}
.exp-h{padding:5px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,128,48,.15)}
.exp-t{font-size:10px;font-weight:800;color:var(--or)}.exp-s{font-family:'IBM Plex Mono';font-size:12px;font-weight:700;color:var(--w);background:var(--s2);padding:1px 5px;border-radius:3px}
.exp-b{padding:5px 10px;font-size:9px;line-height:1.5}
.exp-rule{display:flex;gap:4px;padding:1px 0}
.exp-id{font-family:'IBM Plex Mono';font-size:7px;color:var(--or);background:#ff803010;padding:0 3px;border-radius:2px}
.exp-rn{color:var(--w);font-weight:600;font-size:9px}
.exp-rec{margin-top:3px;padding:3px 6px;border-radius:3px;font-size:9px;font-weight:700}
.exp-rec.hi{background:#ff4d5a12;color:var(--red)}.exp-rec.md{background:#ffb02012;color:var(--am)}.exp-rec.lo{background:#00e08e12;color:var(--gn)}
.tbtn{width:100%;padding:5px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--t2);font-size:10px;cursor:pointer;font-weight:600;transition:.15s;font-family:'IBM Plex Sans','Noto Sans SC'}.tbtn:hover{background:var(--s2);color:var(--w)}
.det{display:none;padding:0 12px 12px}.det.open{display:block}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.mb{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px;position:relative;overflow:hidden}
.mb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mb.c1::before{background:var(--gn)}.mb.c2::before{background:var(--bl)}.mb.c3::before{background:var(--pr)}.mb.c4::before{background:var(--am)}.mb.c5::before{background:var(--cy)}.mb.c6::before{background:var(--pk)}.mb.c7::before{background:var(--or)}
.mb-t{font-size:8px;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.mb-t.c1{color:var(--gn)}.mb-t.c2{color:var(--bl)}.mb-t.c3{color:var(--pr)}.mb-t.c4{color:var(--am)}.mb-t.c5{color:var(--cy)}.mb-t.c6{color:var(--pk)}.mb-t.c7{color:var(--or)}
.mb-r{display:flex;justify-content:space-between;font-size:8px;padding:1px 0}.mb-l{color:var(--t3)}.mb-v{font-family:'IBM Plex Mono';font-weight:600;color:var(--w);font-size:8px}
.chip{display:inline-block;background:var(--s2);border:1px solid var(--bd);padding:1px 4px;border-radius:2px;font-size:7px;font-family:'IBM Plex Mono';color:var(--t3);margin:1px}.chip.top{border-color:var(--gn);color:var(--gn)}
.sl{font-size:8px;color:var(--t3);font-weight:700;margin:6px 0 3px;padding-bottom:2px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.5px}
.ahg{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:5px}
.ahc{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:4px;text-align:center}
.ahc-l{font-size:6px;color:var(--t3);text-transform:uppercase}.ahc-v{font-family:'IBM Plex Mono';font-size:10px;font-weight:700;color:var(--w)}.ahc-v.hot{color:var(--gn)}
.ai-box{border:1px solid var(--am);border-radius:6px;overflow:hidden;margin-bottom:5px;background:linear-gradient(135deg,rgba(255,176,32,.04),rgba(255,80,48,.02))}
.ai-h{padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,176,32,.15)}
.ai-t{font-size:11px;font-weight:800;color:var(--am)}.ai-s{font-family:'IBM Plex Mono';font-size:14px;font-weight:700;color:var(--w);background:var(--s2);padding:1px 6px;border-radius:3px}
.ai-x{font-size:10px;color:var(--tx);line-height:1.4;padding:8px 10px}
.ai3{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:5px}
.ai3-c{padding:7px;background:var(--bg);border-right:1px solid var(--bd)}.ai3-c:last-child{border:none}
.ai3-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.ai3-t{font-size:8px;font-weight:700}.ai3-t.gpt{color:var(--gn)}.ai3-t.grk{color:var(--cy)}.ai3-t.gem{color:var(--bl)}
.ai3-s{font-family:'IBM Plex Mono';font-size:9px;font-weight:700;color:var(--w);background:var(--s2);padding:1px 3px;border-radius:2px}
.ai3-x{font-size:7px;color:var(--t3);line-height:1.3}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px}
.fb{background:var(--bg);border-radius:4px;padding:6px;border:1px solid var(--bd)}
.fb-t{font-size:8px;font-weight:700;color:var(--t2);margin-bottom:2px;text-transform:uppercase}
.fb-r{display:flex;justify-content:space-between;font-size:8px;padding:1px 0}
.fb-l{color:var(--t3)}.fb-v{font-family:'IBM Plex Mono';font-weight:600;color:var(--w);font-size:8px}
.foot{text-align:center;padding:14px;color:var(--t3);font-size:7px;border-top:1px solid var(--bd);margin-top:16px}
.empty{text-align:center;padding:40px;color:var(--t3)}
@media(max-width:640px){.dash{grid-template-columns:repeat(2,1fr)}.mg,.fg{grid-template-columns:1fr}.ai3{grid-template-columns:1fr}.ai3-c{border-right:none;border-bottom:1px solid var(--bd)}.t4g{grid-template-columns:1fr}.ahg{grid-template-columns:repeat(2,1fr)}.sr{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-w"><div class="hdr-l"><div class="hdr-logo"></div><div class="hdr-t">小鱼儿量化足球V4.22</div><div class="hdr-v" id="ver">vMAX</div></div><div class="live"><div class="live-d"></div><span class="m" id="ut">...</span></div></div></div>
<div class="wrap">
<div class="dash" id="db"></div>
<div class="sec"><div class="sec-t">精选推荐</div><div class="sec-b">前4精选</div></div>
<div class="t4g" id="t4"></div>
<div class="tabs"><button class="tab" onclick="sw('yesterday')">昨日</button><button class="tab ac" onclick="sw('today')">今日</button><button class="tab" onclick="sw('tomorrow')">明日</button></div>
<div id="ms"></div>
<div class="foot">零膨胀泊松 · 泊松 · 迪克森修正 · 蒙特卡洛 · ELO · 随机森林 · 梯度提升 · 神经网络 · SVM · KNN · 专业去水 · 冷热偏差 · CLV · Steam检测 · 自适应校准 · 智能过滤<br>GPT · Grok · Gemini · Claude · 58条经验规则 · 历史赔率 · 亚盘分析 · 量化边缘 | vMAX</div>
</div>
<script>
var D=null,CT='today';
function cl(t){return t?String(t).replace(/```json/g,'').replace(/```/g,'').trim():''}
function fm(f){if(!f)return'?';var o='';for(var i=0;i<f.length;i++){var c=f[i];if(c==='W')o+='<span style="color:var(--gn)">W</span>';else if(c==='D')o+='<span style="color:var(--am)">D</span>';else if(c==='L')o+='<span style="color:var(--red)">L</span>';else o+=c}return o}
function V(v){return v!=null&&v!=='?'?v:'?'}
function P(v){if(v==null)return'?';return(parseFloat(v)*100).toFixed(1)+'%'}
function cc(c){return c>=70?'color:var(--gn)':c>=50?'color:var(--am)':'color:var(--red)'}
function DS(p){var cs=p.claude_score||'';if(cs&&cs!=='-'&&cs!=='?')return cs;return p.predicted_score||'?'}fetch(‘data/predictions.json?t=’+Date.now()).then(function(r){return r.json()}).then(function(d){D=d;document.getElementById(‘ut’).textContent=d.update_time||’’;document.getElementById(‘ver’).textContent=d.version||‘vMAX’;rdb();rt4(d.top4||[]);rm()}).catch(function(e){document.getElementById(‘ms’).innerHTML=’<div class="empty">等待数据… ‘+e+’</div>’});
function sw(t){CT=t;document.querySelectorAll(’.tab’).forEach(function(b){b.classList.remove(‘ac’)});event.target.classList.add(‘ac’);rm()}
function rdb(){var ms=D.matches||{},tt=0,expC=0,cf=0,vb=0;[‘yesterday’,‘today’,‘tomorrow’].forEach(function(k){var a=ms[k]||[];tt+=a.length;a.forEach(function(m){var p=m.prediction||{};cf+=p.confidence||0;var ex=p.experience_analysis||{};if(ex.triggered_count>=2)expC++;if(p.value_bets&&p.value_bets.length)vb+=p.value_bets.length;if(p.value_kill_count)vb+=p.value_kill_count})});
var av=tt?Math.round(cf/tt):0;
document.getElementById(‘db’).innerHTML=’<div class="dc"><div class="dc-v" style="color:var(--am)">’+tt+’</div><div class="dc-l">赛事</div></div><div class="dc"><div class="dc-v" style="color:var(--gn)">’+(D.top4?D.top4.length:0)+’</div><div class="dc-l">精选</div></div><div class="dc"><div class="dc-v" style="color:var(--or)">’+expC+’</div><div class="dc-l">经验触发</div></div><div class="dc"><div class="dc-v" style="color:var(--pr)">’+av+’%</div><div class="dc-l">平均信心</div></div><div class="dc"><div class="dc-v" style="color:var(--gn)">’+vb+’</div><div class="dc-l">价值注</div></div>’}
function rt4(t4){var el=document.getElementById(‘t4’);if(!t4||!t4.length){el.innerHTML=’<div class="empty">暂无数据</div>’;return}
el.innerHTML=t4.map(function(m,i){var p=m.prediction||{};var ex=p.experience_analysis||{};var ps=p.predictability_score||0;
var ft=’’;if(ex.triggered_count>0)ft+=‘经验:’+ex.triggered_count;if(ps>0)ft+=’ 可预测:’+ps;
return’<div class="t4" onclick="go(\'m-'+m.id+'\')"><div class="t4-bar"></div><div class="t4-rank">#’+(i+1)+’</div><div class="t4-lg">’+(m.league||’’)+’ ‘+(m.match_num||’’)+’</div><div class="t4-teams"><span class="t4-tn">’+m.home_team+’</span><span class="t4-vs">VS</span><span class="t4-tn">’+m.away_team+’</span></div><div class="t4-grid"><div class="t4-c"><div class="t4-cl">比分</div><div class="t4-cv" style="color:var(--gn)">’+DS(p)+’</div></div><div class="t4-c"><div class="t4-cl">结果</div><div class="t4-cv">’+(p.result||’?’)+’</div></div><div class="t4-c"><div class="t4-cl">信心</div><div class="t4-cv" style="'+cc(p.confidence||0)+'">’+(p.confidence||0)+’%</div></div></div>’+(ft?’<div class="t4-ft">’+ft+’</div>’:’’)+’</div>’}).join(’’)}
function rm(){var el=document.getElementById(‘ms’),ms=(D.matches||{})[CT]||[];if(!ms.length){el.innerHTML=’<div class="empty">暂无比赛</div>’;return}
el.innerHTML=ms.map(function(m){var p=m.prediction||{};var hp=p.home_win_pct||33,dp=p.draw_pct||33,ap=p.away_win_pct||34;
var rc=p.result===‘主胜’?‘h’:p.result===‘平局’?‘d’:‘a’;
var poi=p.poisson||{},bvp=p.bivariate_poisson||{},elo=p.elo||{},rf=p.random_forest||{},gb=p.gradient_boost||{},nn=p.neural_net||{},dc=p.dixon_coles||{},mc=p.monte_carlo||{};
var hf=p.home_form||{},af=p.away_form||{},hs=m.home_stats||{},as2=m.away_stats||{};
var ts=p.top_scores||[],ex=p.experience_analysis||{},ahp=p.asian_handicap_probs||{},po=p.pro_odds||{};
var ixh=p.bookmaker_implied_home_xg,ixa=p.bookmaker_implied_away_xg;
var fw=p.fusion_weights||{},ps=p.predictability_score||0;
var displayScore=DS(p);
// AI MATRIX (moved before signals)
var ai=’<div class="ai-box"><div class="ai-h"><div class="ai-t">👑 CLAUDE</div><div class="ai-s">’+(p.claude_score||’-’)+’</div></div><div class="ai-x">’+cl(p.claude_analysis)+’</div></div><div class="ai3"><div class="ai3-c"><div class="ai3-h"><span class="ai3-t gpt">GPT</span><span class="ai3-s">’+(p.gpt_score||’-’)+’</span></div><div class="ai3-x">’+cl(p.gpt_analysis)+’</div></div><div class="ai3-c"><div class="ai3-h"><span class="ai3-t grk">GROK</span><span class="ai3-s">’+(p.grok_score||’-’)+’</span></div><div class="ai3-x">’+cl(p.grok_analysis)+’</div></div><div class="ai3-c"><div class="ai3-h"><span class="ai3-t gem">GEMINI</span><span class="ai3-s">’+(p.gemini_score||’-’)+’</span></div><div class="ai3-x">’+cl(p.gemini_analysis)+’</div></div></div>’;
// Signals
var sig=’’;var ss=p.smart_signals||[];
var ew=p.extreme_warning||’’;
if(ew&&ew!==‘无’&&ew!==’’)sig+=’<div class="sig sig-r">’+ew+’</div>’;
var seen={};
for(var si=0;si<ss.length;si++){var s=ss[si];if(seen[s])continue;seen[s]=1;
if(s.indexOf(‘🔥’)>=0||s.indexOf(‘CLV’)>=0)sig+=’<div class="sig sig-g">’+s+’</div>’;
else if(s.indexOf(‘💎’)>=0||s.indexOf(‘价值’)>=0)sig+=’<div class="sig sig-p">’+s+’</div>’;
else if(s.indexOf(‘📊’)>=0)sig+=’<div class="sig sig-b">’+s+’</div>’;
else if(s.indexOf(‘🚨’)>=0)sig+=’<div class="sig sig-r">’+s+’</div>’;
else sig+=’<div class="sig sig-a">’+s+’</div>’}
// Value bets
var vbH=’’;var vbs=p.value_bets||[];var vbs2=p.value_bets_summary||[];
if(vbs.length){vbH=’<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px">’;
for(var vi=0;vi<vbs.length;vi++){var v=vbs[vi];if(typeof v===‘object’)vbH+=’<span style="background:#b366ff10;color:var(--pr);font-size:8px;padding:2px 5px;border-radius:2px;border:1px solid #b366ff20">💎’+v.direction+’ EV+’+v.ev+’%</span>’;else vbH+=’<span style="background:#ffb02010;color:var(--am);font-size:8px;padding:2px 5px;border-radius:2px;border:1px solid #ffb02020">’+v+’</span>’}
vbH+=’</div>’}
else if(vbs2.length){vbH=’<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px">’;
for(var vi2=0;vi2<vbs2.length;vi2++)vbH+=’<span style="background:#ffb02010;color:var(--am);font-size:8px;padding:2px 5px;border-radius:2px;border:1px solid #ffb02020">💰’+vbs2[vi2]+’</span>’;
vbH+=’</div>’}
// Experience
var expH=’’;
if(ex.triggered_count>0){var rc2=ex.total_score>=20?‘hi’:ex.total_score>=10?‘md’:‘lo’;
expH=’<div class="exp"><div class="exp-h"><div class="exp-t">📋 经验引擎</div><div class="exp-s">’+ex.triggered_count+’/’+ex.total_score+’</div></div><div class="exp-b">’;
var rules=ex.rules||[];for(var ri=0;ri<rules.length;ri++){var r=rules[ri];expH+=’<div class="exp-rule"><span class="exp-id">’+r.id+’</span><span class="exp-rn">’+r.name+’</span></div>’}
expH+=’<div class="exp-rec '+rc2+'">’+(ex.recommendation||’’)+’</div></div></div>’}
// ===== DETAIL: Models =====
var mdl=’<div class="sl">模型矩阵</div><div class="mg">’;
mdl+=’<div class="mb c1"><div class="mb-t c1">泊松分布</div><div class="mb-r"><span class="mb-l">比分</span><span class="mb-v">’+V(poi.predicted_score)+’</span></div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(poi.home_win)+’/’+V(poi.draw)+’/’+V(poi.away_win)+’</span></div><div class="mb-r"><span class="mb-l">期望进球</span><span class="mb-v">’+V(poi.home_xg)+’-’+V(poi.away_xg)+’</span></div>’;
if(ts.length){mdl+=’<div style="margin-top:2px">’;for(var ti=0;ti<Math.min(ts.length,5);ti++){mdl+=’<span class="chip'+(ti<1?' top':'')+'">’+ts[ti].score+’ ‘+ts[ti].prob+’%</span>’}mdl+=’</div>’}
mdl+=’</div>’;
mdl+=’<div class="mb c6"><div class="mb-t c6">零膨胀双变量泊松</div><div class="mb-r"><span class="mb-l">比分</span><span class="mb-v">’+V(bvp.predicted_score)+’</span></div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(bvp.home_win)+’/’+V(bvp.draw)+’/’+V(bvp.away_win)+’</span></div><div class="mb-r"><span class="mb-l">ρ/p0</span><span class="mb-v">’+V(bvp.correlation)+’/’+V(bvp.p0_inflate)+’</span></div></div>’;
mdl+=’<div class="mb c5"><div class="mb-t c5">蒙特卡洛模拟</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(mc.home_win)+’/’+V(mc.draw)+’/’+V(mc.away_win)+’</span></div><div class="mb-r"><span class="mb-l">场均进球</span><span class="mb-v">’+V(mc.avg_goals)+’</span></div></div>’;
mdl+=’<div class="mb c2"><div class="mb-t c2">ELO评分</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(elo.home_win)+’/’+V(elo.draw)+’/’+V(elo.away_win)+’</span></div><div class="mb-r"><span class="mb-l">Δ</span><span class="mb-v" style="'+(parseFloat(elo.elo_diff||0)>0?'color:var(--gn)':'color:var(--red)')+'">’+(elo.elo_diff>0?’+’:’’)+V(elo.elo_diff)+’</span></div></div>’;
if(po.true_home){mdl+=’<div class="mb c7"><div class="mb-t c7">专业去水</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+po.true_home+’/’+po.true_draw+’/’+po.true_away+’</span></div></div>’}
else{mdl+=’<div class="mb c7"><div class="mb-t c7">随机森林</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(rf.home_win)+’/’+V(rf.draw)+’/’+V(rf.away_win)+’</span></div></div>’}
mdl+=’<div class="mb c3"><div class="mb-t c3">神经网络</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(nn.home_win)+’/’+V(nn.draw)+’/’+V(nn.away_win)+’</span></div></div>’;
mdl+=’<div class="mb c4"><div class="mb-t c4">梯度提升</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(gb.home_win)+’/’+V(gb.draw)+’/’+V(gb.away_win)+’</span></div></div>’;
mdl+=’<div class="mb c1"><div class="mb-t c1">迪克森修正</div><div class="mb-r"><span class="mb-l">胜/平/负</span><span class="mb-v">’+V(dc.home_win)+’/’+V(dc.draw)+’/’+V(dc.away_win)+’</span></div></div>’;
mdl+=’</div>’;
// Implied xG
var ixgH=’’;
if(ixh&&ixh!==’?’){ixgH=’<div class="sl">庄家隐含期望进球</div><div class="ahg"><div class="ahc"><div class="ahc-l">主队xG</div><div class="ahc-v" style="color:var(--am)">’+ixh+’</div></div><div class="ahc"><div class="ahc-l">客队xG</div><div class="ahc-v" style="color:var(--cy)">’+ixa+’</div></div><div class="ahc"><div class="ahc-l">总进球</div><div class="ahc-v" style="color:var(--gn)">’+(p.expected_total_goals?parseFloat(p.expected_total_goals).toFixed(2):’?’)+’</div></div></div>’}
// Asian Handicap
var ahH=’’;
if(ahp[‘ah_0’]||ahp[‘ou_2.5’]){
var ah0=ahp[‘ah_0’]||[0,0,0];var ah05=ahp[‘ah_0.5’]||[0,0,0];var ou25=ahp[‘ou_2.5’]||[0,0,0];var bt=ahp.btts||0;
ahH=’<div class="sl">亚盘 & 大小球</div><div class="ahg">’;
ahH+=’<div class="ahc"><div class="ahc-l">让0主</div><div class="ahc-v">’+P(ah0[0])+’</div></div>’;
ahH+=’<div class="ahc"><div class="ahc-l">让0走</div><div class="ahc-v">’+P(ah0[1])+’</div></div>’;
ahH+=’<div class="ahc"><div class="ahc-l">让0客</div><div class="ahc-v">’+P(ah0[2])+’</div></div>’;
ahH+=’<div class="ahc"><div class="ahc-l">让半主</div><div class="ahc-v'+(ah05[0]>0.55?' hot':'')+'">’+P(ah05[0])+’</div></div>’;
ahH+=’<div class="ahc"><div class="ahc-l">大2.5</div><div class="ahc-v'+(ou25[0]>0.55?' hot':'')+'">’+P(ou25[0])+’</div></div>’;
ahH+=’<div class="ahc"><div class="ahc-l">双方进球</div><div class="ahc-v'+(bt>0.55?' hot':'')+'">’+P(bt)+’</div></div>’;
ahH+=’</div>’}
// Form
var frm=’<div class="sl">近期状态</div><div class="fg"><div class="fb"><div class="fb-t">’+m.home_team+’</div><div class="fb-r"><span class="fb-l">走势</span><span class="fb-v">’+V(hf.trend)+’</span></div><div class="fb-r"><span class="fb-l">评分</span><span class="fb-v">’+V(hf.score)+’</span></div><div class="fb-r"><span class="fb-l">状态</span><span class="fb-v">’+fm(hs.form)+’</span></div><div class="fb-r"><span class="fb-l">胜/平/负</span><span class="fb-v">’+V(hs.wins)+‘胜’+V(hs.draws)+‘平’+V(hs.losses)+‘负</span></div></div><div class="fb"><div class="fb-t">’+m.away_team+’</div><div class="fb-r"><span class="fb-l">走势</span><span class="fb-v">’+V(af.trend)+’</span></div><div class="fb-r"><span class="fb-l">评分</span><span class="fb-v">’+V(af.score)+’</span></div><div class="fb-r"><span class="fb-l">状态</span><span class="fb-v">’+fm(as2.form)+’</span></div><div class="fb-r"><span class="fb-l">胜/平/负</span><span class="fb-v">’+V(as2.wins)+‘胜’+V(as2.draws)+‘平’+V(as2.losses)+‘负</span></div></div></div>’;
// Meta
var meta=’<div style="text-align:center;margin-top:5px;font-size:8px;color:var(--t3)">’+(p.model_agreement?‘✅共识’:‘⚠️分歧’)+’ | ‘+V(p.model_consensus)+’/’+V(p.total_models)+’ | 可预测:’+ps+’ | 权重:’+V(fw.market)+’/’+V(fw.model)+’ | 引擎:’+V(p.predicted_score)+’</div>’;
// ===== LAYOUT: score → stats → prob → AI → signals → value → exp → expand → detail =====
return’<div class="mc '+(m.is_recommended?'rec':'')+'" id="m-'+m.id+'"><div class="mc-h"><div class="mc-lg">’+(m.league||’’)+’ <span class="m">’+(m.match_num||’’)+’</span>’+(m.is_recommended?’<span class="mc-badge">精选</span>’:’’)+’</div></div><div class="mc-b"><div class="teams"><div class="tm"><div class="tm-n">’+m.home_team+’</div></div><div class="sc-c"><div class="sc-big">’+displayScore+’</div><div class="sc-sub">引擎: ‘+(p.predicted_score||’?’)+’</div><span class="res-tag '+rc+'">’+(p.result||’?’)+’</span></div><div class="tm"><div class="tm-n">’+m.away_team+’</div></div></div><div class="sr"><div class="sb"><div class="sb-l">总进球</div><div class="sb-v" style="color:var(--gn)">’+(p.expected_total_goals?parseFloat(p.expected_total_goals).toFixed(1):’?’)+’</div></div><div class="sb"><div class="sb-l">大2.5</div><div class="sb-v" style="color:var(--pr)">’+V(p.over_2_5)+’%</div></div><div class="sb"><div class="sb-l">双方进球</div><div class="sb-v" style="color:var(--cy)">’+V(p.btts)+’%</div></div><div class="sb"><div class="sb-l">信心</div><div class="sb-v" style="'+cc(p.confidence||0)+'">’+(p.confidence||0)+’%</div></div></div><div class="prob"><div class="prob-h"><span style="color:var(--red)">主 ‘+hp+’%</span><span style="color:var(--t2)">平 ‘+dp+’%</span><span style="color:var(--bl)">客 ‘+ap+’%</span></div><div class="prob-bar"><div class="h" style="width:'+hp+'%"></div><div class="d" style="width:'+dp+'%"></div><div class="a" style="width:'+ap+'%"></div></div></div>’+ai+sig+vbH+expH+’<button class="tbtn" onclick="tg(this,\'d-'+m.id+'\')">展开详情 ▼</button></div><div class="det" id="d-'+m.id+'">’+mdl+ixgH+ahH+frm+meta+’</div></div>’}).join(’’)}
function tg(b,id){var e=document.getElementById(id);if(e.classList.contains(‘open’)){e.classList.remove(‘open’);b.textContent=‘展开详情 ▼’}else{e.classList.add(‘open’);b.textContent=‘收起 ▲’}}
function go(id){var e=document.getElementById(id);if(e){e.scrollIntoView({behavior:‘smooth’,block:‘center’});var d=document.getElementById(‘d-’+id.replace(‘m-’,’’));if(d&&!d.classList.contains(‘open’))d.classList.add(‘open’)}}
</script>
</body>
</html>
