<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小鱼儿量化足球 vMAX 18.4.6</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090e;--s1:#0e1118;--s2:#141822;--s3:#1a2030;--bd:#1e2536;--bd2:#2a3447;
  --tx:#b8c4d6;--t2:#6b7a90;--t3:#3d4a5e;--w:#eaf0f8;
  --red:#ff4d5a;--gn:#00e08e;--bl:#4d8aff;--am:#ffb020;--pr:#b366ff;--cy:#00d4e0;--pk:#ff5ca0;--or:#ff8030;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;font-size:13px}
.m{font-family:'IBM Plex Mono',monospace}

.hdr{position:sticky;top:0;z-index:99;background:rgba(8,9,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);height:46px;display:flex;align-items:center;padding:0 16px}
.hdr-w{max-width:1280px;margin:0 auto;width:100%;display:flex;justify-content:space-between;align-items:center}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-logo{width:6px;height:22px;background:linear-gradient(180deg,var(--gn),var(--bl));border-radius:1px}
.hdr-t{font-family:'IBM Plex Sans';font-size:14px;font-weight:800;color:var(--w);letter-spacing:1px}
.hdr-v{font-size:9px;color:var(--gn);background:#00e08e15;padding:2px 6px;border-radius:3px;font-family:'IBM Plex Mono';border:1px solid #00e08e30;font-weight:700}
.live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
.live-d{width:5px;height:5px;border-radius:50%;background:var(--gn);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}

.wrap{max-width:1280px;margin:0 auto;padding:10px 12px}

.dash{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px}
.dc{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gn)}
.dc.t::before{background:var(--am)}.dc.r::before{background:var(--red)}.dc.b::before{background:var(--bl)}.dc.p::before{background:var(--pr)}.dc.c::before{background:var(--cy)}
.dc-v{font-family:'IBM Plex Mono';font-size:20px;font-weight:700;line-height:1}
.dc-l{font-size:8px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

.sec{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sec-t{font-size:13px;font-weight:800;color:var(--w)}
.sec-b{background:var(--am);color:#000;font-size:7px;font-weight:800;padding:2px 5px;border-radius:2px}
.sec-i{font-size:9px;color:var(--t2);margin-left:auto}

.today-pill{display:flex;align-items:center;gap:6px;justify-content:center;margin:0 auto 14px;background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;max-width:360px}
.today-pill strong{color:var(--gn);font-size:11px}
.today-pill span{font-size:9px;color:var(--t2)}

.t4g{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:5px;margin-bottom:14px}
.t4{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px;position:relative;cursor:pointer;transition:.15s;overflow:hidden}
.t4:hover{border-color:var(--am);transform:translateY(-1px)}
.t4-bar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--am),var(--red))}
.t4-rank{position:absolute;top:8px;right:8px;font-family:'IBM Plex Mono';font-size:18px;font-weight:700;color:var(--am);opacity:.3}
.t4-lg{font-size:9px;color:var(--am);font-weight:700;margin-bottom:4px}
.t4-teams{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.t4-tn{font-size:12px;font-weight:700;color:var(--w);flex:1}
.t4-tn:last-child{text-align:right}
.t4-vs{font-size:8px;color:var(--t3);font-weight:800}
.t4-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.t4-c{text-align:center;background:var(--bg);border-radius:3px;padding:4px}
.t4-cl{font-size:7px;color:var(--t3)}
.t4-cv{font-family:'IBM Plex Mono';font-size:11px;font-weight:700;color:var(--w)}
.t4-ft{font-size:9px;color:var(--or);margin-top:6px;font-weight:600;display:flex;flex-wrap:wrap;gap:3px}
.t4-ftag{padding:1px 4px;border-radius:2px;font-size:8px}

.mc{background:var(--s1);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:7px}
.mc.rec{border-color:var(--am);box-shadow:0 0 0 1px #ffb02020}
.mc.s{border-color:var(--gn);box-shadow:0 0 0 1px #00e08e18}
.mc.a{border-color:var(--am)}
.mc-h{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--bg);border-bottom:1px solid var(--bd);gap:6px;flex-wrap:wrap}
.mc-lg{font-size:10px;color:var(--bl);font-weight:700}
.mc-badge{background:var(--am);color:#000;font-size:7px;font-weight:800;padding:1px 4px;border-radius:2px;margin-left:4px}
.mc-eng{font-size:8px;color:var(--gn);background:#00e08e10;padding:2px 5px;border-radius:2px;font-family:'IBM Plex Mono';border:1px solid #00e08e25}
.mc-b{padding:12px}

.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tm{width:35%;text-align:center}
.tm-n{font-size:13px;font-weight:700;color:var(--w)}
.sc-c{text-align:center}
.sc-big{font-family:'IBM Plex Mono';font-size:28px;font-weight:700;color:var(--gn);line-height:1}
.sc-sub{font-family:'IBM Plex Mono';font-size:9px;color:var(--t3);margin-top:2px}
.res-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:2px;font-weight:700;margin-top:3px}
.res-tag.h{background:#ff4d5a18;color:var(--red)}
.res-tag.d{background:#ffb02018;color:var(--am)}
.res-tag.a{background:#4d8aff18;color:var(--bl)}

.sr{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px}
.sb{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px;text-align:center}
.sb-l{font-size:7px;color:var(--t3);text-transform:uppercase}
.sb-v{font-family:'IBM Plex Mono';font-size:12px;font-weight:700}

.prob{margin-bottom:8px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px 10px}
.prob-h{display:flex;justify-content:space-between;font-size:9px;font-weight:700;margin-bottom:3px}
.prob-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;background:var(--s2)}
.prob-bar .h{background:var(--red)}.prob-bar .d{background:#64748b}.prob-bar .a{background:var(--bl)}

.block{margin-bottom:10px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#0e1118,#0a0d14);border:1px solid var(--bd2)}
.block-h{padding:6px 10px;background:linear-gradient(90deg,#00e08e15,#4d8aff10);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.block-t{font-size:10px;font-weight:800;color:var(--gn);letter-spacing:.5px}
.block-meta{font-family:'IBM Plex Mono';font-size:9px;color:var(--t2)}
.block-b{padding:8px 10px}

.sel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px}
.sel{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px;text-align:center}
.sel-l{font-size:7px;color:var(--t3);text-transform:uppercase}
.sel-v{font-family:'IBM Plex Mono';font-size:12px;font-weight:800;margin-top:2px}
.tier-S{color:var(--gn)}.tier-A{color:var(--am)}.tier-B{color:var(--bl)}.tier-C{color:var(--cy)}.tier-D{color:var(--red)}

.sl{font-size:8px;color:var(--t3);font-weight:700;margin:6px 0 3px;padding-bottom:2px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.5px}

.review-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:4px;margin-bottom:6px}
.review{background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:6px 8px}
.review-top{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.review-id{font-family:'IBM Plex Mono';font-size:8px;font-weight:800;padding:1px 4px;border-radius:2px;background:var(--bg);color:var(--or)}
.review-decision{font-size:8px;font-weight:800;padding:1px 4px;border-radius:2px}
.review-decision.accepted{background:#00e08e18;color:var(--gn)}
.review-decision.rejected{background:#ff4d5a18;color:var(--red)}
.review-decision.neutral{background:#ffb02018;color:var(--am)}
.review-d{font-size:9px;color:var(--tx);line-height:1.45}

.warn{padding:5px 8px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:4px;background:#ff4d5a0a;border:1px solid #ff4d5a20;color:var(--red)}
.sig{padding:5px 8px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.sig-r{background:#ff4d5a0a;border:1px solid #ff4d5a20;color:var(--red)}
.sig-a{background:#ffb0200a;border:1px solid #ffb02020;color:var(--am)}
.sig-g{background:#00e08e0a;border:1px solid #00e08e20;color:var(--gn)}
.sig-b{background:#4d8aff0a;border:1px solid #4d8aff20;color:var(--bl)}
.sig-p{background:#b366ff0a;border:1px solid #b366ff20;color:var(--pr)}

.ai-box{border:1px solid var(--am);border-radius:6px;overflow:hidden;margin-bottom:5px;background:linear-gradient(135deg,rgba(255,176,32,.04),rgba(255,80,48,.02))}
.ai-h{padding:6px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,176,32,.15)}
.ai-t{font-size:11px;font-weight:800;color:var(--am)}
.ai-s{font-family:'IBM Plex Mono';font-size:14px;font-weight:700;color:var(--w);background:var(--s2);padding:1px 6px;border-radius:3px}
.ai-x{font-size:11px;color:var(--tx);line-height:1.6;padding:10px;letter-spacing:0.3px;white-space:pre-wrap;word-break:break-word}

.ai3{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:5px}
.ai3-c{padding:7px;background:var(--bg);border-right:1px solid var(--bd)}
.ai3-c:last-child{border:none}
.ai3-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ai3-t{font-size:9px;font-weight:800}
.ai3-t.gpt{color:var(--gn)}.ai3-t.grk{color:var(--cy)}.ai3-t.gem{color:var(--bl)}
.ai3-s{font-family:'IBM Plex Mono';font-size:10px;font-weight:700;color:var(--w);background:var(--s2);padding:2px 4px;border-radius:2px}
.ai3-x{font-size:8px;color:var(--t2);line-height:1.4;white-space:pre-wrap;word-break:break-word}

.tbtn{width:100%;padding:5px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--t2);font-size:10px;cursor:pointer;font-weight:600;transition:.15s;font-family:'IBM Plex Sans','Noto Sans SC'}
.tbtn:hover{background:var(--s2);color:var(--w)}
.det{display:none;padding:0 12px 12px}
.det.open{display:block}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.mb{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:6px;position:relative;overflow:hidden}
.mb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gn)}
.mb-t{font-size:8px;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;color:var(--gn)}
.mb-r{display:flex;justify-content:space-between;font-size:8px;padding:1px 0;gap:8px}
.mb-l{color:var(--t3)}
.mb-v{font-family:'IBM Plex Mono';font-weight:600;color:var(--w);font-size:8px;text-align:right}
.chip{display:inline-block;background:var(--s2);border:1px solid var(--bd);padding:1px 4px;border-radius:2px;font-size:7px;font-family:'IBM Plex Mono';color:var(--t2);margin:1px}
.chip.top{border-color:var(--gn);color:var(--gn)}

.foot{text-align:center;padding:14px;color:var(--t3);font-size:7px;border-top:1px solid var(--bd);margin-top:16px;line-height:1.6}
.empty{text-align:center;padding:40px;color:var(--t3)}

@media(max-width:760px){
  .dash{grid-template-columns:repeat(3,1fr)}
  .sr{grid-template-columns:repeat(3,1fr)}
  .sel-grid{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:1fr}
  .ai3{grid-template-columns:1fr}
  .ai3-c{border-right:none;border-bottom:1px solid var(--bd)}
  .t4g{grid-template-columns:1fr}
}
@media(max-width:480px){
  .dash{grid-template-columns:repeat(2,1fr)}
  .sr{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-w">
    <div class="hdr-l">
      <div class="hdr-logo"></div>
      <div class="hdr-t">小鱼儿量化足球 vMAX</div>
      <div class="hdr-v" id="ver">v18.4.6</div>
    </div>
    <div class="live"><div class="live-d"></div><span class="m" id="ut">…</span></div>
  </div>
</div>

<div class="wrap">
  <div class="dash" id="db"></div>

  <div class="sec">
    <div class="sec-t">今日精选推荐</div>
    <div class="sec-b">AI小批次终审</div>
    <div class="sec-i" id="t4ic"></div>
  </div>
  <div class="t4g" id="t4"></div>

  <div class="today-pill">
    <strong>今日竞彩业务日</strong>
    <span id="scopeInfo">今天</span>
  </div>

  <div id="ms"></div>

  <div class="foot">
    vMAX 18.4.6 · PURE RAW-AI · GPT/Grok/Gemini 初审 · Claude 压缩终审 · 经验审计卡 Prompt Only<br>
    方向分层 · 比分形态分层 · goal_band · BTTS · Sharp/Steam 审计 · 体彩赔率 + 欧赔联网核验<br>
    前端当前仅展示 today，避免 yesterday/tomorrow 重复触发与重复扣费
  </div>
</div>

<script>
var D=null;

function esc(s){
  if(s===null||s===undefined)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function V(v, fallback='?'){
  return (v!==null&&v!==undefined&&v!==''&&v!=='None') ? v : fallback;
}

function num(v, d=0){
  var n=parseFloat(v);
  return isFinite(n)?n:d;
}

function fmt1(v){
  var n=num(v, NaN);
  return isFinite(n)?n.toFixed(1):'?';
}

function validScore(s){
  if(!s)return false;
  s=String(s).trim();
  return !(s===''||s==='-'||s==='?'||s==='弃权'||s==='N/A'||s==='None');
}

function cl(t){
  if(!t)return '弃权或暂无解析';
  return esc(String(t).replace(/```json/g,'').replace(/```/g,'').trim());
}

function resultClass(r){
  return r==='主胜'?'h':r==='平局'?'d':'a';
}

function confidenceColor(c){
  c=num(c,0);
  return c>=70?'color:var(--gn)':c>=55?'color:var(--am)':'color:var(--red)';
}

function tierClass(t){
  t=String(t||'D').toUpperCase();
  if(['S','A','B','C','D'].indexOf(t)<0)t='D';
  return 'tier-'+t;
}

function matchKey(m){
  var key = m.id || m.match_id || m.match_num || ((m.league||'')+'|'+(m.home_team||m.home||'')+'|'+(m.away_team||m.guest||''));
  return String(key).replace(/[^\w\u4e00-\u9fa5-]/g,'_');
}

function getTodayMatches(d){
  if(!d)return [];
  if(d.matches && Array.isArray(d.matches.today))return d.matches.today;
  if(Array.isArray(d.today))return d.today;
  if(Array.isArray(d.matches))return d.matches;
  return [];
}

function DS(p){
  if(validScore(p.claude_score))return p.claude_score;
  if(validScore(p.predicted_score))return p.predicted_score;
  if(validScore(p.predicted_label))return p.predicted_label;
  return '?';
}

function getBttsLabel(p){
  var v = p.btts_ai || p.ai_btts || p.btts_label || p.btts_decision;
  if(v!==undefined && v!==null && String(v).trim()!=='')return String(v);
  if(typeof p.btts === 'string' && isNaN(parseFloat(p.btts)))return p.btts;
  return p.btts!==undefined ? String(p.btts) : '?';
}

function getProb(p){
  var hp=num(p.home_win_pct, 33);
  var dp=num(p.draw_pct, 33);
  var ap=num(p.away_win_pct, 34);
  var s=hp+dp+ap;
  if(s<=0){hp=33;dp=33;ap=34;s=100;}
  if(Math.abs(s-100)>2){
    hp=hp/s*100;dp=dp/s*100;ap=100-hp-dp;
  }
  return {h:Math.max(0,hp),d:Math.max(0,dp),a:Math.max(0,ap)};
}

function getWarnings(p){
  var arr=[];
  ['score_shape_warnings','selection_warnings','validation_warnings','postprocess_warnings'].forEach(function(k){
    if(Array.isArray(p[k]))arr=arr.concat(p[k]);
    else if(p[k])arr.push(p[k]);
  });
  if(p.experience_review_missing)arr.push('experience_review_missing');
  return arr;
}

function getExperienceReview(p){
  var r=p.experience_review || (p.ai_audit && p.ai_audit.experience_review) || [];
  if(Array.isArray(r))return r;
  if(typeof r==='string'){
    try{
      var parsed=JSON.parse(r);
      if(Array.isArray(parsed))return parsed;
    }catch(e){}
    return [{id:'TEXT',decision:'neutral',reason:r}];
  }
  return [];
}

function getCards(p){
  var cards=p.experience_audit_cards || p.experience_cards || p.audit_cards || [];
  if(Array.isArray(cards))return cards;
  return [];
}

function aiOk(p){
  return validScore(p.gpt_score)||validScore(p.grok_score)||validScore(p.gemini_score)||validScore(p.claude_score);
}

fetch('data/predictions.json?t='+Date.now())
  .then(function(r){
    if(!r.ok)throw new Error('网络请求失败 HTTP '+r.status);
    return r.json();
  })
  .then(function(d){
    D=d;
    document.getElementById('ut').textContent=d.update_time||'数据已最新';
    document.getElementById('ver').textContent=d.version||'v18.4.6';
    var rt=d.runtime||{};
    document.getElementById('scopeInfo').textContent='业务日偏移 '+V(rt.date_shift_hours,'11')+'h · batch='+V(rt.ai_batch_size,'4')+' · model_concurrency='+V(rt.ai_model_concurrency,'1');
    renderDashboard();
    renderTop4(d.top4||[]);
    renderMatches();
  })
  .catch(function(e){
    console.error('加载失败:',e);
    document.getElementById('ms').innerHTML='<div class="empty">等待数据同步或解析失败<br><span style="font-size:10px;opacity:.5">'+esc(e.message)+'</span></div>';
  });

function renderDashboard(){
  var ms=getTodayMatches(D);
  var total=ms.length;
  var cf=0, ds=0, ss=0, aiCount=0, sTier=0, abTier=0;

  ms.forEach(function(m){
    var p=m.prediction||{};
    cf+=num(p.confidence,0);
    ds+=num(p.direction_selection_score,0);
    ss+=num(p.score_shape_score,0);
    if(aiOk(p))aiCount++;
    var tier=String(p.recommendation_tier||p.direction_tier||'').toUpperCase();
    if(tier==='S')sTier++;
    if(tier==='A'||tier==='B')abTier++;
  });

  var avgCf=total?Math.round(cf/total):0;
  var avgDs=total?Math.round(ds/total):0;
  var avgSs=total?Math.round(ss/total):0;

  document.getElementById('db').innerHTML=
    '<div class="dc"><div class="dc-v" style="color:var(--am)">'+total+'</div><div class="dc-l">今日赛事</div></div>'+
    '<div class="dc t"><div class="dc-v" style="color:var(--gn)">'+(D.top4?D.top4.length:0)+'</div><div class="dc-l">精选</div></div>'+
    '<div class="dc r"><div class="dc-v" style="color:var(--gn)">'+sTier+'</div><div class="dc-l">S级</div></div>'+
    '<div class="dc p"><div class="dc-v" style="color:var(--am)">'+abTier+'</div><div class="dc-l">A/B级</div></div>'+
    '<div class="dc c"><div class="dc-v" style="color:var(--cy)">'+avgDs+'</div><div class="dc-l">方向分</div></div>'+
    '<div class="dc b"><div class="dc-v" style="color:var(--bl)">'+avgSs+'</div><div class="dc-l">比分形态</div></div>';
}

function renderTop4(t4){
  var el=document.getElementById('t4');
  if(!t4||!t4.length){
    el.innerHTML='<div class="empty">暂无今日精选推荐</div>';
    document.getElementById('t4ic').textContent='';
    return;
  }

  document.getElementById('t4ic').textContent=t4.length+'场';

  el.innerHTML=t4.map(function(m,i){
    var p=m.prediction||{};
    var key=matchKey(m);
    var tier=String(p.recommendation_tier||p.direction_tier||'D').toUpperCase();
    var ft='';

    if(tier)ft+='<span class="t4-ftag" style="background:#00e08e15;color:var(--gn)">评级 '+tier+'</span>';
    if(p.direction_selection_score!==undefined)ft+='<span class="t4-ftag" style="background:#4d8aff15;color:var(--bl)">方向 '+fmt1(p.direction_selection_score)+'</span>';
    if(p.score_shape_score!==undefined)ft+='<span class="t4-ftag" style="background:#b366ff15;color:var(--pr)">比分 '+fmt1(p.score_shape_score)+'</span>';
    if(p.sharp_detected||p.sharp_money_direction)ft+='<span class="t4-ftag" style="background:#00d4e015;color:var(--cy)">Sharp</span>';
    if(getWarnings(p).length)ft+='<span class="t4-ftag" style="background:#ff4d5a15;color:var(--red)">警告 '+getWarnings(p).length+'</span>';

    return '<div class="t4" onclick="go(\'m-'+key+'\')">'+
      '<div class="t4-bar"></div>'+
      '<div class="t4-rank">#'+(i+1)+'</div>'+
      '<div class="t4-lg">'+esc(m.league||'')+' '+esc(m.match_num||'')+'</div>'+
      '<div class="t4-teams"><span class="t4-tn">'+esc(m.home_team||m.home||'')+'</span><span class="t4-vs">VS</span><span class="t4-tn">'+esc(m.away_team||m.guest||'')+'</span></div>'+
      '<div class="t4-grid">'+
        '<div class="t4-c"><div class="t4-cl">比分</div><div class="t4-cv" style="color:var(--gn)">'+esc(DS(p))+'</div></div>'+
        '<div class="t4-c"><div class="t4-cl">结果</div><div class="t4-cv">'+esc(p.result||'?')+'</div></div>'+
        '<div class="t4-c"><div class="t4-cl">推荐层</div><div class="t4-cv '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
      '</div>'+
      (ft?'<div class="t4-ft">'+ft+'</div>':'')+
    '</div>';
  }).join('');
}

function renderSelectionBlock(p){
  var tier=String(p.recommendation_tier||'D').toUpperCase();
  var dt=String(p.direction_tier||'D').toUpperCase();
  var st=String(p.score_tier||'D').toUpperCase();
  var warnings=getWarnings(p);
  var review=getExperienceReview(p);
  var cards=getCards(p);

  var warnHtml='';
  if(warnings.length){
    warnHtml='<div class="sl">⚠️ 结构冲突 / 降级原因</div>'+
      warnings.slice(0,8).map(function(w){return '<div class="warn">'+esc(w)+'</div>';}).join('');
  }

  var reviewHtml='';
  if(review.length){
    reviewHtml='<div class="sl">📋 经验审计卡回应</div><div class="review-list">'+
      review.slice(0,12).map(function(r){
        var id=r.id||r.rule_id||r.card_id||'EXP';
        var dec=String(r.decision||r.status||'neutral').toLowerCase();
        if(['accepted','rejected','neutral'].indexOf(dec)<0)dec='neutral';
        return '<div class="review">'+
          '<div class="review-top"><span class="review-id">'+esc(id)+'</span><span class="review-decision '+dec+'">'+esc(dec)+'</span></div>'+
          '<div class="review-d">'+esc(r.reason||r.note||r.name||'')+'</div>'+
        '</div>';
      }).join('')+
    '</div>';
  }else if(cards.length){
    reviewHtml='<div class="sl">📋 触发经验审计卡</div><div class="review-list">'+
      cards.slice(0,12).map(function(c){
        return '<div class="review"><div class="review-top"><span class="review-id">'+esc(c.id||c.rule_id||'EXP')+'</span><span class="review-decision neutral">pending</span></div><div class="review-d">'+esc(c.name||c.reason||c.question||'等待AI回应')+'</div></div>';
      }).join('')+
    '</div>';
  }

  return '<div class="block">'+
    '<div class="block-h">'+
      '<div class="block-t">🎯 PURE RAW-AI 推荐分层</div>'+
      '<div class="block-meta">不改比分，只做推荐分层</div>'+
    '</div>'+
    '<div class="block-b">'+
      '<div class="sel-grid">'+
        '<div class="sel"><div class="sel-l">综合推荐</div><div class="sel-v '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
        '<div class="sel"><div class="sel-l">综合分</div><div class="sel-v '+tierClass(tier)+'">'+fmt1(p.overall_selection_score)+'</div></div>'+
        '<div class="sel"><div class="sel-l">方向层</div><div class="sel-v '+tierClass(dt)+'">'+esc(dt)+' / '+fmt1(p.direction_selection_score)+'</div></div>'+
        '<div class="sel"><div class="sel-l">比分层</div><div class="sel-v '+tierClass(st)+'">'+esc(st)+' / '+fmt1(p.score_shape_score)+'</div></div>'+
        '<div class="sel"><div class="sel-l">形态</div><div class="sel-v">'+esc(V(p.goal_band,'?'))+' · '+esc(getBttsLabel(p))+'</div></div>'+
      '</div>'+
      (p.score_shape_reason?'<div class="sig sig-b">比分形态：'+esc(p.score_shape_reason)+'</div>':'')+
      (p.sharp_money_direction?'<div class="sig sig-g">Sharp方向：'+esc(p.sharp_money_direction)+' '+esc(p.sharp_evidence||'')+'</div>':'')+
      warnHtml+
      reviewHtml+
    '</div>'+
  '</div>';
}

function renderAiBlock(p){
  return '<div class="ai-box">'+
    '<div class="ai-h"><div class="ai-t">👑 CLAUDE 终审</div><div class="ai-s">'+esc(p.claude_score||'弃权')+'</div></div>'+
    '<div class="ai-x">'+cl(p.claude_analysis||p.final_audit_reason||p.reason)+'</div>'+
  '</div>'+
  '<div class="ai3">'+
    '<div class="ai3-c"><div class="ai3-h"><span class="ai3-t gpt">GPT初审</span><span class="ai3-s">'+esc(p.gpt_score||'弃权')+'</span></div><div class="ai3-x">'+cl(p.gpt_analysis)+'</div></div>'+
    '<div class="ai3-c"><div class="ai3-h"><span class="ai3-t grk">GROK初审</span><span class="ai3-s">'+esc(p.grok_score||'弃权')+'</span></div><div class="ai3-x">'+cl(p.grok_analysis)+'</div></div>'+
    '<div class="ai3-c"><div class="ai3-h"><span class="ai3-t gem">GEMINI初审</span><span class="ai3-s">'+esc(p.gemini_score||'弃权')+'</span></div><div class="ai3-x">'+cl(p.gemini_analysis)+'</div></div>'+
  '</div>';
}

function renderSignals(p){
  var html='';
  var sigs=p.smart_signals||[];
  var seen={};

  if(p.web_odds_check)html+='<div class="sig sig-b">欧赔联网核验：'+esc(p.web_odds_check)+' '+esc(p.european_odds||'')+'</div>';
  if(p.market_divergence)html+='<div class="sig sig-a">市场背离：'+esc(p.market_divergence)+'</div>';
  if(p.data_missing)html+='<div class="sig sig-r">数据缺失：'+esc(Array.isArray(p.data_missing)?p.data_missing.join(', '):p.data_missing)+'</div>';

  sigs.forEach(function(s){
    if(!s||seen[s])return;
    seen[s]=1;
    var cls='sig-a';
    var txt=String(s);
    if(txt.indexOf('Sharp')>=0||txt.indexOf('Steam')>=0||txt.indexOf('聪明钱')>=0)cls='sig-g';
    if(txt.indexOf('价值')>=0||txt.indexOf('EV')>=0)cls='sig-p';
    if(txt.indexOf('警')>=0||txt.indexOf('🚨')>=0||txt.indexOf('冲突')>=0)cls='sig-r';
    html+='<div class="sig '+cls+'">'+esc(txt)+'</div>';
  });

  return html;
}

function renderDetails(m,p){
  var top=p.top_score_candidates||p.unified_matrix_top_scores||[];
  var ev=p.bayesian_evidences||p.ai_evidences||p.evidences||[];
  var fair=p.fair_1x2||{};
  var odds=[
    ['体彩主胜',m.sp_home||m.win],
    ['体彩平局',m.sp_draw||m.same],
    ['体彩客胜',m.sp_away||m.lose],
    ['让球',m.give_ball||m.handicap||m.rq],
    ['总进球0',m.a0],
    ['总进球1',m.a1],
    ['总进球2',m.a2],
    ['总进球3',m.a3],
    ['总进球4',m.a4],
    ['总进球5',m.a5],
    ['总进球6',m.a6],
    ['总进球7+',m.a7]
  ];

  var html='<div class="sl">抓包赔率 / 结构字段</div><div class="mg">';
  html+='<div class="mb"><div class="mb-t">体彩竞彩抓包</div>';
  odds.forEach(function(o){html+='<div class="mb-r"><span class="mb-l">'+esc(o[0])+'</span><span class="mb-v">'+esc(V(o[1]))+'</span></div>';});
  html+='</div>';

  html+='<div class="mb"><div class="mb-t">AI结构输出</div>'+
    '<div class="mb-r"><span class="mb-l">goal_band</span><span class="mb-v">'+esc(V(p.goal_band))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">btts_ai</span><span class="mb-v">'+esc(getBttsLabel(p))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">AI平均置信</span><span class="mb-v">'+esc(V(p.ai_avg_confidence))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">方向gap</span><span class="mb-v">'+esc(V(p.dir_gap))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">xG主/客</span><span class="mb-v">'+esc(V(p.bookmaker_implied_home_xg||p.xG_home))+' / '+esc(V(p.bookmaker_implied_away_xg||p.xG_away))+'</span></div>'+
    '<div class="mb-r"><span class="mb-l">expected_total_goals</span><span class="mb-v">'+esc(V(p.expected_total_goals))+'</span></div>'+
  '</div>';
  html+='</div>';

  if(top&&top.length){
    html+='<div class="sl">候选比分</div><div>';
    top.slice(0,10).forEach(function(c,i){
      var sc=Array.isArray(c)?c[0]:(c.score||'?');
      var pr=Array.isArray(c)?c[1]:(c.prob||c.p||'');
      html+='<span class="chip '+(i===0?'top':'')+'">'+esc(sc)+' '+esc(pr)+'</span>';
    });
    html+='</div>';
  }

  if(ev&&ev.length){
    html+='<div class="sl">证据链 / 审计摘要</div>';
    ev.slice(0,10).forEach(function(e){
      html+='<div class="sig sig-b">'+esc(e)+'</div>';
    });
  }

  return html;
}

function renderMatches(){
  var el=document.getElementById('ms');
  var ms=getTodayMatches(D);

  if(!ms||!ms.length){
    el.innerHTML='<div class="empty">今日暂无比赛数据</div>';
    return;
  }

  el.innerHTML=ms.map(function(m,idx){
    var p=m.prediction||{};
    var key=matchKey(m);
    var prob=getProb(p);
    var score=DS(p);
    var rc=resultClass(p.result);
    var tier=String(p.recommendation_tier||p.direction_tier||'D').toUpperCase();
    var cls=(m.is_recommended?'rec ':'')+(tier==='S'?'s ':tier==='A'?'a ':'');
    var aiConf=V(p.ai_avg_confidence||p.ai_confidence||p.confidence,0);

    return '<div class="mc '+cls+'" id="m-'+key+'">'+
      '<div class="mc-h">'+
        '<div class="mc-lg">'+esc(m.league||'')+' <span class="m">'+esc(m.match_num||'')+'</span>'+(m.is_recommended?'<span class="mc-badge">精选</span>':'')+'</div>'+
        '<div class="mc-eng">'+esc(p.engine_version||D.version||'vMAX 18.4.6')+'</div>'+
      '</div>'+
      '<div class="mc-b">'+
        '<div class="teams">'+
          '<div class="tm"><div class="tm-n">'+esc(m.home_team||m.home||'')+'</div></div>'+
          '<div class="sc-c"><div class="sc-big">'+esc(score)+'</div><div class="sc-sub">AI终审比分</div><span class="res-tag '+rc+'">'+esc(p.result||'?')+'</span></div>'+
          '<div class="tm"><div class="tm-n">'+esc(m.away_team||m.guest||'')+'</div></div>'+
        '</div>'+

        '<div class="sr">'+
          '<div class="sb"><div class="sb-l">推荐层</div><div class="sb-v '+tierClass(tier)+'">'+esc(tier)+'</div></div>'+
          '<div class="sb"><div class="sb-l">方向分</div><div class="sb-v" style="color:var(--cy)">'+fmt1(p.direction_selection_score)+'</div></div>'+
          '<div class="sb"><div class="sb-l">比分分</div><div class="sb-v" style="color:var(--pr)">'+fmt1(p.score_shape_score)+'</div></div>'+
          '<div class="sb"><div class="sb-l">Goal Band</div><div class="sb-v" style="color:var(--am)">'+esc(V(p.goal_band))+'</div></div>'+
          '<div class="sb"><div class="sb-l">BTTS</div><div class="sb-v" style="color:var(--bl)">'+esc(getBttsLabel(p))+'</div></div>'+
          '<div class="sb"><div class="sb-l">AI均分</div><div class="sb-v" style="'+confidenceColor(aiConf)+'">'+esc(aiConf)+'%</div></div>'+
        '</div>'+

        '<div class="prob">'+
          '<div class="prob-h"><span style="color:var(--red)">主 '+fmt1(prob.h)+'%</span><span style="color:var(--t2)">平 '+fmt1(prob.d)+'%</span><span style="color:var(--bl)">客 '+fmt1(prob.a)+'%</span></div>'+
          '<div class="prob-bar"><div class="h" style="width:'+prob.h+'%"></div><div class="d" style="width:'+prob.d+'%"></div><div class="a" style="width:'+prob.a+'%"></div></div>'+
        '</div>'+

        renderSelectionBlock(p)+
        renderAiBlock(p)+
        renderSignals(p)+

        '<button class="tbtn" onclick="tg(this,\'d-'+key+'\')">展开抓包与底层字段 ▼</button>'+
      '</div>'+
      '<div class="det" id="d-'+key+'">'+renderDetails(m,p)+'</div>'+
    '</div>';
  }).join('');
}

function tg(b,id){
  var e=document.getElementById(id);
  if(!e)return;
  if(e.classList.contains('open')){
    e.classList.remove('open');
    b.textContent='展开抓包与底层字段 ▼';
  }else{
    e.classList.add('open');
    b.textContent='收起 ▲';
  }
}

function go(id){
  var e=document.getElementById(id);
  if(e){
    e.scrollIntoView({behavior:'smooth',block:'center'});
    var det=document.getElementById('d-'+id.replace('m-',''));
    if(det&&!det.classList.contains('open'))det.classList.add('open');
  }
}
</script>
