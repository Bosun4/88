px}.t4g{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.t4c{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:20px;position:relative;overflow:hidden;cursor:pointer;transition:all .3s}.t4c:hover{transform:translateY(-3px);border-color:var(--am)}.t4c::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gg)}.rb{position:absolute;top:14px;right:14px;width:30px;height:30px;background:var(--gg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Outfit;font-weight:900;font-size:14px;color:#000}.t4l{font-size:11px;color:var(--am);font-weight:700;margin-bottom:10px}.t4t{display:flex;align-items:center;gap:8px;margin-bottom:12px}.tl{width:32px;height:32px;border-radius:8px;object-fit:contain;background:var(--sf);padding:3px}.tn{font-size:13px;font-weight:700;color:var(--tb);flex:1}.tn.aw{text-align:right}.vs{font-family:Outfit;font-size:11px;color:var(--td);font-weight:700}.t4p{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}.pi{text-align:center;padding:6px;background:var(--sf);border-radius:8px}.pl{font-size:10px;color:var(--td)}.pv{font-family:Outfit;font-size:15px;font-weight:700;color:var(--tb)}.pv.hl{color:var(--gn)}.cb{margin-top:10px;height:4px;background:var(--sf);border-radius:4px;overflow:hidden}.cf{height:100%;border-radius:4px}.fb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.fn{padding:6px 14px;border-radius:100px;border:1px solid var(--bd);background:transparent;color:var(--td);font-size:12px;cursor:pointer}.fn:hover,.fn.ac{background:var(--bl);border-color:var(--bl);color:#fff}.mc{background:var(--cd);border:1px solid var(--bd);border-radius:14px;margin-bottom:10px;overflow:hidden}.mc.rc{border-color:var(--am);box-shadow:0 0 15px #f59e0b22}.mh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf);border-bottom:1px solid var(--bd)}.ml{font-size:12px;color:var(- display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.ft{background:var(--cd);border:1px solid var(--bd);padding:3px 8px;border-radius:100px;font-size:10px;color:var(--td)}.hr{display:flex;justify-content:space-between;padding:5px 8px;font-size:10px;border-radius:6px;margin-bottom:2px;background:var(--cd)}.eb{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;background:0 0;border:1px solid var(--bd);border-radius:8px;color:var(--td);font-size:12px;cursor:pointer;margin-top:10px}.eb:hover{background:var(--sf);color:var(--tb)}.em{text-align:center;padding:60px 20px;color:var(--td)}.ft2{text-align:center;padding:30px;color:var(--td);font-size:11px;border-top:1px solid var(--bd);margin-top:40px}.ld{text-align:center;padding:60px}.sp{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:600px){.dg{grid-template-columns:1fr}.t4g{grid-template-columns:1fr}.mi{width:75px}}</style></head><body><div class="ct"><div class="hd"><div class="logo">⚽ AI竞彩预测</div><div class="sub">GPT × Gemini 双模型分析</div><div class="ui" id="ui"><div class="pulse"></div><span>加载中</span></div></div><div class="sb" id="sb"></div><div id="t4"></div><div class="fb" id="fb"></div><div id="ms2"><div class="ld"><div class="sp"></div><div style="color:var(--td)">加载中...</div></div></div><div class="ft2"><p>API-Football · Football-Data · Odds-API</p><p style="margin-top:6px">GPT-5.2 × Gemini 3.1 · 每日09:30/21:30</p><p style="margin-top:6px;color:var(--am)">⚠️仅供参考</p></div></div><script>var R=[],CF="all";function ld(){fetch("data/predictions.json?t="+Date.now()).then(function(r){return r.json()}).then(rn).catch(function(){document.getElementById("ms2").innerHTML='<div class="em"><div style="font-size:48px;margin-bottom:12px">📡</div><p>等待首次运行</p></div>'})}function rn(d){R=d.results||[];document.getElementById("ui").innerHTML='<div class="pulse"></div><span>'+(d.update_time||"")+" "+(d.total_matches||0)+"场</span>";var ag=R.filter(function(r){return r.prediction&&r.prediction.model_agreement}).length;var ac=R.length?Math.round(R.reduce(function(s,r){return s+(r.prediction?r.prediction.confidence||0:0)},0)/R.length):0;document.getElementById("sb").innerHTML='<div class="sc"><div class="sv">'+(d.total_matches||0)+'</div><div class="sl">比赛</div></div><div class="sc"><div class="sv">'+(d.top4||[]).length+'</div><div class="sl">推荐</div></div><div class="sc"><div class="sv">'+ag+'</div><div class="sl">一致</div></div><div class="sc"><div class="sv">'+ac+'%</div><div class="sl">置信</div></div>';rt(d.top4||[]);var ls=[];R.forEach(function(r){if(ls.indexOf(r.league)<0)ls.push(r.league)});var fh='<button class="fn ac" onclick="sf(\'all\')">全部</button><button class="fn" onclick="sf(\'rec\')">⭐推荐</button>';ls.forEach(function(l){fh+='<button class="fn" onclick="sf(\''+l+'\')">'+l+"</button>"});document.getElementById("fb").innerHTML=fh;rm(R)}function rt(t4){if(!t4.length){document.getElementById("t4").innerHTML="";return}var h='<div class="st"><span>🎯</span>精选推荐<span class="bh">TOP4</span></div><div class="t4g">';t4.forEach(function(m,i){var p=m.prediction||{};var cc=p.confidence>=70?"var(--gn)":p.confidence>=50?"var(--am)":"var(--rd)";h+='<div class="t4c" onclick="go(\''+m.match_id+'\')"><div class="rb">'+(i+1)+'</div><div class="t4l">'+m.league+'</div><div class="t4t"><img class="tl" src="'+m.home_logo+'" onerror="this.style.display=\'none\'"><span class="tn">'+m.home_team+'</span><span class="vs">VS</span><span class="tn aw">'+m.away_team+'</span><img class="tl" src="'+m.away_logo+'" onerror="this.style.display=\'none\'"></div><div class="t4p"><div class="pi"><div class="pl">比分</div><div class="pv hl">'+(p.predicted_score||"?")+'</div></div><div class="pi"><div class="pl">结果</div><div class="pv">'+(p.result||"?")+'</div></div><div class="pi"><div class="pl">置信</div><div class="pv" style="color:'+cc+'">'+(p.confidence||0)+'%</div></div></div><div class="cb"><div class="cf" style="width:'+(p.confidence||0)+"%;background:"+cc+'"></div></div></div>'});h+="</div>";document.getElementById("t4").innerHTML=h}function rm(res){if(!res.length){document.getElementById("ms2").innerHTML='<div class="em">暂无</div>';return}var f=res;if(CF==="rec")f=res.filter(function(r){return r.is_recommended});else if(CF!=="all")f=res.filter(function(r){return r.league===CF});var h='<div class="st"><span>📋</span>全部('+f.length+")</div>";f.forEach(function(m){var p=m.prediction||{};var tm=m.match_time?new Date(m.match_time).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Shanghai"}):"";var rc=p.result==="主胜"?"th":p.result==="平局"?"td2":"ta";var hs=m.home_stats||{};var as2=m.away_stats||{};var hp=p.home_win_pct||33,dp=p.draw_pct||33,ap=p.away_win_pct||33;h+='<div class="mc '+(m.is_recommended?"rc":"")+'" id="m-'+m.match_id+'"><div class="mh"><div class="ml"><img src="'+m.league_logo+'" onerror="this.style.display=\'none\'"> '+m.league+(m.is_recommended?' <span class="tr">⭐推荐</span>':"")+'</div><div class="mt">'+tm+'</div></div><div class="mb"><div class="mts"><div class="mi"><img src="'+m.home_logo+'" onerror="this.style.display=\'none\'"><div class="mn">'+m.home_team+'</div></div><div class="mv"><div class="ms">'+(p.predicted_score||"?-?")+'</div><span class="mr '+rc+'">'+(p.result||"?")+'</span></div><div class="mi"><img src="'+m.away_logo+'" onerror="this.style.display=\'none\'"><div class="mn">'+m.away_team+'</div></div></div><div class="mp"><div class="pb ph" style="flex:'+hp+'">主'+hp+'%</div><div class="pb pd" style="flex:'+dp+'">平'+dp+'%</div><div class="pb pa" style="flex:'+ap+'">客'+ap+'%</div></div><button class="eb" onclick="tg(this,\'d-'+m.match_id+'\')">详情 ▼</button></div><div class="md" id="d-'+m.match_id+'"><div class="dg"><div class="db"><div class="dt">'+m.home_team+'</div><div class="dr"><span class="dl">战绩</span><span class="dv">'+(hs.wins||"?")+"W"+(hs.draws||"?")+"D"+(hs.losses||"?")+'L</span></div><div class="dr"><span class="dl">进/失</span><span class="dv">'+(hs.goals_for||"?")+"/"+(hs.goals_against||"?")+'</span></div><div class="dr"><span class="dl">均进</span><span class="dv">'+(hs.avg_goals_for||"?")+'</span></div><div class="dr"><span class="dl">状态</span><span class="dv">'+fm(hs.form)+'</span></div></div><div class="db"><div class="dt">'+m.away_team+'</div><div class="dr"><span class="dl">战绩</span><span class="dv">'+(as2.wins||"?")+"W"+(as2.draws||"?")+"D"+(as2.losses||"?")+'L</span></div><div class="dr"><span class="dl">进/失</span><span class="dv">'+(as2.goals_for||"?")+"/"+(as2.goals_against||"?")+'</span></div><div class="dr"><span class="dl">均进</span><span class="dv">'+(as2.avg_goals_for||"?")+'</span></div><div class="dr"><span class="dl">状态</span><span class="dv">'+fm(as2.form)+'</span></div></div></div>'+(p.gpt_analysis?'<div class="ab"><div class="at gp">🤖GPT '+(p.gpt_score?"("+p.gpt_score+")":"")+'</div><div class="ax">'+p.gpt_analysis+"</div></div>":"")+(p.gemini_analysis?'<div class="ab"><div class="at gm">💎Gemini '+(p.gemini_score?"("+p.gemini_score+")":"")+'</div><div class="ax">'+p.gemini_analysis+"</div></div>":"")+((p.key_factors||[]).length?'<div class="fs">'+(p.key_factors||[]).map(function(x){return'<span class="ft">'+x+"</span>"}).join("")+"</div>":"")+((m.h2h||[]).length?'<div style="margin-top:8px">'+(m.h2h||[]).map(function(x){return'<div class="hr"><span>'+x.date+"</span><span>"+x.home+" v "+x.away+"</span><span style='color:var(--am);font-weight:700'>"+x.score+"</span></div>"}).join("")+"</div>":"")+'<div style="text-align:center;margin-top:10px;font-size:11px;color:var(--td)">'+(p.model_agreement?"✅一致":"⚠️分歧")+"</div></div></div>"});document.getElementById("ms2").innerHTML=h}function fm(f){if(!f)return"?";return f.split("").map(function(c){return c==="W"?'<span style="color:var(--gn)">W</span>':c==="D"?'<span style="color:var(--am)">D</span>':c==="L"?'<span style="color:var(--rd)">L</span>':c}).join("")}function tg(b,id){var e=document.getElementById(id);if(e.classList.contains("op")){e.classList.remove("op");b.textContent="详情 ▼"}else{e.classList.add("op");b.textContent="收起 ▲"}}function sf(f){CF=f;var bs=document.querySelectorAll(".fn");for(var i=0;i<bs.length;i++)bs[i].classList.remove("ac");event.target.classList.add("ac");rm(R)}function go(id){var e=document.getElementById("m-"+id);if(e){e.scrollIntoView({behavior:"smooth",block:"center"});var d=document.getElementById("d-"+id);if(d&&!d.classList.contains("op"))d.classList.add("op")}}ld();</script></body></html>
